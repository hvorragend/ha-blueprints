# ═══════════════════════════════════════════════════════════════════════════
# CCA Status Card – v6 JSON Helper (tile card variant)
# ═══════════════════════════════════════════════════════════════════════════
#
# Variant using standard tile card instead of mushroom-cover-card.
# Status text is rendered via a markdown card below the tile.
# No custom card dependencies beyond stack-in-card and card_mod.
#
# Adjust entity IDs to match your setup:
#   cover entity   → cover.wohnzimmer_osten
#   status helper  → input_text.rollo_status_wohnzimmer_osten
# ═══════════════════════════════════════════════════════════════════════════

type: custom:stack-in-card
mode: vertical
grid_options:
  columns: 8
  rows: 3
keep:
  margin: false
  box_shadow: false
  background: false
card_mod:
  style: |
    ha-card {
      background: var(--ha-card-background, var(--card-background-color, white)) !important;
      border-radius: 12px !important;
      border: none !important;
      padding: 0px !important;
      min-height: 100% !important;
    }
cards:
  - type: tile
    entity: cover.wohnzimmer_osten
    name: Living Room East Blind
    vertical: false
    features_position: bottom
    features:
      - type: cover-position
    card_mod:
      style: |
        ha-card {
          background: none !important;
          border: none !important;
          border-radius: 0 !important;
          box-shadow: none !important;
        }

  - type: markdown
    content: >
      {% set raw = states('input_text.rollo_status_wohnzimmer_osten') %}
      {% set cover = 'cover.wohnzimmer_osten' %}
      {% set pos_raw = state_attr(cover, 'current_position') %}
      {% set pos = pos_raw | int(0) %}
      {% if raw not in ['unknown', 'unavailable', 'none', 'null', ''] %}
        {% set s = raw | from_json %}

        {# ── Primary: status label ── #}
        {% set title %}
          {%- if s.frc | default('non') == 'opn' %}💪 Force Open
          {%- elif s.frc | default('non') == 'cls' %}💪 Force Close
          {%- elif s.frc | default('non') == 'shd' %}💪 Force Shading
          {%- elif s.frc | default('non') == 'vnt' %}💪 Force Ventilate
          {%- elif s.win == 'opn' %}🛡️ Anti-Lockout Active
          {%- elif s.win == 'tlt' %}🪟 Ventilation Position
          {%- elif s.man == 1 %}🖐️ Manual Hold
          {%- elif s.ts.shs | default(0) > 0 %}⏳ Shading Pending...
          {%- elif s.shd == 1 %}☀️ Shading Active
          {%- elif s.ts.she | default(0) > 0 %}🌤️ Sun Gone (Waiting)
          {%- elif s.bas == 'cls' %}🌙 Night Mode
          {%- else %}✅ Automation Ready
          {%- endif %}
        {% endset %}

        {# ── Secondary: timestamp / position info ── #}
        {% set detail %}
          {%- set frc = s.frc | default('non') %}
          {%- if frc == 'shd' %}🕒 Active since {{ s.ts.shd | default(0) | timestamp_custom('%H:%M', true) }}
          {%- elif frc != 'non' %}📍 Position: {{ pos }}%
          {%- elif s.man == 1 %}🖐️ Hold until {{ s.ts.man | default(0) | timestamp_custom('%H:%M', true) }}
          {%- elif pos_raw is not none and
                   ((s.bas == 'cls' and pos > 5) or
                   (s.bas == 'opn' and s.shd == 0 and s.win == 'cls' and pos < 95)) %}
            📍 Currently at {{ pos }}% (automation active)
          {%- else %}
            {%- if s.ts.shs | default(0) > 0 %}🎬 Starts at {{ s.ts.shs | timestamp_custom('%H:%M', true) }}
            {%- elif s.ts.she | default(0) > 0 %}🔚 Ends at {{ s.ts.she | timestamp_custom('%H:%M', true) }}
            {%- elif s.shd == 1 %}🕒 Active since {{ s.ts.shd | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.win == 'tlt' %}🕒 Ventilating since {{ s.ts.win | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.win == 'opn' %}🛡️ Locked since {{ s.ts.win | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.bas == 'cls' %}🌙 Closed since {{ s.ts.cls | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.bas == 'opn' %}🌅 Open since {{ s.ts.opn | default(0) | timestamp_custom('%H:%M', true) }}
            {%- else %}ℹ️ Status OK
            {%- endif %}
          {%- endif %}
        {% endset %}

        **{{ title | trim }}**
        {{ detail | trim }}
      {% else %}
        ⚠️ **Status loading...**
        Check configuration
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: none !important;
          border: none !important;
          box-shadow: none !important;
          padding: 2px 16px 12px 16px !important;
        }
