# ═══════════════════════════════════════════════════════════════════════════
# CCA Status Card – v6 JSON Helper (tile card variant)
# ═══════════════════════════════════════════════════════════════════════════
#
# Variant using standard tile card instead of mushroom-cover-card.
# Status text is rendered via a markdown card below the tile.
# No custom card dependencies beyond stack-in-card and card_mod.
#
# Adjust entity IDs to match your setup:
#   cover entity      → cover.wohnzimmer_osten
#   status helper     → input_text.rollo_status_wohnzimmer_osten
#   freeze boolean    → input_boolean.freeze_alarm
# ═══════════════════════════════════════════════════════════════════════════

type: custom:stack-in-card
mode: vertical
grid_options:
  columns: 8
  rows: 3
keep:
  margin: false
  box_shadow: false
  background: false
card_mod:
  style: |
    ha-card {
      background: var(--ha-card-background, var(--card-background-color, white)) !important;
      border-radius: 12px !important;
      border: none !important;
      padding: 0px !important;
      min-height: 100% !important;
    }
cards:
  - type: tile
    entity: cover.wohnzimmer_osten
    name: EG Esszimmer Rollo
    vertical: false
    features_position: bottom
    features:
      - type: cover-position
    card_mod:
      style: |
        ha-card {
          background: none !important;
          border: none !important;
          border-radius: 0 !important;
          box-shadow: none !important;
        }

  - type: markdown
    content: >
      {% set raw = states('input_text.rollo_status_wohnzimmer_osten') %}
      {% set cover = 'cover.wohnzimmer_osten' %}
      {% set pos = state_attr(cover, 'current_position') | int(100) %}
      {% if raw not in ['unknown', 'unavailable', 'none', 'null', ''] %}
        {% set s = raw | from_json %}
        {% set freeze = is_state('input_boolean.freeze_alarm', 'on') %}

        {# ── Primär: Statusbezeichnung ── #}
        {% set title %}
          {%- if s.win == 'opn' %}🛡️ Aussperrschutz
          {%- elif s.win == 'tlt' %}🪟 Lüftungsposition
          {%- elif s.man == 1 %}🖐️ Manuelle Sperre
          {%- elif s.ts.shs | default(0) > 0 %}⏳ Beschattung naht...
          {%- elif s.shd == 1 %}☀️ Sonnenschutz aktiv
          {%- elif s.ts.she | default(0) > 0 %}🌤️ Sonne weg (Warten)
          {%- elif s.bas == 'cls' %}🌙 Nachtmodus
          {%- else %}✅ Automatik bereit
          {%- endif %}
        {% endset %}

        {# ── Sekundär: Zeitstempel / Positionsinfo ── #}
        {% set detail %}
          {%- if s.man == 1 %}
            {%- if freeze %}❄️ Frostschutz bis {{ s.ts.man | default(0) | timestamp_custom('%H:%M', true) }} Uhr
            {%- else %}🖐️ Halt bis {{ s.ts.man | default(0) | timestamp_custom('%H:%M', true) }} Uhr
            {%- endif %}
          {%- elif (s.bas == 'cls' and pos > 5) or
                   (s.bas == 'opn' and s.shd == 0 and s.win == 'cls' and pos < 95) %}
            📍 Aktuell bei {{ pos }}% (Automatik aktiv)
          {%- else %}
            {%- if s.ts.shs | default(0) > 0 %}🎬 Startet um {{ s.ts.shs | timestamp_custom('%H:%M', true) }}
            {%- elif s.ts.she | default(0) > 0 %}🔚 Endet um {{ s.ts.she | timestamp_custom('%H:%M', true) }}
            {%- elif s.shd == 1 %}🕒 Aktiv seit {{ s.ts.shd | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.win == 'tlt' %}🕒 Lüftung seit {{ s.ts.win | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.win == 'opn' %}🛡️ Gesperrt seit {{ s.ts.win | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.bas == 'cls' %}🌙 Zu seit {{ s.ts.cls | default(0) | timestamp_custom('%H:%M', true) }}
            {%- elif s.bas == 'opn' %}🌅 Auf seit {{ s.ts.opn | default(0) | timestamp_custom('%H:%M', true) }}
            {%- else %}ℹ️ Status OK
            {%- endif %}
          {%- endif %}
        {% endset %}

        **{{ title | trim }}**
        {{ detail | trim }}
      {% else %}
        ⚠️ **Status lädt...**
        Konfig. prüfen
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: none !important;
          border: none !important;
          box-shadow: none !important;
          padding: 2px 16px 12px 16px !important;
        }
