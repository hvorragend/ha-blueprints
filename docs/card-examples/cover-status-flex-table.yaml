# ═══════════════════════════════════════════════════════════════════════════
# CCA Status Table – flex-table-card (v6 JSON Helper)
# ═══════════════════════════════════════════════════════════════════════════
#
# Displays all internal helper fields for multiple covers in a table.
# Useful for debugging and monitoring the full automation state.
#
# Requirements:
#   - flex-table-card installed via HACS
#     https://github.com/custom-cards/flex-table-card
#
# Adjust entity IDs to match your setup:
#   Add all your cover status helpers to the entities list.
# ═══════════════════════════════════════════════════════════════════════════

type: custom:flex-table-card
entities:
  - input_text.cover_room1
  - input_text.cover_room2
columns:
  - name: Cover
    data: friendly_name
    modify: x.replace('Rollo Status ', '')
  - name: Status
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const frcMap = { non: 'none', opn: 'open', cls: 'close', shd: 'shade', vnt: 'vent' };
          const force = frcMap[j.frc] || 'none';

          // Layer 1: Force
          if (force !== 'none') return '⚡ ' + force;
          // Layer 2: Lockout
          if (j.win === 'opn') return '🔒 lock';
          // Layer 3: Ventilation
          if (j.win === 'tlt') return '💨 vent';
          // Layer 4: Resident (config-dependent, shown when res=1)
          if (j.res) return '👤 resident';
          // Layer 5: Shading
          if (j.shd === 1) return '🥵 shade';
          // Layer 6: Base
          return j.bas === 'cls' ? '🔽 close' : '🔼 open';
        } catch(e) {
          return '❌';
        }
      })()
  - name: Base
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          return j.bas === 'cls' ? '🔽 cls' : '🔼 opn';
        } catch(e) { return '—'; }
      })()
  - name: Shade
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          return j.shd ? '🥵 1' : '0';
        } catch(e) { return '—'; }
      })()
    align: center
  - name: Window
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const map = { cls: 'cls', tlt: '💨 tlt', opn: '🪟 opn' };
          return map[j.win] || (j.win || '—');
        } catch(e) { return '—'; }
      })()
  - name: Force
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const map = { non: '—', opn: '⚡ opn', cls: '⚡ cls', shd: '⚡ shd', vnt: '⚡ vnt' };
          return map[j.frc] || (j.frc || '—');
        } catch(e) { return '—'; }
      })()
  - name: Resident
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          return j.res ? '👤' : '';
        } catch(e) { return ''; }
      })()
    align: center
  - name: Manual
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          return j.man ? '✋' : '';
        } catch(e) { return ''; }
      })()
    align: center
  - name: 🔼 ts.opn
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.ts?.opn;
          if (!ts) return '—';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
  - name: 🔽 ts.cls
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.ts?.cls;
          if (!ts) return '—';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
  - name: 🥵 ts.shd
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.ts?.shd;
          if (!ts) return '—';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
  - name: 💨 ts.win
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.ts?.win;
          if (!ts) return '—';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
  - name: ⏳ ts.shs
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.ts?.shs;
          if (!ts) return '—';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
  - name: ⏳ ts.she
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.ts?.she;
          if (!ts) return '—';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
  - name: Updated
    data: state
    modify: |-
      (() => {
        try {
          const j = JSON.parse(x);
          const ts = j.t;
          if (!ts) return 'Never';
          const d = new Date(ts * 1000);
          return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        } catch(e) { return '—'; }
      })()
sort_by: friendly_name
css:
  table+: "border-collapse: collapse; width: 100%;"
  tbody tr:hover: "background-color: rgba(var(--rgb-primary-color), 0.08);"
  thead tr th: >-
    background-color: rgba(var(--rgb-primary-color), 0.15); padding: 10px 8px;
    font-weight: bold; font-size: 0.9em;
  tbody tr td: >-
    padding: 8px; border-bottom: 1px solid rgba(var(--rgb-divider-color), 0.3);
    font-size: 0.85em;
