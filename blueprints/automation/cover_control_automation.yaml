blueprint:
  name: "Cover Control Automation (CCA)"
  description: |
    # ⭐ Cover Control Automation (CCA) ⭐
    Cover Control Automation is a comprehensive Home Assistant blueprint which automatically manages your window coverings (such as roller shutters and blinds) based on time, the position of the sun, and weather conditions. It adapts intelligently to your preferences, largely eliminating the need for manual adjustments.

    **Version**: 2026.07.13

    ### 🔗 Resources & Support
    📢 **Latest Changes**: [Changelog](https://hvorragend.github.io/ha-blueprints/CHANGELOG) | ✨ **Highlights**: [Key Features](https://hvorragend.github.io/ha-blueprints/#-key-features)
    🚀 **Setup**: [Quick Start Guide](https://hvorragend.github.io/ha-blueprints/#-quick-start-5-steps) | [Prerequisites](https://hvorragend.github.io/ha-blueprints/#-essential-prerequisites)
    📚 **Docs**: 📖 [Handbook](https://hvorragend.github.io/ha-blueprints/handbook/) | ❓ [FAQ](https://hvorragend.github.io/ha-blueprints/FAQ) | ☀️ [Dynamic Sun Elevation](https://hvorragend.github.io/ha-blueprints/DYNAMIC_SUN_ELEVATION) | ⏰ [Time Control Visualization](https://hvorragend.github.io/ha-blueprints/TIME_CONTROL_VISUALIZATION)
    🔧 **Validator**: Validate YAML for errors, typos, and deprecated parameters with the [CCA Configuration Validator](https://hvorragend.github.io/ha-blueprints/validator/)
    ✨ **Online Tools**:  🔍 [CCA Trace Analyzer](https://hvorragend.github.io/ha-blueprints/trace-analyzer/) | 📈 [CCA Trace Compare](https://hvorragend.github.io/ha-blueprints/trace-compare/)
    💬 **Get Help**: [Forum Thread](https://community.home-assistant.io/t/cover-control-automation-cca-a-comprehensive-and-highly-configurable-roller-blind-blueprint/680539) | [GitHub Issues](https://github.com/hvorragend/ha-blueprints/issues) | [Source Code](https://github.com/hvorragend/ha-blueprints/blob/main/blueprints/automation/cover_control_automation.yaml)
    ❤️ **Enjoying my work?** [Buy me a Coffee](https://buymeacoffee.com/herr.vorragend) or tip via [PayPal](https://www.paypal.com/donate/?hosted_button_id=NQE5MFJXAA8BQ). Thank you! 🙌
    <sub>License: Open-source. Attribution and original repo link required for modifications. "Take Control" copies are unsupported.</sub>

  source_url: https://github.com/hvorragend/ha-blueprints/blob/main/blueprints/automation/cover_control_automation.yaml
  domain: automation
  homeassistant:
    min_version: "2024.10.0"
  input:
    blind:
      name: "🪟 Cover"
      description: >-
        Which blind or roller shutter should be automated?

        Using a cover group? See [FAQ: Can I use a cover group?](https://hvorragend.github.io/ha-blueprints/FAQ#q-can-i-use-a-cover-group)

        While the cover is unavailable (e.g. during a restart), the automation pauses — without a position it cannot decide anything. As soon as the cover is back, it catches up on everything that was missed in the meantime.

      selector:
        entity:
          filter:
            - domain:
                - cover

    cover_status_helper:
      name: "🔤 Cover Status Helper"
      description: >-
        Helper used to store the last cover event data (in JSON format). A separate helper must be created for each CCA automation.
        *Attention:* You will need to manually create an [input_text](https://my.home-assistant.io/redirect/helpers/) entity with a <ins>length of 254 chars</ins> for this.
      default: []
      selector:
        entity:
          domain: input_text

    feature_section:
      name: "Automation Options"
      icon: mdi:window-shutter-cog
      collapsed: true
      description: >-
        <center><p><small>
          Configure what CCA controls and how it behaves. Most settings use safe defaults. Expand the descriptions below only if you need details.
        </small></p></center>
      input:
        auto_options:
          name: "👉 What should CCA control?"
          description: >-
            Select which opening, closing, and special behaviors CCA should manage.

            *Not sure? The defaults (Morning Opening, Evening Closing, Time Control) work for most setups.*


            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/features#auto_options).

          default:
            [
              auto_up_enabled,
              auto_down_enabled,
              time_control_enabled,
            ]
          selector:
            select:
              options:
                - label: "🔼 Morning Opening — Automatically open the cover each morning"
                  value: "auto_up_enabled"
                - label: "🔻 Evening Closing — Automatically close the cover each evening"
                  value: "auto_down_enabled"
                - label: "⏲️ Time Control — Use time windows (Early/Late) to constrain when triggers fire"
                  value: "time_control_enabled"
                - label: "🔅 Brightness Control — Trigger opening/closing based on ambient brightness sensor"
                  value: "auto_brightness_enabled"
                - label: "☀️ Sun Elevation Control — Trigger opening/closing based on sun position (sunrise/sunset)"
                  value: "auto_sun_enabled"
                - label: "💨 Ventilation Mode — React to open/tilted windows, prevent lockout"
                  value: "auto_ventilate_enabled"
                - label: "🥵 Sun Protection / Shading — Partially close when sun shines directly on window"
                  value: "auto_shading_enabled"
              multiple: true
              sort: false
              custom_value: false
              mode: list

        time_control:
          name: "⏲️ Time Control Type"
          description: >-
            Select how time-based opening and closing is scheduled. *(Only relevant when **⏲️ Time Control** is checked in the **👉 What should CCA control?** list above — uncheck it there to disable the time windows entirely.)*

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/features#time_control).

          default: time_control_input
          selector:
            select:
              options:
                - label: "✏️ Use the time input fields in this blueprint section"
                  value: "time_control_input"
                - label: "📅 Use a Home Assistant calendar"
                  value: "time_control_calendar"
              sort: false
              multiple: false
              custom_value: false

        brightness_sun_operator:
          name: "🔀 Condition Logic: Brightness & Sun Elevation"
          description: >-
            How should Brightness and Sun Elevation conditions be combined when **both** are active?


            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/features#brightness_sun_operator).
          default: "or"
          selector:
            select:
              options:
                - label: "⚡ OR — Either condition triggers the action (default)"
                  value: "or"
                - label: "🔒 AND — Both conditions must be met simultaneously"
                  value: "and"
              mode: dropdown
              sort: false
              custom_value: false

        individual_config:
          name: "⚙️ Behavior Customization"
          description: >-
            **Fine-tune automation behavior for your specific hardware and preferences.**


            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/features#individual_config).


            </details>

          default: []
          selector:
            select:
              options:
                - label: "↕️ Don't raise cover when closing for the evening"
                  value: "prevent_higher_position_closing"
                - label: "⬇️ Keep shading position during evening close (don't lower further)"
                  value: "prevent_lowering_when_closing_if_shaded"
                - label: "☀️ Don't end shading if cover is already closed"
                  value: "prevent_shading_end_if_closed"
                - label: "☀️ Stay shaded: Don't open cover when sun shading ends"
                  value: prevent_opening_after_shading_end
                - label: "🪟 Keep closed: Don't open cover when ventilation ends"
                  value: prevent_opening_after_ventilation_end
                - label: "🔧 Use custom actions only (disable default set_cover_position/set_cover_tilt_position)"
                  value: "prevent_default_cover_actions"
                - label: "⏱️ Open cover only once per day"
                  value: "prevent_opening_multiple_times"
                - label: "⏱️ Close cover only once per day"
                  value: "prevent_closing_multiple_times"
                - label: "⏱️ Shade cover only once per day"
                  value: "prevent_shading_multiple_times"
              multiple: true
              sort: false
              custom_value: false
              mode: list

    position_section:
      name: "Cover Position Settings"
      icon: mdi:window-shutter-settings
      description: >-
        <center><p><small>
          <strong>Important notes on configuring the position values</strong>
          <br />
          Please ensure that all position values are unique and do not conflict with each other.
          <br />
          <strong>Position Logic:</strong><br />
          - For Blinds/Shutters: open_position (100%) > shading_position (25%) > close_position (0%)<br />
          - For Awnings: open_position (0%) < shading_position (75%) < close_position (100%)<br />
        </small></p></center>
      collapsed: true
      input:
        position_source:
          name: "📍 Position Source Type"
          description: >-
            How does your cover provide position information?
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/positions#position_source).
          default: "current_position_attr"
          selector:
            select:
              options:
                - label: "Use current_position attribute (standard)"
                  value: "current_position_attr"
                - label: "Use position attribute"
                  value: "position_attr"
                - label: "Use custom position sensor"
                  value: "custom_sensor"
              mode: dropdown

        custom_position_sensor:
          name: "📍 Custom Position Sensor"
          description: "Select sensor that provides position (0-100%). Only used if 'Custom sensor' selected above"
          default: []
          selector:
            entity:
              domain: sensor

        cover_type:
          name: "🎯 Cover Type"
          description: >-
            Select the type of cover you want to control.
            <br /><br />
            <strong>Blind/Roller Shutter:</strong> On the cover entity, 0% = closed (down), 100% = open (up) — matching CCA's Open Position (100%) and Close Position (0%). Shading uses lower positions.
            <br /><br />
            <strong>Awning/Sunshade:</strong> On the cover entity, 0% = retracted (closed), 100% = extended (open). Shading uses higher positions.
            <br /><br />
            ⚠️ <strong>Note:</strong> For an awning, CCA's Open Position is the <em>retracted</em> state — enter Open Position = 0% and Close Position = 100% (mirrored compared to a blind).
            <br /><br />
            ⚠️ <strong>Note:</strong> Ventilation and tilt features are not available for awnings.
            <br /><br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/positions#cover_type).
          default: "blind"
          selector:
            select:
              options:
                - label: "🪟 Blind / Roller Shutter (Standard)"
                  value: "blind"
                - label: "☂️ Awning / Sunshade (Inverted)"
                  value: "awning"
              mode: dropdown

        open_position:
          name: "🔼 Open Position"
          description: "What position should the cover be moved into when opening?"
          default: 100
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: "%"

        close_position:
          name: "🔻 Close Position"
          description: "What position should the cover be moved into when closing?"
          default: 0
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: "%"

        ventilate_position:
          name: "💨 Ventilate Position"
          description: >-
            What position should the cover move to when the window is tilted?
            If closing is triggered and the contact sensor is 'on', the cover will move to this position instead of closing completely.
            <br /><br />Should not be 100. In this case please use 99. And please also note the information in the position tolerance.
          default: 30
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: "%"

        shading_position:
          name: "🥵 Sun Shading Position"
          description: "To which position should the cover be moved for shading?"
          default: 25
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: "%"

        shading_position_alt:
          name: "🥵 Alternate Sun Shading Position"
          description: >-
            An optional second shading position. When the gating entity below is 'on',
            the cover moves to this position for shading instead of the normal shading position.
            <br /><br />Leave empty to disable the alternate shading position.
          default: []
          selector:
            number:
              min: 0.0
              max: 100.0
              unit_of_measurement: "%"

        shading_position_alt_entity:
          name: "🥵 Alternate Sun Shading Position Trigger"
          description: >-
            While this entity is 'on', the cover shades to the alternate shading position above
            instead of the normal shading position. While it is 'off' (or unset), the normal
            shading position is used. If the cover is already shading when this entity changes,
            the cover is re-driven to the matching position.
            <br /><br />Leave empty to disable the alternate shading position.
          default: []
          selector:
            entity:
              multiple: false
              domain:
                - binary_sensor
                - input_boolean

        position_tolerance:
          name: "〰️ Position Tolerance"
          description: >-
            Tolerance to be applied when comparing the current position with the to be position.
            These are absolute values. Not relative to the previous position values.
          default: 0
          selector:
            number:
              min: 0.0
              max: 20.0
              unit_of_measurement: "%"

        drive_time:
          name: "⏲️ Cover Drive Time"
          description: >-
            Can be used to recognise manual control. Please round up a little and do not adjust too precisely. Is used to delay the trigger if too much or incorrect position data is sent back.
            <br /><br />
            Within this time, it is assumed that CCA has carried out the last action. Otherwise, CCA would react to its own commands and recognize them as manual intervention.
          default: 90
          selector:
            number:
              min: 0.0
              max: 180.0
              unit_of_measurement: seconds
              step: 1.0
              mode: slider

    tilt_position_section:
      name: "Cover Tilt Position Settings"
      icon: mdi:image-filter-tilt-shift
      collapsed: true
      input:
        cover_tilt_wait_mode:
          name: "🔄 Tilt Wait Mode"
          description: >-
            Choose how CCA waits before sending tilt commands:

            **Fixed Delay (Standard)**: Uses the configured tilt delay value.
            Works well for most devices.

            **Wait Until Idle (Z-Wave)**: Waits until cover reports 'open' or 'closed'
            state before sending tilt. Prevents tilt commands from being ignored on
            devices that block tilt during motor movement (e.g., Shelly Qubino Wave Shutter).

            If your tilt positions are unreliable, try switching to 'Wait Until Idle' mode.
          default: "fixed_delay"
          selector:
            select:
              options:
                - label: "⏱️ Fixed Delay (Standard)"
                  value: "fixed_delay"
                - label: "⏸️ Wait Until Idle (Z-Wave devices)"
                  value: "wait_idle"
              mode: dropdown

        cover_tilt_wait_timeout:
          name: "🔄 Tilt Wait Timeout"
          description: >-
            Maximum time to wait for cover to become idle before sending tilt command.
            Only used when 'Wait Until Idle' mode is selected.
          default: 30
          selector:
            number:
              min: 5
              max: 60
              unit_of_measurement: seconds
              step: 1
              mode: slider

        tilt_delay:
          name: "🕛 Default Tilt Delay"
          description: >-
            Delay between <em>set_cover_position</em> and <em>set_cover_tilt_position</em>.
            Only necessary when using the tilt functions.
            This separates the two commands in terms of time.
            <br /><br />`Optional`
          default: 0
          selector:
            number:
              min: 0.0
              max: 600.0
              unit_of_measurement: seconds
              step: 1.0
              mode: slider

        cover_tilt_config:
          name: "📐 Tilt Position Feature"
          description: >-
            ⚠️ <strong>Note:</strong> Tilt control is only available for blinds/shutters, not for awnings.
            <br /><br />
            If the cover and the integration support it, the tilt position of the cover can be set. The standard attribute ‘current_tilt_position’ is used for this.
          default: cover_tilt_disabled
          selector:
            select:
              options:
                - label: "✅ Enable Tilt Position Control"
                  value: "cover_tilt_enabled"
                - label: "❌ Disable Tilt Position Control"
                  value: "cover_tilt_disabled"
              multiple: false
              sort: false
              custom_value: false
              mode: list

        cover_tilt_reposition_config:
          name: "📐 Tilt Reposition Feature"
          description: >-
            If Tilt Reposition Feature is enabled you can choose if the blinds are closed before tilting to a new position.
            In some cases tilting the blinds in small steps can lead to false positions. This is because of the minimum time the motor needs to run.
            If the runtime between current tilt position and target tilt position is to small the motor will not stop at the right position.
            Thus the blinds will be preclosed to 0 and then run to the target position.
          default: cover_tilt_reposition_disabled
          selector:
            select:
              options:
                - label: "✅ Enable Tilt Reposition Control"
                  value: "cover_tilt_reposition_enabled"
                - label: "❌ Disable Tilt Reposition Control"
                  value: "cover_tilt_reposition_disabled"
              multiple: false
              sort: false
              custom_value: false
              mode: list

        open_tilt_position:
          name: "🔼 Open Tilt Position"
          description: "To which tilt position should the cover be moved when opening?"
          default: 50
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        close_tilt_position:
          name: "🔻 Close Tilt Position"
          description: "To which tilt position should the cover be moved when closing?"
          default: 50
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        ventilate_tilt_position:
          name: "💨 Ventilate Tilt Position"
          description: "To which tilt position should the cover be moved for ventilation?"
          default: 50
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        tilt_position_tolerance:
          name: "〰️ Tilt Position Tolerance"
          description: >-
            Tolerance to be applied when comparing the current tilt position with the to be tilt position.
            These are absolute values, analogous to the position tolerance. Use this when several states share the
            same cover position and can only be told apart by their tilt angle (e.g. closed/shading/ventilate all at
            position 0), or to absorb small tilt motor inaccuracies.
          default: 0
          selector:
            number:
              min: 0.0
              max: 20.0
              unit_of_measurement: "%"
        shading_tilt_position_0:
          name: "🥵 Sun Shading Tilt Position"
          description: "Minimum tilt position for shading. The cover will be tilted to this position if the sun elevation is below the value of elevation 1."
          default: 0
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        shading_tilt_position_1:
          name: "🥵 Sun Shading Tilt Position 1"
          description: "To which tilt position should the cover be moved for shading when the sun is above elevation 1?"
          default: 20
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        shading_tilt_elevation_1:
          name: "🥵 Sun Shading Tilt Elevation 1"
          description: "Sun elevation for tilt position 1."
          default: 20
          selector:
            number:
              min: 0.0
              max: 90.0
              unit_of_measurement: °
              mode: slider
              step: 1.0
        shading_tilt_position_2:
          name: "🥵 Sun Shading Tilt Position 2"
          description: "To which tilt position should the cover be moved for shading when the sun is above elevation 2?"
          default: 37
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        shading_tilt_elevation_2:
          name: "🥵 Sun Shading Tilt Elevation 2"
          description: "Sun elevation for tilt position 2."
          default: 30
          selector:
            number:
              min: 0.0
              max: 90.0
              unit_of_measurement: °
              mode: slider
              step: 1.0
        shading_tilt_position_3:
          name: "🥵 Sun Shading Tilt Position 3"
          description: "To which tilt position should the cover be moved for shading when the sun is above elevation 3?"
          default: 50
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"
        shading_tilt_elevation_3:
          name: "🥵 Sun Shading Tilt Elevation 3"
          description: "Sun elevation for tilt position 3."
          default: 48
          selector:
            number:
              min: 0.0
              max: 90.0
              unit_of_measurement: °
              mode: slider
              step: 1.0

    time_section:
      name: "Time Control Configuration"
      icon: mdi:clock-time-two-outline
      collapsed: true
      description: >-
        <center><p><small>
          Configure the time windows for morning opening and evening closing.<br />
          Time control can be enabled and the type selected in the <strong>Automation Options</strong> section above.
          <br />
          For comprehensive explanations, examples, and timing diagrams, see:
          <a href="https://hvorragend.github.io/ha-blueprints/TIME_CONTROL_VISUALIZATION">Time Control Guide</a>
        </small></p></center>
      input:
        time_up_early:
          name: "🔼 Time For Drive Up - Early On Workdays"
          description: >-
            The earliest time at which the cover may be opened. The cover will be opened if <ins>AFTER</ins> this time the defined brightness
            or sun-elevation value is high enough. (**NOTE**: A resident must also be awake if one is defined).
          default: "06:00:00"
          selector:
            time: {}

        time_up_early_non_workday:
          name: "🔼 Time For Drive Up - Early On Non-Workdays"
          description: >-
            As directly above, but for non-workdays.
          default: "07:00:00"
          selector:
            time: {}

        time_up_late:
          name: "🔼 Time For Drive Up - Late On Workdays"
          description: >-
            The latest time at which the cover should be opened.
            If the required brightness or sun-elevation value has <ins>NOT</ins> yet been reached by this time, the cover will still be opened.
            (**NOTE**: If a resident has been defined and the resident is still asleep, then the cover will NOT be opened.)
          default: "08:00:00"
          selector:
            time: {}

        time_up_late_non_workday:
          name: "🔼 Time For Drive Up - Late On Non-Workdays"
          description: >-
            As directly above, but for non-workdays.
          default: "08:00:00"
          selector:
            time: {}

        time_down_early:
          name: "🔻 Time For Drive Down - Early On Workdays"
          description: >-
            The earliest time at which the cover may be closed.
            The cover will be closed if <ins>AFTER</ins> this time the defined brightness or sun-elevation value is low enough.
          default: "16:00:00"
          selector:
            time: {}

        time_down_early_non_workday:
          name: "🔻 Time For Drive Down - Early On Non-Workdays"
          description: >-
            As directly above, but for non-workdays.
          default: "16:00:00"
          selector:
            time: {}

        time_down_late:
          name: "🔻 Time For Drive Down - Late On Workdays"
          description: >-
            The latest time at which the cover should be closed.
            If the required brightness or sun-elevation value has <ins>NOT</ins> yet been reached by this time, the cover will still be closed.
            <br />
            Please do not enter 0:00, because that would be the next day!
          default: "22:00:00"
          selector:
            time: {}

        time_down_late_non_workday:
          name: "🔻 Time For Drive Down - Late On Non-Workdays"
          description: >-
            As directly above, but for non-workdays.
            <br />
            Please do not enter 0:00, because that would be the next day!
          default: "22:00:00"
          selector:
            time: {}

        workday_sensor:
          name: "💼 Sensor For Workday Today"
          description: >-
            It may be desired to open a cover at a different time on work days than on non-work days.
            The corresponding binary sensor can be defined here. If not set, the cover will open every time at time_up_early.
            <br /><br />
            I recommend using the [Workday integration](https://www.home-assistant.io/integrations/workday/).
            <br /><br />
            Example: `binary_sensor.workday_today`
            <br /><br />`Optional`
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - binary_sensor

        workday_sensor_tomorrow:
          name: "💼 Sensor For Workday Tomorrow (only for closing)"
          description: >-
            When <ins>closing</ins> the blinds, you have the option of checking the times for tomorrow rather than the current day.
            This has the advantage that you can <ins>close</ins> the blinds earlier if <ins>tomorrow</ins> is a working day.
            This makes sense if, for example, there is school tomorrow but today is actually still the weekend.
            But the child has to go to bed earlier.<br />
            If this field is not configured here, the normal working day sensor is used.
            <br /><br />
            I recommend using the [Workday integration](https://www.home-assistant.io/integrations/workday/).
            <br /><br />
            Example: `binary_sensor.workday_tomorrow`
            <br /><br />`Optional`
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - binary_sensor

        calendar_entity:
          name: "📅 Calendar Entity"
          description: >-
            Select a Home Assistant calendar for time control.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/time#calendar_entity).
          default: []
          selector:
            entity:
              filter:
                - domain: calendar
              multiple: false

        calendar_open_title:
          name: "📂 Open Event Title"
          description: >-
            Title of calendar events that define the daytime window
            (exact match, ignoring upper/lower case and surrounding spaces).
            Default: "Open Cover".
          default: "Open Cover"
          selector:
            text: {}

        calendar_close_title:
          name: "📁 Close Event Title"
          description: >-
            Title of calendar events that define the evening/close window
            (exact match, ignoring upper/lower case and surrounding spaces).
            Default: "Close Cover".
          default: "Close Cover"
          selector:
            text: {}

    brightness_section:
      name: "Brightness Configuration"
      description: >-
        <center><p><small>
          <strong>Only for morning opening &amp; evening closing!</strong><br />
          This condition allows the cover to open earlier in the morning or close earlier in the evening,<br />
          triggered by ambient brightness reaching its threshold.<br />
          <strong>This is NOT related to sun protection / shading.</strong>
        </small></p></center>
      icon: mdi:brightness-5
      collapsed: true
      input:
        default_brightness_sensor:
          name: "🔅 Default Brightness Sensor"
          description: "This default brightness sensor can be defined here, which is used for daily up and down."
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - sensor

        brightness_time_duration:
          name: "🔅 Brightness Time Duration"
          description: "Defines the time to given brightness sensor must be stay above/below the thresholds."
          default: 30
          selector:
            number:
              min: 0.0
              max: 600.0
              mode: slider
              step: 1.0
              unit_of_measurement: seconds

        brightness_up:
          name: "🔅 Brightness Value For Opening The Cover"
          description: "At what brightness value should the cover be opened?"
          default: 0
          selector:
            number:
              min: 0.0
              max: 100000.0
              unit_of_measurement: lx
              step: 1.0

        brightness_down:
          name: "🔅 Brightness Value For Closing The Cover"
          description: "At what brightness value should the cover be closed? Must be lower then the brightness up value."
          default: 0
          selector:
            number:
              min: 0.0
              max: 100000.0
              unit_of_measurement: lx
              step: 1.0

        brightness_hysteresis:
          name: "🔅 Brightness Hysteresis Value"
          description: "Cover will open only when brightness exceeds (brightness_up + hysteresis), and close only when it drops below (brightness_down - hysteresis). Prevents frequent open/close cycles."
          default: 0
          selector:
            number:
              min: 0
              max: 10000
              step: 100
              mode: slider
              unit_of_measurement: "lx"

    sun_section:
      name: "Sun Elevation Settings"
      description: >-
        <center><p><small>
          <strong>Only for morning opening &amp; evening closing!</strong><br />
          This condition opens the cover when the sun rises above a threshold and closes it when the sun drops below a threshold.<br />
          <strong>This is NOT sun protection / shading</strong> (which controls midday partial closing).
        </small></p></center>
      icon: mdi:weather-sunny
      collapsed: true
      input:
        default_sun_sensor:
          name: "☀️ Sun Sensor"
          description: >-
            Which sensors provides attributes with current azimuth and elevation of sun.
            I strongly suggest to use sun.sun ([Sun integration](https://www.home-assistant.io/integrations/sun/)).
            Please make sure that the integration is activated and provides the attributes.
            This sensor is also used for sun protection / sunshade control.
            <br /><br />
            <ins>A few examples of threshold values:</ins>
            <ul>
            <li>+18° Astronomical Dusk</li>
            <li>+12° Nautical Dusk</li>
            <li>+6° Dusk</li>
            <li>0° Sunrise/Sunset (Default)</li>
            <li>-6° Civil Dawn</li>
            <li>-12° Nautical Dawn</li>
            <li>-18° Astronomical Dawn/Night</li>
            </ul>
            <br />`Optional` / `Shading`
          default: "sun.sun"
          selector:
            entity:
              filter:
                - domain:
                    - sun

        sun_time_duration:
          name: "☀️ Sun Time Duration"
          description: "Defines the time to given sun sensor must be stay above/below the thresholds."
          default: 30
          selector:
            number:
              min: 0.0
              max: 600.0
              mode: slider
              step: 1.0
              unit_of_measurement: seconds

        sun_elevation_mode:
          name: "☀️ Sun Elevation Mode"
          description: >-
            How the elevation thresholds are determined: **🔒 Fixed** uses only the fixed
            values below, **📊 Dynamic** uses only the Up/Down sensors, **🔄 Hybrid** adds
            the fixed value to the sensor value as an offset (e.g. 2.0° + 1.5° = 3.5°).
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/sun#sun_elevation_mode).
          default: "fixed"
          selector:
            select:
              options:
                - label: "🔒 Fixed - Use only fixed values"
                  value: "fixed"
                - label: "📊 Dynamic - Use only sensor values"
                  value: "dynamic"
                - label: "🔄 Hybrid - Sensor + fixed value as offset"
                  value: "hybrid"
              sort: false
              multiple: false
              custom_value: false

        sun_elevation_up:
          name: "☀️ Sun Elevation Value For Opening The Cover"
          description: >-
            **Fixed Mode**: Direct threshold value for opening.
            <br />
            **Dynamic Mode**: Ignored (sensor value is used).
            <br />
            **Hybrid Mode**: Added as offset to sensor value.
            <br /><br />
            The cover will be <ins>opened</ins> if the sun elevation is over the calculated threshold.
          default: 0
          selector:
            number:
              min: -90.0
              max: 90.0
              unit_of_measurement: °
              step: 0.1
              mode: slider

        sun_elevation_down:
          name: "☀️ Sun Elevation Value For Closing The Cover"
          description: >-
            **Fixed Mode**: Direct threshold value for closing.
            <br />
            **Dynamic Mode**: Ignored (sensor value is used).
            <br />
            **Hybrid Mode**: Added as offset to sensor value.
            <br /><br />
            The cover will be <ins>closed</ins> if the sun elevation is under the calculated threshold.
          default: 0
          selector:
            number:
              min: -90.0
              max: 90.0
              unit_of_measurement: °
              step: 0.1
              mode: slider

        sun_elevation_up_sensor:
          name: "☀️ Sun Elevation Up Sensor (Dynamic/Hybrid - Optional)"
          description: >-
            Optional sensor (template sensor or Input Number) that provides a **dynamic, seasonal
            elevation threshold** for opening. Required for Dynamic Mode, combined with the fixed
            value in Hybrid Mode, ignored in Fixed Mode. The cover opens when the current sun
            elevation rises above the threshold.
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/sun#sun_elevation_up_sensor)
            and the [Dynamic Sun Elevation Guide](https://hvorragend.github.io/ha-blueprints/DYNAMIC_SUN_ELEVATION).
          default: []
          selector:
            entity:
              filter:
                - domain: [sensor, input_number]

        sun_elevation_down_sensor:
          name: "☀️ Sun Elevation Down Sensor (Dynamic/Hybrid - Optional)"
          description: >-
            Optional sensor (template sensor or Input Number) that provides a **dynamic, seasonal
            elevation threshold** for closing. Required for Dynamic Mode, combined with the fixed
            value in Hybrid Mode, ignored in Fixed Mode. The cover closes when the current sun
            elevation sets below the threshold.
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/sun#sun_elevation_down_sensor)
            and the [Dynamic Sun Elevation Guide](https://hvorragend.github.io/ha-blueprints/DYNAMIC_SUN_ELEVATION).
          default: []
          selector:
            entity:
              filter:
                - domain: [sensor, input_number]

    contacts_section:
      name: "Contact Sensors for Ventilation"
      description: >-
        <center><p><small>
          Settings if the feature ‘💨 - Ventilation Mode — React to open/tilted windows, prevent lockout’ has been activated above.
          <br />
          All these settings are optional.
        </small></p></center>
      icon: mdi:door-closed-lock
      collapsed: true
      input:
        contact_window_opened:
          name: "🚪 Contact Sensor For Open Window (Full Ventilation)"
          description: >-
            Contact sensor of a door or window handle for detecting <ins>total opening</ins>.
            If this sensor switches to on/true, the cover is <ins>fully opened</ins>.
            At the same time, a lockout protection is <ins>always</ins> activated.
            The cover is not closed and the sun shading is not activated when the contact is open.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/contacts#contact_window_opened).
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - binary_sensor
                    - input_boolean

        contact_window_tilted:
          name: "💨 Contact Sensor For Tilted Window (Partial Ventilation)"
          description: >-
            The contact sensor is required for the <ins>partial</ins> ventilation mode.
            If the contact changes to on/true, the cover is moved to the <ins>ventilation</ins> position.
            The prerequisite is that the cover is already closed.
            After the status changes to off/false, the close position is activated again.
            The same applies in the shading-out situation.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/contacts#contact_window_tilted).
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - binary_sensor
                    - input_boolean

        lockout_tilted_options:
          name: "💨 Lockout protection for window tilted"
          description: >-
            For the tilted window (or door, of course), you can individually specify where a lockout protection should be used.
          default: []
          selector:
            select:
              options:
                - label: "🛡️ Lockout protection when closing the cover"
                  value: "lockout_tilted_closing"
                - label: "🛡️ Lockout protection when starting the sun shading"
                  value: "lockout_tilted_shading_start"
                - label: "🛡️ Lockout protection when the sun shading is ended"
                  value: "lockout_tilted_shading_end"
              sort: false
              multiple: true
              custom_value: false

        auto_ventilate_options:
          name: "💨 Ventilation Configuration"
          description: >-
            Various different ventilation options.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/contacts#auto_ventilate_options).
          default: []
          selector:
            select:
              options:
                - label: "💨 Disables the drive delay when ventilation starts (window opens/tilts)"
                  value: "ventilation_start_no_delay"
                - label: "💨 Enables a calculated delay after the window is closed"
                  value: "ventilation_delay_enabled"
                - label: "💨 Lower cover to ventilation position when window tilts and cover is above"
                  value: "ventilation_if_lower_enabled"
                - label: "💨 Using the ventilation position when the sun shading is ended (instead of opening it completely)"
                  value: "ventilation_after_shading_end"
                - label: "💨 Keep cover at open position when window goes from fully opened to tilted"
                  value: "ventilation_keep_open_on_full_to_tilt"
              multiple: true
              sort: false
              custom_value: false
              mode: list

        contact_delay_trigger:
          name: "🕛 Contact Trigger Delay"
          description: >-
            How many seconds must the status of the contact sensors be valid for the automation to trigger?

            ⚠️ **Race Condition Protection:**
            If you have multiple contact sensors (e.g., window sensor + lock sensor) that can change
            simultaneously, increase this value to prevent race conditions.

            **Symptoms of race conditions:**
            - Cover closes despite lockout sensor being active
            - Check Home Assistant logs for "max_exceeded: warning" messages
            - If you see these warnings frequently, increase this delay
          default: 2
          selector:
            number:
              min: 0.0
              max: 10.0
              unit_of_measurement: seconds
              step: 0.1
              mode: slider

        contact_delay_status:
          name: "🕛 Contact Sensor Status Delay"
          description: >-
            How long the automation waits after a contact sensor trigger before
            re-evaluating all sensor states. After the delay, CCA reads the **live
            state** of all sensors, so the routing decision reflects the actual
            situation. Increase to 0.5–1 s if window contact and resident sensor
            change in quick succession or your sensor briefly reports intermediate
            states.
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/contacts#contact_delay_status).
          default: 3
          selector:
            number:
              min: 0.0
              max: 10.0
              unit_of_measurement: seconds
              step: 0.1
              mode: slider

    shading_section:
      name: "Sun Shading / Sun Protection"
      description: >-
        <center><p><small>
          Settings if the feature '🥵 - Sun Protection / Shading — Partially close when sun shines on window' has been activated above.
          <br />
          All these settings are optional / The attributes of default sun sensor (configured above) is used.
        </small></p></center>

        📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/contacts#contact_delay_status).
      icon: mdi:shield-sun-outline
      collapsed: true
      input:

        shading_conditions_start_and:
          name: "🌞 Shading START - Required Conditions (AND)"
          description: >-
            **Conditions that MUST ALL be met to START shading**

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_conditions_start_and).
          default:
            - cond_azimuth
            - cond_elevation
            - cond_brightness
            - cond_temp1
            - cond_temp2
            - cond_forecast_temp
            - cond_forecast_weather
          selector:
            select:
              multiple: true
              mode: dropdown
              options:
                - label: "📐 Sun Azimuth (within configured range)"
                  value: "cond_azimuth"
                - label: "📈 Sun Elevation (within configured range)"
                  value: "cond_elevation"
                - label: "🔆 Brightness (above start threshold)"
                  value: "cond_brightness"
                - label: "1️⃣ Temperature Sensor 1 (above threshold)"
                  value: "cond_temp1"
                - label: "2️⃣ Temperature Sensor 2 (above threshold)"
                  value: "cond_temp2"
                - label: "📊 Forecast Temperature (above threshold)"
                  value: "cond_forecast_temp"
                - label: "🌦️ Forecast Weather Conditions (matching configured conditions)"
                  value: "cond_forecast_weather"

        shading_conditions_start_or:
          name: "🌞 Shading START - Optional Conditions (OR)"
          description: >-
            **Conditions where AT LEAST ONE must be met to START shading**

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_conditions_start_or).
          default: []
          selector:
            select:
              multiple: true
              mode: dropdown
              options:
                - label: "📐 Sun Azimuth (within configured range)"
                  value: "cond_azimuth"
                - label: "📈 Sun Elevation (within configured range)"
                  value: "cond_elevation"
                - label: "🔆 Brightness (above start threshold)"
                  value: "cond_brightness"
                - label: "1️⃣ Temperature Sensor 1 (above threshold)"
                  value: "cond_temp1"
                - label: "2️⃣ Temperature Sensor 2 (above threshold)"
                  value: "cond_temp2"
                - label: "📊 Forecast Temperature (above threshold)"
                  value: "cond_forecast_temp"
                - label: "🌦️ Forecast Weather Conditions (matching configured conditions)"
                  value: "cond_forecast_weather"

        shading_conditions_end_and:
          name: "🌥️ Shading END - Required Conditions (AND)"
          description: >-
            **Conditions that MUST ALL become invalid to END shading**

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_conditions_end_and).
          default: []
          selector:
            select:
              multiple: true
              mode: dropdown
              options:
                - label: "📐 Sun Azimuth (outside configured range)"
                  value: "cond_azimuth"
                - label: "📈 Sun Elevation (outside configured range)"
                  value: "cond_elevation"
                - label: "🔆 Brightness (below end threshold)"
                  value: "cond_brightness"
                - label: "1️⃣ Temperature Sensor 1 (below threshold)"
                  value: "cond_temp1"
                - label: "2️⃣ Temperature Sensor 2 (below threshold)"
                  value: "cond_temp2"
                - label: "📊 Forecast Temperature (below threshold)"
                  value: "cond_forecast_temp"
                - label: "🌦️ Forecast Weather Conditions (no longer matching configured conditions)"
                  value: "cond_forecast_weather"

        shading_conditions_end_or:
          name: "🌥️ Shading END - Optional Conditions (OR)"
          description: >-
            **Conditions where AT LEAST ONE must become invalid to END shading**

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_conditions_end_or).
          default:
            - cond_azimuth
            - cond_elevation
            - cond_brightness
            - cond_temp1
            - cond_temp2
            - cond_forecast_temp
            - cond_forecast_weather
          selector:
            select:
              multiple: true
              mode: dropdown
              options:
                - label: "📐 Sun Azimuth (outside configured range)"
                  value: "cond_azimuth"
                - label: "📈 Sun Elevation (outside configured range)"
                  value: "cond_elevation"
                - label: "🔆 Brightness (below end threshold)"
                  value: "cond_brightness"
                - label: "1️⃣ Temperature Sensor 1 (below threshold)"
                  value: "cond_temp1"
                - label: "2️⃣ Temperature Sensor 2 (below threshold)"
                  value: "cond_temp2"
                - label: "📊 Forecast Temperature (below threshold)"
                  value: "cond_forecast_temp"
                - label: "🌦️ Forecast Weather Conditions (no longer matching configured conditions)"
                  value: "cond_forecast_weather"

        shading_azimuth_start:
          name: "📐 Sun Shading - Azimuth Start Value"
          description: "What is the minimum azimuth at which the sun hits the window? (Shading will start)"
          default: 95
          selector:
            number:
              min: 0
              max: 365
              unit_of_measurement: "°"

        shading_azimuth_end:
          name: "📐 Sun Shading - Azimuth End Value"
          description: "What is the maximum azimuth at which the sun hits the window? (Shading will stop)"
          default: 265
          selector:
            number:
              min: 0
              max: 365
              unit_of_measurement: "°"

        shading_elevation_min:
          name: "📈 Sun Shading - Elevation Minimum Value"
          description: "Starting from which elevation of the sun should the window be shaded? (Here it makes sense to consider surrounding buildings, trees, etc.)."
          default: 25
          selector:
            number:
              min: -90.0
              max: 90.0
              unit_of_measurement: °
              step: 0.1
              mode: slider

        shading_elevation_max:
          name: "📈 Sun Shading - Elevation Maximum Value"
          description: "What is the maximal elevation for elevation? (In most cases, 90 degrees is probably the most reasonable value. However, this can also be different due to surrounding buildings, etc.)."
          default: 90
          selector:
            number:
              min: -90.0
              max: 90.0
              unit_of_measurement: °
              step: 0.1
              mode: slider

        shading_brightness_sensor:
          name: "🔆 Sun Shading - Brightness Sensor"
          description: "This sensor is only used for shading."
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - sensor

        shading_sun_brightness_start:
          name: "🔆 Sun Shading - Brightness Start Value"
          description: "The minimum brightness value from which shading should start. (Must be above the value of brightness end!)"
          default: 35000
          selector:
            number:
              min: 0.0
              max: 100000.0
              unit_of_measurement: lx
              step: 1.0

        shading_sun_brightness_end:
          name: "🔆 Sun Shading - Brightness End Value"
          description: "The brightness value from which shading is no longer necessary. (Must be below the value of brightness start!)."
          default: 25000
          selector:
            number:
              min: 0.0
              max: 100000.0
              unit_of_measurement: lx
              step: 1.0

        shading_sun_brightness_hysteresis:
          name: "🔆 Sun Shading - Brightness Hysteresis"
          description: "Hysteresis value to prevent flickering. The brightness must exceed (start + hysteresis) to activate shading and fall below (end - hysteresis) to deactivate it. See: [FAQ: How does hysteresis work?](https://hvorragend.github.io/ha-blueprints/FAQ#q-how-does-hysteresis-work)"
          default: 0
          selector:
            number:
              min: 0.0
              max: 10000.0
              unit_of_measurement: lx
              step: 100.0

        shading_temperatur_sensor1:
          name: "1️⃣ Sun Shading - Temperature Sensor 1 (eg. indoor)"
          description: >-
            This is the first temperature sensor used for sun shading logic.<br />
            For example, you can use the current **indoor temperature** as a condition to trigger shading.
          selector:
            entity:
              filter:
                - domain:
                    - sensor
          default: []

        shading_min_temperatur1:
          name: "1️⃣ Sun Shading - Temperature Sensor 1 Minimum Value"
          description: "Minimum temperature for sensor 1 above which shading should occur."
          default: 18
          selector:
            number:
              min: 0
              max: 50.0
              step: 0.1
              mode: slider
              unit_of_measurement: "°C"

        shading_temperature_hysteresis1:
          name: "1️⃣ Sun Shading - Temperature Sensor 1 Hysteresis Value"
          description: "Shading will end only when temperature drops below (minimum - hysteresis value) to prevent frequent open/close cycles. See: [FAQ: How does hysteresis work?](https://hvorragend.github.io/ha-blueprints/FAQ#q-how-does-hysteresis-work)"
          default: 0.2
          selector:
            number:
              min: 0
              max: 5.0
              step: 0.1
              mode: slider
              unit_of_measurement: "°C"

        shading_temperatur_sensor2:
          name: "2️⃣ Sun Shading - Temperature Sensor 2 (eg. outdoor)"
          description: >-
            This is an optional secondary temperature sensor, typically used for **outdoor temperature**.
            <br />
            It can serve as an additional condition for sun shading logic.
            <br /><br />
            This sensor also plays a role in the calculation of the <ins>Sun Shading - Forecast Temperature Value</ins>. Please refer to that section for more details.
          default: []
          selector:
            entity:
              filter:
                - domain:
                    - sensor

        shading_min_temperatur2:
          name: "2️⃣ Sun Shading - Temperature Sensor 2 Minimum Value"
          description: "Minimum temperature for sensor 2 above which shading should occur."
          default: 18
          selector:
            number:
              min: 0.0
              max: 50.0
              step: 0.1
              mode: slider
              unit_of_measurement: "°C"

        shading_temperature_hysteresis2:
          name: "2️⃣ Sun Shading - Temperature Sensor 2 Hysteresis Value"
          description: "Shading will end only when temperature drops below (minimum - hysteresis value) to prevent frequent open/close cycles. See: [FAQ: How does hysteresis work?](https://hvorragend.github.io/ha-blueprints/FAQ#q-how-does-hysteresis-work)"
          default: 0.2
          selector:
            number:
              min: 0
              max: 5.0
              step: 0.1
              mode: slider
              unit_of_measurement: "°C"

        shading_forecast_sensor:
          name: "📊 Sun Shading - Forecast Weather Entity"
          description: >-
            Weather entity for forecast data (temperature & conditions).
            This is the primary and recommended method for forecast-based shading.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_forecast_sensor).
          default: []
          selector:
            entity:
              filter:
                - domain: weather

        shading_forecast_type:
          name: "📊 Sun Shading - Forecast Source"
          description: >-
            Use the **daily** (recommended) or **hourly** weather forecast, or the current
            weather attributes instead of the forecast service. Requires the weather entity
            configured above; ignored when using the direct temperature sensor below.
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_forecast_type).
          default: daily
          selector:
            select:
              options:
                - label: "Use the daily weather forecast service"
                  value: "daily"
                - label: "Use the hourly weather forecast service"
                  value: "hourly"
                - label: "Do not use a weather forecast, but the current weather attributes"
                  value: "weather_attributes"

        shading_forecast_temp_sensor:
          name: "📊 Sun Shading - Direct Temperature Sensor (Alternative)"
          description: >-
            **Alternative method:** Use a sensor that directly provides forecasted max temperature.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_forecast_temp_sensor).

          default: []
          selector:
            entity:
              filter:
                - domain: sensor

        shading_forecast_temp:
          name: "📊 Sun Shading - Forecast Temperature Value"
          description: >-
              This setting defines the <strong>minimum temperature threshold</strong> based on the forecast at which shading should be activated.
              If the forecasted temperature exceeds this value, the shading system will respond accordingly.

              - Minimum temperature threshold for shading activation.

              - Works with both weather entity and temperature sensor.

              - Leave empty to disable temperature-based forecast shading.

              📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_forecast_temp).
          default: []
          selector:
            number:
              min: 0.0
              max: 50.0
              step: 0.1
              mode: slider
              unit_of_measurement: "°C"

        shading_forecast_temp_hysteresis:
          name: "📊 Sun Shading - Forecast Temperature Hysteresis"
          description: >-
              Prevents frequent on/off cycles near threshold.

              - Shading starts: forecast > (threshold + hysteresis)

              - Shading ends: forecast < (threshold - hysteresis)


              See: [FAQ: How does hysteresis work?](https://hvorragend.github.io/ha-blueprints/FAQ#q-how-does-hysteresis-work)
          default: 0
          selector:
            number:
              min: 0.0
              max: 5.0
              step: 0.1
              mode: slider
              unit_of_measurement: "°C"

        shading_weather_conditions:
          name: "🌦️ Sun Shading - Weather Conditions"
          description: >-
            Check the following weather conditions when activating the shading.
            Be cautious when making your selection, as weather forecasts may not always be accurate and could lead to incorrect shading decisions.
            And as mentioned above, weather conditions can only be checked if a weather entity has been configured under ‘Forecast Weather Sensor’.
            <br /><br />
            **Only works with weather entity, not with temperature sensor.**
            <br />
            Be cautious: weather forecasts may not always be accurate.
          default: []
          selector:
            select:
              multiple: true
              options:
                - "clear-night"
                - "clear"
                - "cloudy"
                - "fog"
                - "hail"
                - "lightning"
                - "lightning-rainy"
                - "partlycloudy"
                - "pouring"
                - "rainy"
                - "snowy"
                - "snowy-rainy"
                - "sunny"
                - "windy"
                - "windy-variant"
                - "exceptional"

        shading_config:
          name: "🥵 Sun Shading - Configuration"
          description: >-
            These options allow you to fine-tune how the system handles temperature-based shading.
            <p><em>Click on the titles to get further help.</em></p>
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_config).
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_config).
          default: []
          selector:
            select:
              options:
                - label: "Independent Shading via Temperature Comparison"
                  value: "shading_temp_comparison_independent"
                - label: "Also trigger if 'Temperature Sensor 2' exceeds 'Forecast Temperature Value'"
                  value: "shading_compare_forecast_with_sensor2"
              multiple: true
              sort: false
              custom_value: false
              mode: list

        shading_independent_temp:
          name: "🥵 Sun Shading - Independent Temperature Threshold"
          description: >-
            Temperature threshold used exclusively by the <em>"Independent Shading via Temperature Comparison"</em> mode.
            Shading is activated independently of all other conditions (brightness, sun azimuth <em>and</em> elevation, etc.) when either the
            forecasted temperature or (if enabled) <em>"Temperature Sensor 2"</em> exceeds this value.
            <br /><br />
            Set this lower than <em>"Forecast Temperature Value"</em> to allow the independent path to trigger on warmer-than-average
            days without tightening the normal forecast gate.
          default: 25
          selector:
            number:
              min: 0.0
              max: 50.0
              step: 0.5
              mode: slider
              unit_of_measurement: "°C"

        shading_waitingtime_start:
          name: "🥵 Sun Shading - Start Waiting Time"
          description: >-
            Waiting time between the initial shading trigger and the actual cover movement.
            After this time expires, <ins>all</ins> configured start conditions (AND + OR) are re-checked.
            The cover only moves if conditions are <strong>still valid</strong> at execution time.
            This waiting time is also used for the periodic condition checks within the retry loop.
            <br /><br />
            <strong>If shading stays at "pending" and never executes:</strong> The conditions were no longer met after the waiting time expired. Check the automation trace for <em>t_shading_start_execution</em>.
          default: 300
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: seconds

        shading_start_max_duration:
          name: "🥵 Sun Shading - Maximum duration for shading start retry loop"
          description: |
            Maximum time to keep retrying shading start conditions after initial trigger.
            The Start Waiting Time is used for the periodic condition checks during this retry loop.
            If conditions remain unstable for longer than this timeout, the retry loop is stopped.
            Shading will not start and waits for a new shading start trigger.

            **Use case:** Prevents automation from being stuck in "waiting for stable conditions"
            when weather is highly unstable (rapidly changing clouds).

            **0 = disabled** (no periodic retry, stops immediately - old "trigger_reset" behavior)
            **Recommended: 3600-7200 seconds (1-2 hours)**
          default: 7200
          selector:
            number:
              min: 0
              max: 14400
              step: 300
              unit_of_measurement: "seconds"

        shading_waitingtime_end:
          name: "🥵 Sun Shading - End Waiting Time"
          description: >-
            To avoid excessive load on the motor, a waiting time can be defined here before the shading is ended.
            Shading ends if one of the conditions is not fulfilled for the entire waiting time.
            This waiting time is also used for the periodic condition checks within the retry loop.
          default: 300
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: seconds

        shading_end_max_duration:
          name: "🥵 Sun Shading - Maximum duration for shading end retry loop"
          description: |
            Maximum time to keep retrying shading end conditions after initial trigger.
            The End Waiting Time is used for the periodic condition checks during this retry loop.
            If conditions remain unstable for longer than this timeout, the retry loop is stopped.
            Shading remains active and waits for a new shading end trigger.

            **Use case:** Prevents automation from being stuck in "waiting for stable conditions"
            when weather is highly unstable (rapidly changing clouds).

            **0 = disabled** (no periodic retry, behaves like old version)
            **Recommended: 3600-7200 seconds (1-2 hours)**
          default: 7200
          selector:
            number:
              min: 0
              max: 14400
              step: 300
              unit_of_measurement: "seconds"

        shading_end_immediate_by_sun_position:
          name: "🥵 End Sun Shading - Immediately When Out Of Range"
          description: >-
            Speeds up the END of shading: once the sun leaves the azimuth or elevation range,
            shading ends after only a few seconds instead of waiting for the configured end
            waiting time. Only affects the *timing* — "Sun Azimuth" and/or "Sun Elevation"
            must still be part of your END conditions.
            <br />
            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/shading#shading_end_immediate_by_sun_position).
          default: false
          selector:
            boolean: {}

    resident_section:
      name: "Resident Settings"
      description: >-
        <center><p><small>
          <br />
          (1) The purpose of resident mode is to the close the cover (without checking the defined times) when the resident sensor switches to ‘on/true’. For example, when a resident goes to sleep.
          <br />
          (2) The cover will stay closed as long as the sensor remains in this state.
          <br />
          (3) When the resident sensor switches to ‘off/false’, the cover is automatically opened in the morning.
          <br />
          (4) In addition, the usual automatic opening of the cover is prevented as long as the sensor is set to ‘on/true’ or the resident.
          <br /><br />
          All these settings are optional.
        </small></p></center>
      icon: mdi:human-male-female
      collapsed: true
      input:
        resident_sensor:
          name: "🛌 Resident Sensor"
          description: >-
            You can use this to define a resident for the room.

            If the sensor has no status (e.g. after a restart), the automation continues with the last known presence instead of assuming that nobody is there.
          default: []
          selector:
            entity:
              domain:
                - input_boolean
                - binary_sensor
                - switch

        resident_config:
          name: "🛌 Resident Configuration"
          description: |
            Configure how the automation responds to resident sensor changes.

            - **Opening enabled**: Cover opens when resident wakes up, but only if time, brightness, and sun elevation conditions are met
            - **Closing enabled**: Cover closes when resident goes to sleep (immediate, ignores other conditions)
          default: []
          selector:
            select:
              options:
                - label: "🔼 Enable automatic opening when resident wakes up (respects all opening conditions)"
                  value: "resident_opening_enabled"
                - label: "🔻 Enable automatic closing when resident goes to sleep (immediate)"
                  value: "resident_closing_enabled"
                - label: "🥵 Allow sun protection when resident is still present"
                  value: "resident_allow_shading"
                - label: "🔼 Allow opening the cover when resident is still present"
                  value: "resident_allow_opening"
                - label: "💨 Allow ventilation when resident is still present"
                  value: "resident_allow_ventilation"
              multiple: true
              sort: false
              custom_value: false
              mode: list

    override_section:
      name: "Manual Override"
      description: >-
        <br />
      icon: mdi:debug-step-over
      collapsed: true
      input:
        ignore_after_manual_config:
          name: "🖐️ Ignoring/override after manual position changes"
          description: >-
            Ignore or override the following actions after manual position changes.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/override#ignore_after_manual_config).

          default: []
          selector:
            select:
              options:
                - label: "🔼 Ignore/override next automatic opening after manual position changes"
                  value: "ignore_opening_after_manual"
                - label: "🔻 Ignore/override next automatic closing after manual position changes"
                  value: "ignore_closing_after_manual"
                - label: "💨 Ignore/override next automatic ventilation after manual position changes"
                  value: "ignore_ventilation_after_manual"
                - label: "🥵 Ignore/override next automatic sun shading after manual position changes"
                  value: "ignore_shading_after_manual"
              multiple: true
              sort: false
              custom_value: false
              mode: list

        reset_override_config:
          name: "🗑️ Reset manual override"
          description: >-
            If the detection of the manual position change was activated above, you may need a way to reset this status.
            Otherwise, the next cover movements will be permanently ignored or overridden.
            Or you have not activated an individual action, e.g. when closing the covers, which resets the status.
            <br /><br />
            You can select **multiple** reset mechanisms — the first one whose condition is met clears the override.
            Leave empty to disable all timed resets.
          default: []
          selector:
            select:
              options:
                - label: "Reset at a specified time (see below)"
                  value: "reset_fixed_time"
                - label: "Reset after a timeout in minutes (see below)"
                  value: "reset_timeout"
                - label: "Reset in position (see below)"
                  value: "reset_in_position"
              multiple: true
              sort: false
              custom_value: false
              mode: list

        reset_override_time:
          name: "🗑️ Time to reset manual override"
          description: "At what time do you want the manual detection to be reset?"
          default: "00:01:00"
          selector:
            time: {}

        reset_override_timeout:
          name: "🗑️ Number of minutes until reset manual override"
          description: "After how many minutes should it be reset?"
          default: 5
          selector:
            number:
              min: 0
              max: 1440
              unit_of_measurement: minutes
        
        reset_override_position:
          name: "🗑️ Position for reset manual override"
          description: "At which position (+- tolerance) should it be reset? Typically, these are 'open' or 'closed' positions."
          default: 100
          selector:
            number:
              min: 0
              max: 100
              unit_of_measurement: "%"

        reset_override_position_dwell:
          name: "🗑️ Dwell time at reset position (minutes)"
          description: "How long must the cover stay at the reset position (± tolerance) before the manual override is cleared? Only applies to the 'Reset in position' option."
          default: 5
          selector:
            number:
              min: 0
              max: 1440
              unit_of_measurement: minutes

    delay_section:
      description: >-
        <center><p><small>
          Take into account that, for example, waiting times are added when brightness changes or shading is started.
          <br />
          It is therefore better to use smaller values here. It is only a matter of separating the different covers in terms of time.
        </small></p></center>
      name: "Delay Settings"
      icon: mdi:timer-outline
      collapsed: true
      input:
        drive_delay_fix:
          name: "🕛 Fixed Drive Delay"
          description: >-
            Fixed drive delay to avoid radio interferences.
            <br /><br />`Optional`
          default: 0
          selector:
            number:
              min: 0.0
              max: 600.0
              unit_of_measurement: seconds
              step: 1.0
              mode: slider

        drive_delay_random:
          name: "🕛 Random Drive Delay"
          description: >-
            Additional random delay.
            <br /><br />`Optional`
          default: 5
          selector:
            number:
              min: 0.0
              max: 600.0
              unit_of_measurement: seconds
              step: 1.0
              mode: slider

    condition_section:
      name: "Additional Conditions"
      description: >-
        <center><p><small>
          All these settings are optional
        </small></p></center>
      icon: mdi:help-rhombus-outline
      collapsed: true
      input:
        auto_global_condition:
          name: "❓ Additional Condition for the entire automation"
          description: >-
            This condition allows you to control the execution of the <ins>entire</ins> automation dynamically and outside of the blueprint configuration.
            With this option you could enable a party mode.
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
            <br /><br />
            Forcing Open/Close/Shading/Ventilation is therefore only possible if this condition remains empty or becomes valid.
          default: []
          selector:
            condition: {}

        auto_up_condition:
          name: "🔼 Additional Condition For Opening The Cover"
          description: >-
            This condition can be used to dynamically control the <ins>opening</ins> of the cover.
            You can use this, for example, if the covers normally don't open, but you really want to do it on vacation.
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
          default: []
          selector:
            condition: {}

        auto_down_condition:
          name: "🔻 Additional Condition For Closing The Cover"
          description: >-
            This condition can be used to dynamically control the <ins>closing</ins> of the cover.
            You can use this, for example, at Christmas time or if you want the covers to behave differently while on vacation.
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
          default: []
          selector:
            condition: {}

        auto_ventilate_condition:
          name: "💨 Additional Condition For Activating Ventilation"
          description: >-
            This condition can be used to dynamically control the <ins>start of the ventilation</ins> of the cover.
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
          default: []
          selector:
            condition: {}

        auto_ventilate_end_condition:
          name: "💨 Additional Condition For Disabling Ventilation"
          description: >-
            This condition can be used to dynamically control the <ins>end of the ventilation</ins> of the cover.
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
          default: []
          selector:
            condition: {}

        auto_shading_start_condition:
          name: "🥵 Additional Condition When Activating Sun Shading"
          description: >-
            This condition can be used to dynamically control the <ins>shading-IN-automation</ins> of the cover.
            This can be useful if you want to temporarily disable automation (e.g. because of control by other automations).
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
            <br />
            Another example: Here you could also set that the shading is only triggered in the summer season.
          default: []
          selector:
            condition: {}

        auto_shading_tilt_condition:
          name: "🥵 Additional Condition For Sun Shading Tilt"
          description: >-
            This condition can be used to dynamically control the <ins>shading_tilt-IN-automation</ins>
            of the cover. This can be useful if you want to temporarily disable automation
            (e.g. because of control by other automations). <br /> Another example:
            Here you could also set that the tilting is only triggered in the summer season.
            <br /><br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
          default: []
          selector:
            condition: {}

        auto_shading_end_condition:
          name: "🥵 Additional Condition When Deactivating Sun Shading"
          description: >-
            This condition can be used to dynamically control the <ins>shading-OUT-automation</ins> of the cover.
            This can be useful if you want to temporarily disable automation (e.g. because of control by other automations).
            <br />
            If the result of this condition is <ins>true</ins>, the automation will continue.<br />
            The result of the conditions must be <ins>false</ins>, for the automation to stop in this sequence.
          default: []
          selector:
            condition: {}

    force_section:
      name: "Force Features"
      description: >-
        <center><p><small>
          Emergency override controls for weather protection and special scenarios
          <br />
          Force functions allow you to immediately move covers to specific positions, overriding all other automation logic.
          <br />
          Use cases include: rain protection, wind protection, frost prevention, or temporary manual control.
          <br />
          📖 See: <a href="https://hvorragend.github.io/ha-blueprints/FAQ#q-how-does-a-force-function-work">FAQ: How does a force function work?</a>
          <br />
          <br />
          All settings in this section are optional
        </small></p></center>
      icon: mdi:arm-flex
      collapsed: true
      input:
        auto_recover_after_force:
          name: "🔙 Return to Target State After Force Disable"
          description: >-
            Seamless control with automatic recovery: When enabled, the cover automatically returns to its intended position when a force function is disabled.

            📖 More details in the [CCA Handbook](https://hvorragend.github.io/ha-blueprints/handbook/force#auto_recover_after_force).
          default: auto_recover_disabled
          selector:
            select:
              options:
                - label: "✅ Enable Automatic Return to Target State"
                  value: "auto_recover_enabled"
                - label: "❌ Disable Automatic Return to Target State"
                  value: "auto_recover_disabled"
              multiple: false
              sort: false
              custom_value: false
              mode: list

        force_pause:
          name: "⏸️ Force Pause (Suspend Automatic Actions)"
          description: >-
            If the status of this entity changes to on or true, all automatic cover
            movements are suspended immediately. The background state (target positions)
            is still tracked continuously in the helper — even while paused.

            When this entity turns off again, the cover **immediately returns** to its
            correct target position — no waiting for the next scheduled trigger.

            💡 **Tip:** Use an `input_boolean` as a manual/automatic toggle. Unlike
            putting a switch in the global condition (which blocks helper state updates
            too), this force pause only blocks cover movement. The helper always
            reflects the correct background state, so resuming is instant and reliable.
          default: []
          selector:
            entity:
              domain:
                - input_boolean
                - switch

        auto_up_force:
          name: "🔼 Force Immediate Opening via Entity"
          description: >-
            If the status of this entity changes to on or true, the cover is opened immediately and without further checking.

            If the entity has no status (e.g. during a restart), the force function is not cancelled — the automation keeps the last known one until the entity reports again.
          default: []
          selector:
            entity:
              domain:
                - input_boolean
                - binary_sensor
                - switch

        auto_down_force:
          name: "🔻 Force Immediate Closing via Entity"
          description: >-
            If the status of this entity changes to on or true, the cover is closed immediately and without further checking.

            If the entity has no status (e.g. during a restart), the force function is not cancelled — the automation keeps the last known one until the entity reports again.
          default: []
          selector:
            entity:
              domain:
                - input_boolean
                - binary_sensor
                - switch

        auto_ventilate_force:
          name: "💨 Force Immediate Ventilation via Entity"
          description: >-
            If the status of this entity changes to on or true, the cover is immediately set to ventilation mode and without further checking.

            If the entity has no status (e.g. during a restart), the force function is not cancelled — the automation keeps the last known one until the entity reports again.
          default: []
          selector:
            entity:
              domain:
                - input_boolean
                - binary_sensor
                - switch

        auto_shading_start_force:
          name: "🥵 Force Activation Sun Shading via Entity"
          description: >-
            If the status of this entity changes to on or true, the shading is immediately activated and without further checking.

            If the entity has no status (e.g. during a restart), the force function is not cancelled — the automation keeps the last known one until the entity reports again.
          default: []
          selector:
            entity:
              domain:
                - input_boolean
                - binary_sensor
                - switch

    actions_section:
      name: "Additional Actions"
      description: >-
        <center><p><small>
          All these settings are optional
        </small></p></center>
      icon: mdi:run
      collapsed: true
      input:
        auto_up_action_before:
          name: "🔼 Additional Actions Before Opening The Cover"
          description: "Additional actions to run <ins>before</ins> opening the cover"
          default: []
          selector:
            action: {}

        auto_up_action:
          name: "🔼 Additional Actions After Opening The Cover"
          description: "Additional actions to run <ins>after</ins> opening the cover"
          default: []
          selector:
            action: {}

        auto_down_action_before:
          name: "🔻 Additional Actions Before Closing The Cover"
          description: "Additional actions to run <ins>before</ins> closing the cover"
          default: []
          selector:
            action: {}

        auto_down_action:
          name: "🔻 Additional Actions After Closing The Cover"
          description: "Additional actions to run <ins>after</ins> closing the cover"
          default: []
          selector:
            action: {}

        auto_ventilate_action_before:
          name: "💨 Additional Actions Before Ventilating The Cover"
          description: "Additional actions to run <ins>before</ins> ventilating the cover"
          default: []
          selector:
            action: {}

        auto_ventilate_action:
          name: "💨 Additional Actions After Ventilating The Cover"
          description: "Additional actions to run <ins>after</ins> ventilating the cover"
          default: []
          selector:
            action: {}

        auto_shading_start_action_before:
          name: "🥵 Additional Actions Before Activating Sun Shading"
          description: "Additional actions to run <ins>before</ins> activating sun shading"
          default: []
          selector:
            action: {}

        auto_shading_start_action:
          name: "🥵 Additional Actions After Activating Sun Shading"
          description: "Additional actions to run <ins>after</ins> activating sun shading"
          default: []
          selector:
            action: {}

        auto_shading_end_action_before:
          name: "🥵 Additional Actions Before Disabling Sun Shading"
          description: "Additional actions to run <ins>before</ins> disabling sun shading"
          default: []
          selector:
            action: {}

        auto_shading_end_action:
          name: "🥵 Additional Actions After Disabling Sun Shading"
          description: "Additional actions to run <ins>after</ins> disabling sun shading"
          default: []
          selector:
            action: {}

        auto_manual_action:
          name: "🖐️ Additional Actions After Manual Change"
          description: "Additional actions after a manual change to the covers"
          default: []
          selector:
            action: {}

        auto_override_reset_action:
          name: "🗑️ Additional Actions After Override Reset"
          description: "Additional actions to be taken after resetting the manual override"
          default: []
          selector:
            action: {}

    configcheck_section:
      name: "Configuration Check"
      description: >-
        <center><p><small>
        <strong>🔗 Use the <a href="https://hvorragend.github.io/ha-blueprints/validator/" target="_blank">Online Configuration Validator</a></strong>
        <br />
        Validate your YAML configuration for errors, typos, and deprecated parameters before deploying.
        <br />
        ✅ Instant feedback • 🔍 Typo detection • ⚠️ Migration guidance • 🔒 Privacy-friendly (client-side)
        </small></p></center>
      icon: mdi:invoice-text-check-outline
      collapsed: true
      input:
        check_config:
          name: "✔️ Check Configuration"
          description: >-
            With this boolean, you can enable or disable the basic plausibility check for the configuration.
            The check only takes place if the automation is executed manually.
            <br /><br />
            Use the <a href="https://hvorragend.github.io/ha-blueprints/validator/" target="_blank">online validator</a> for another validation.
          default: false
          selector:
            boolean: {}

        check_config_debuglevel:
          name: "✔️ Check Configuration - Debug level"
          description: >-
            Choose the debug level for Syslog messages in case of configuration issues
            <br />
            Please make sure that it suits your Home Assistant logger default level.
          default: "info"
          selector:
            select:
              multiple: false
              mode: dropdown
              options:
                - "critical"
                - "debug"
                - "error"
                - "info"
                - "warning"

    logging_section:
      name: "Logging"
      description: >-
        Optional logbook output for retrospective debugging. Each automation
        run writes one combined logbook entry containing the trigger, the
        resulting effective state, and a snapshot of all relevant sensor
        values. Useful when the 5-trace history is not enough to understand
        a cover's behavior over the day.
      icon: mdi:notebook-outline
      collapsed: true
      input:
        enable_logbook:
          name: "📓 Enable Logbook entries"
          description: >-
            When enabled, every automation run writes a single logbook entry
            with full context. Disabled by default to avoid noise in the
            Activities view. Toggle on while debugging a configuration.
          default: false
          selector:
            boolean: {}
        trace_count:
          name: "📜 Number of stored traces"
          description: >-
            Set how many traces Home Assistant shall keep for this automation.
          default: 5
          selector:
            number:
              min: 1
              max: 100
              step: 1

################################################################################
# TRIGGER VARIABLES
################################################################################

trigger_variables:
  blind: !input blind
  cover_type: !input cover_type
  is_awning: "{{ cover_type == 'awning' }}"
  resident_sensor: !input resident_sensor

  # Position source configuration
  position_source: !input position_source
  custom_position_sensor: !input custom_position_sensor

  # Positions
  open_position: !input open_position
  close_position: !input close_position
  ventilate_position: !input ventilate_position
  shading_position: !input shading_position
  shading_position_alt: !input shading_position_alt
  shading_position_alt_entity: !input shading_position_alt_entity
  position_tolerance: !input position_tolerance

  # Tilt positions
  open_tilt_position: !input open_tilt_position
  close_tilt_position: !input close_tilt_position
  ventilate_tilt_position: !input ventilate_tilt_position
  tilt_position_tolerance: !input tilt_position_tolerance
  shading_tilt_elevation_1: !input shading_tilt_elevation_1
  shading_tilt_elevation_2: !input shading_tilt_elevation_2
  shading_tilt_elevation_3: !input shading_tilt_elevation_3
  shading_tilt_position_0: !input shading_tilt_position_0
  shading_tilt_position_1: !input shading_tilt_position_1
  shading_tilt_position_2: !input shading_tilt_position_2
  shading_tilt_position_3: !input shading_tilt_position_3

  # Feature option selections
  auto_options: !input auto_options
  cover_tilt_config: !input cover_tilt_config
  cover_tilt_reposition_config: !input cover_tilt_reposition_config
  is_cover_tilt_enabled: "{{ not is_awning and 'cover_tilt_enabled' in cover_tilt_config }}"

  # Tilt wait mode configuration
  tilt_wait_mode: !input cover_tilt_wait_mode
  tilt_wait_timeout: !input cover_tilt_wait_timeout
  is_tilt_wait_idle_mode: "{{ tilt_wait_mode == 'wait_idle' }}"

  # Time configuration
  time_up_early: !input time_up_early
  time_up_early_non_workday: !input time_up_early_non_workday
  time_up_late: !input time_up_late
  time_up_late_non_workday: !input time_up_late_non_workday
  time_down_early: !input time_down_early
  time_down_early_non_workday: !input time_down_early_non_workday
  time_down_late: !input time_down_late
  time_down_late_non_workday: !input time_down_late_non_workday
  workday_sensor_today: !input workday_sensor
  workday_sensor_tomorrow: !input workday_sensor_tomorrow
  time_control: !input time_control

  # Calendar configuration
  calendar_entity: !input calendar_entity
  calendar_open_title: !input calendar_open_title
  calendar_close_title: !input calendar_close_title
  calendar_open_title_lc: "{{ (calendar_open_title | default('')) | lower | trim }}"
  calendar_close_title_lc: "{{ (calendar_close_title | default('')) | lower | trim }}"
  is_calendar_enabled: "{{ 'time_control_enabled' in auto_options and 'time_control_calendar' in time_control and calendar_entity != [] }}"

  # Brightness configuration
  default_brightness_sensor: !input default_brightness_sensor
  brightness_up: !input brightness_up
  brightness_down: !input brightness_down
  brightness_hysteresis: !input brightness_hysteresis

  # Sun configuration
  brightness_sun_operator: !input brightness_sun_operator
  default_sun_sensor: !input default_sun_sensor
  sun_elevation_mode: !input sun_elevation_mode
  sun_elevation_up: !input sun_elevation_up
  sun_elevation_down: !input sun_elevation_down

  # Dynamic sun elevation sensors
  sun_elevation_up_sensor: !input sun_elevation_up_sensor
  sun_elevation_down_sensor: !input sun_elevation_down_sensor

  # Ventilation/Contact sensors
  contact_window_opened: !input contact_window_opened
  contact_window_tilted: !input contact_window_tilted
  lockout_tilted_options: !input lockout_tilted_options

  # Shading configuration
  shading_azimuth_start: !input shading_azimuth_start
  shading_azimuth_end: !input shading_azimuth_end
  shading_elevation_min: !input shading_elevation_min
  shading_elevation_max: !input shading_elevation_max
  shading_sun_brightness_start: !input shading_sun_brightness_start
  shading_sun_brightness_end: !input shading_sun_brightness_end
  shading_sun_brightness_hysteresis: !input shading_sun_brightness_hysteresis

  # Shading sensors
  shading_brightness_sensor: !input shading_brightness_sensor
  shading_temperatur_sensor1: !input shading_temperatur_sensor1
  shading_temperatur_sensor2: !input shading_temperatur_sensor2
  shading_min_temperatur1: !input shading_min_temperatur1
  shading_min_temperatur2: !input shading_min_temperatur2
  shading_temperature_hysteresis1: !input shading_temperature_hysteresis1
  shading_temperature_hysteresis2: !input shading_temperature_hysteresis2

  # Shading forecast configuration
  shading_forecast_sensor: !input shading_forecast_sensor
  shading_forecast_temp_sensor: !input shading_forecast_temp_sensor
  shading_forecast_type_raw: !input shading_forecast_type
  shading_forecast_type: "{{ shading_forecast_type_raw if shading_forecast_type_raw not in ['', none, []] else 'daily' }}"
  shading_forecast_temp: !input shading_forecast_temp
  shading_forecast_temp_hysteresis: !input shading_forecast_temp_hysteresis
  shading_independent_temp: !input shading_independent_temp
  shading_weather_conditions: !input shading_weather_conditions

  # Shading condition selections
  shading_conditions_start_and: !input shading_conditions_start_and
  shading_conditions_start_or: !input shading_conditions_start_or
  shading_conditions_end_and: !input shading_conditions_end_and
  shading_conditions_end_or: !input shading_conditions_end_or

  # Lockout protection flag computation
  lockout_tilted_when_closing: "{{ 'lockout_tilted_closing' in lockout_tilted_options }}"
  lockout_tilted_when_shading_starts: "{{ 'lockout_tilted_shading_start' in lockout_tilted_options }}"
  lockout_tilted_when_shading_ends: "{{ 'lockout_tilted_shading_end' in lockout_tilted_options }}"

  # Feature enable flag computation
  is_shading_enabled: "{{ 'auto_shading_enabled' in auto_options }}"
  is_up_enabled: "{{ 'auto_up_enabled' in auto_options }}"
  is_down_enabled: "{{ 'auto_down_enabled' in auto_options }}"
  is_brightness_enabled: "{{ 'auto_brightness_enabled' in auto_options }}"
  is_sun_elevation_enabled: "{{ 'auto_sun_enabled' in auto_options }}"
  use_and_operator: "{{ brightness_sun_operator == 'and' }}"
  is_time_field_enabled: "{{ 'time_control_enabled' in auto_options and 'time_control_input' in time_control }}"
  # The time_control_enabled checkbox in auto_options is the single authoritative switch (#544).
  # Unchecking it disables all time windows; the Time Control Type selector only picks the source
  # (time fields vs calendar) while time control is on. Deliberate breaking change: configs from
  # before the options consolidation (~2026.05) do not store time_control_enabled and therefore
  # lose time control until re-saved - documented prominently in CHANGELOG/FAQ. The legacy
  # selector value 'time_control_disabled' is no longer evaluated (its stored configs are
  # disabled via the missing checkbox anyway, matching their original intent).
  is_time_control_disabled: "{{ 'time_control_enabled' not in auto_options }}"
  # An open base state ('opn') only reflects a real "schedule wants open" intent when an
  # opening schedule actually exists. Without one, bas stays at its 'opn' init default forever
  # (it is only ever driven to 'cls' by the scheduled close handler), so the VENT floor could
  # never apply. Used by effective_state to let VENT beat a non-scheduled bas='opn'.
  is_opening_scheduled: "{{ is_up_enabled and not is_time_control_disabled }}"

  # Ventilation and tilt are only available for blinds, not awnings
  is_ventilation_enabled: "{{ not is_awning and 'auto_ventilate_enabled' in auto_options }}"

  # Reset override flag computation
  reset_override_config: !input reset_override_config
  reset_override_time: !input reset_override_time
  reset_override_timeout: !input reset_override_timeout
  reset_override_position: !input reset_override_position
  reset_override_position_dwell: !input reset_override_position_dwell
  is_reset_fixed_time: "{{ 'reset_fixed_time' in reset_override_config }}"
  is_reset_timeout: "{{ 'reset_timeout' in reset_override_config }}"
  is_reset_position: "{{ 'reset_in_position' in reset_override_config }}"
  is_reset_disabled: "{{ not is_reset_fixed_time and not is_reset_timeout and not is_reset_position }}"

  # Force entities
  auto_up_force: !input auto_up_force
  auto_down_force: !input auto_down_force
  auto_ventilate_force: !input auto_ventilate_force
  auto_shading_start_force: !input auto_shading_start_force

  # Force pause
  force_pause: !input force_pause

  # Cover status helper configuration
  cover_status_helper: !input cover_status_helper

  # Invalid states list - Shared constant
  invalid_states:
    - ''                    # Empty string
    - 'unavailable'         # Entity unavailable
    - 'unknown'             # State unknown
    - 'none'                # Python none (lowercase)
    - 'None'                # Python None (capitalized)
    - 'null'                # JSON null
    - 'query failed'        # Failed sensor queries
    - []                    # Empty list

  # Entities without which no decision is possible - the automation is blocked while
  # any of them has no usable state. Battery devices (window contacts, resident) and
  # condition-only sources are deliberately not listed; they fall back instead.
  # The status helper has its own gate (it must stay repairable).
  critical_entities: >-
    {{ ([blind] if blind != [] else []) +
       ([custom_position_sensor] if position_source == 'custom_sensor' and custom_position_sensor != [] else []) }}

################################################################################
# VARIABLES
################################################################################

variables:
  version: "2026.07.13"

  # Force pause
  is_paused: "{{ force_pause != [] and states(force_pause) in ['on', 'true'] }}"

  # Blind
  blind_entities: "{{ expand(blind) | map(attribute='entity_id') | list }}"

  # Get current position based on configuration
  current_position: >-
    {% set source = position_source %}
    {% if source == 'current_position_attr' %}
      {{ state_attr(blind, 'current_position') | int(default=101) }}
    {% elif source == 'position_attr' %}
      {{ state_attr(blind, 'position') | int(default=101) }}
    {% elif source == 'custom_sensor' and custom_position_sensor != [] %}
      {{ states(custom_position_sensor) | int(default=101) }}
    {% else %}
      {{ 101 }}
    {% endif %}

  # Same for tilt if enabled
  current_tilt_position: "{{ state_attr(blind, 'current_tilt_position') | int(default=101) }}"

  # Effective shading position: alternate position while the gating entity is 'on',
  # otherwise the normal shading position (also the fallback when unset)
  effective_shading_position: >-
    {{ shading_position_alt
       if (shading_position_alt != [] and shading_position_alt_entity != []
           and states(shading_position_alt_entity) == 'on')
       else shading_position }}

  # COVER TYPE & POSITION COMPARISON LOGIC
  # Position comparison results
  # Handles both blind (0%=closed) and awning (0%=retracted) logic automatically
  position_comparisons:
    # Current position vs targets (considers awning inversion)
    current_above_open: "{{ current_position < open_position if is_awning else current_position > open_position }}"
    current_above_close: "{{ current_position < close_position if is_awning else current_position > close_position }}"
    current_above_shading: "{{ current_position < effective_shading_position if is_awning else current_position > effective_shading_position }}"
    current_above_ventilate: "{{ current_position < ventilate_position if is_awning else current_position > ventilate_position }}"

    current_below_open: "{{ current_position > open_position if is_awning else current_position < open_position }}"
    current_below_close: "{{ current_position > close_position if is_awning else current_position < close_position }}"
    current_below_shading: "{{ current_position > effective_shading_position if is_awning else current_position < effective_shading_position }}"
    current_below_ventilate: "{{ current_position > ventilate_position if is_awning else current_position < ventilate_position }}"

    # Position ordering (for config validation)
    open_above_close: "{{ open_position < close_position if is_awning else open_position > close_position }}"
    open_above_ventilate: "{{ open_position < ventilate_position if is_awning else open_position > ventilate_position }}"
    shading_above_close: "{{ effective_shading_position < close_position if is_awning else effective_shading_position > close_position }}"
    shading_below_open: "{{ effective_shading_position > open_position if is_awning else effective_shading_position < open_position }}"
    ventilate_above_close: "{{ ventilate_position < close_position if is_awning else ventilate_position > close_position }}"
    shading_below_ventilate: "{{ effective_shading_position > ventilate_position if is_awning else effective_shading_position < ventilate_position }}"

  current_sun_azimuth: "{{ state_attr(default_sun_sensor, 'azimuth') }}"
  current_sun_elevation: "{{ state_attr(default_sun_sensor, 'elevation') }}"

  # Current sun elevation thresholds (supports fixed, dynamic, and hybrid modes)
  sun_elevation_up_current: >-
    {% set mode = sun_elevation_mode %}
    {% set sensor = sun_elevation_up_sensor %}
    {% set fixed_value = sun_elevation_up | float %}
    {% set sensor_valid = sensor != [] and states(sensor) not in invalid_states and is_number(states(sensor)) %}
    {% if mode == 'dynamic' %}
      {% if sensor_valid %}
        {{ states(sensor) | float }}
      {% else %}
        {{ fixed_value }}
      {% endif %}
    {% elif mode == 'hybrid' %}
      {% if sensor_valid %}
        {{ (states(sensor) | float) + fixed_value }}
      {% else %}
        {{ fixed_value }}
      {% endif %}
    {% else %}
      {{ fixed_value }}
    {% endif %}

  sun_elevation_down_current: >-
    {% set mode = sun_elevation_mode %}
    {% set sensor = sun_elevation_down_sensor %}
    {% set fixed_value = sun_elevation_down | float %}
    {% set sensor_valid = sensor != [] and states(sensor) not in invalid_states and is_number(states(sensor)) %}
    {% if mode == 'dynamic' %}
      {% if sensor_valid %}
        {{ states(sensor) | float }}
      {% else %}
        {{ fixed_value }}
      {% endif %}
    {% elif mode == 'hybrid' %}
      {% if sensor_valid %}
        {{ (states(sensor) | float) + fixed_value }}
      {% else %}
        {{ fixed_value }}
      {% endif %}
    {% else %}
      {{ fixed_value }}
    {% endif %}

  is_today_off: "{{ workday_sensor_today != [] and is_state(workday_sensor_today, 'off') }}"
  is_tomorrow_off: "{{ workday_sensor_tomorrow != [] and is_state(workday_sensor_tomorrow, 'off') }}"
  is_tomorrow_on: "{{ workday_sensor_tomorrow != [] and is_state(workday_sensor_tomorrow, 'on') }}"

  is_cover_tilt_enabled_and_possible: "{{ is_cover_tilt_enabled and state_attr(blind, 'current_tilt_position') != none }}"
  is_cover_tilt_reposition_enabled: "{{ 'cover_tilt_reposition_enabled' in cover_tilt_reposition_config }}"

  # Delays and Timing
  drive_delay_fix: !input drive_delay_fix
  drive_delay_random: !input drive_delay_random
  drive_time: !input drive_time
  time_up_early_today: "{{ time_up_early_non_workday if is_today_off else time_up_early }}"
  time_up_late_today: "{{ time_up_late_non_workday if is_today_off else time_up_late }}"
  time_down_early_today: >-
    {{
      time_down_early_non_workday if is_tomorrow_off else
      time_down_early if is_tomorrow_on else
      time_down_early_non_workday if is_today_off else
      time_down_early
    }}
  time_down_late_today: >-
    {{
      time_down_late_non_workday if is_tomorrow_off else
      time_down_late if is_tomorrow_on else
      time_down_late_non_workday if is_today_off else
      time_down_late
    }}

  # SHADING TILT POSITION - Elevation-based selection
  # Determine tilt angle based on current sun elevation (multi-stage)
  shading_tilt_position: >-
    {% set elevation = current_sun_elevation | int(default=0) %}
    {% if elevation >= shading_tilt_elevation_3 | int %}
      {{ shading_tilt_position_3 | int }}
    {% elif elevation >= shading_tilt_elevation_2 | int %}
      {{ shading_tilt_position_2 | int }}
    {% elif elevation >= shading_tilt_elevation_1 | int %}
      {{ shading_tilt_position_1 | int }}
    {% else %}
      {{ shading_tilt_position_0 | int }}
    {% endif %}

  # POSITION CHECKERS - Single source of truth
  # Check if current position matches target (with tolerance and tilt validation)
  in_open_position: >-
    {% set min = open_position - position_tolerance %}
    {% set max = open_position + position_tolerance %}
    {{
      (current_position >= min and current_position <= max)
      and (
        (not is_cover_tilt_enabled_and_possible) or
        ((current_tilt_position - (open_tilt_position | int)) | abs <= tilt_position_tolerance)
      )
    }}

  in_close_position: >-
    {% set min = close_position - position_tolerance %}
    {% set max = close_position + position_tolerance %}
    {{
      (current_position >= min and current_position <= max)
      and (
        (not is_cover_tilt_enabled_and_possible) or
        ((current_tilt_position - (close_tilt_position | int)) | abs <= tilt_position_tolerance)
      )
    }}

  in_shading_position: >-
    {% set min = effective_shading_position - position_tolerance %}
    {% set max = effective_shading_position + position_tolerance %}
    {{
      is_shading_enabled
      and (current_position >= min and current_position <= max)
      and (
        (not is_cover_tilt_enabled_and_possible) or
        ((current_tilt_position - (shading_tilt_position | int)) | abs <= tilt_position_tolerance)
      )
    }}

  in_ventilate_position: >-
    {% set min = ventilate_position - position_tolerance %}
    {% set max = ventilate_position + position_tolerance %}
    {{
      is_ventilation_enabled
      and (current_position >= min and current_position <= max)
      and (
        (not is_cover_tilt_enabled_and_possible) or
        ((current_tilt_position - (ventilate_tilt_position | int)) | abs <= tilt_position_tolerance)
      )
    }}

  in_reset_override_position: >-
    {% set min = reset_override_position - position_tolerance %}
    {% set max = reset_override_position + position_tolerance %}
    {{ is_reset_position and current_position >= min and current_position <= max }}

  # Brightness and sun configuration
  brightness_time_duration: !input brightness_time_duration
  sun_time_duration: !input sun_time_duration

  # SHADING - Additional Configuration Flags
  # Shading timing and retry
  shading_waitingtime_start: !input shading_waitingtime_start
  shading_waitingtime_end: !input shading_waitingtime_end
  shading_start_max_duration: !input shading_start_max_duration
  shading_end_max_duration: !input shading_end_max_duration
  # shading_end_behavior: !input shading_end_behavior
  shading_config: !input shading_config

  # Additional shading configuration passthrough
  shading_end_immediate_by_sun_position: !input shading_end_immediate_by_sun_position
  is_shading_end_immediate_by_sun_position: "{{ shading_end_immediate_by_sun_position }}"

  # Forecast source determination
  # Priority: sensor > weather entity > attributes
  forecast_source:
    use_sensor: "{{ shading_forecast_temp_sensor != [] }}"
    use_weather: "{{ shading_forecast_sensor != [] and (shading_forecast_temp_sensor == [] or shading_forecast_temp_sensor in invalid_states) }}"
    prevent_service: "{{ 'weather_attributes' in shading_forecast_type }}"

  # Shading condition enablement
  # Which START conditions are enabled (combines AND + OR lists)
  shading_start_condition_enabled:
    azimuth: "{{ 'cond_azimuth' in shading_conditions_start_and or 'cond_azimuth' in shading_conditions_start_or }}"
    elevation: "{{ 'cond_elevation' in shading_conditions_start_and or 'cond_elevation' in shading_conditions_start_or }}"
    brightness: "{{ 'cond_brightness' in shading_conditions_start_and or 'cond_brightness' in shading_conditions_start_or }}"
    temp1: "{{ 'cond_temp1' in shading_conditions_start_and or 'cond_temp1' in shading_conditions_start_or }}"
    temp2: "{{ 'cond_temp2' in shading_conditions_start_and or 'cond_temp2' in shading_conditions_start_or }}"
    forecast_temp: "{{ 'cond_forecast_temp' in shading_conditions_start_and or 'cond_forecast_temp' in shading_conditions_start_or }}"
    forecast_weather: "{{ 'cond_forecast_weather' in shading_conditions_start_and or 'cond_forecast_weather' in shading_conditions_start_or }}"

  # Which END conditions are enabled (combines AND + OR lists)
  shading_end_condition_enabled:
    azimuth: "{{ 'cond_azimuth' in shading_conditions_end_and or 'cond_azimuth' in shading_conditions_end_or }}"
    elevation: "{{ 'cond_elevation' in shading_conditions_end_and or 'cond_elevation' in shading_conditions_end_or }}"
    brightness: "{{ 'cond_brightness' in shading_conditions_end_and or 'cond_brightness' in shading_conditions_end_or }}"
    temp1: "{{ 'cond_temp1' in shading_conditions_end_and or 'cond_temp1' in shading_conditions_end_or }}"
    temp2: "{{ 'cond_temp2' in shading_conditions_end_and or 'cond_temp2' in shading_conditions_end_or }}"
    forecast_temp: "{{ 'cond_forecast_temp' in shading_conditions_end_and or 'cond_forecast_temp' in shading_conditions_end_or }}"
    forecast_weather: "{{ 'cond_forecast_weather' in shading_conditions_end_and or 'cond_forecast_weather' in shading_conditions_end_or }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # Cover Status Helper – JSON parsing with v5 → v6 migration
  # ═══════════════════════════════════════════════════════════════════════════
  # v6 Compact Schema (stored in input_text, max 208 chars):
  # {"bas":"opn","shd":0,"pnd":"non","win":"cls","frc":"non","res":0,"man":0,"ts":{"opn":0,"cls":0,"shd":0,"due":0,"arm":0,"man":0},"v":6,"t":0}
  #
  # Field mapping (compact → internal):
  #   bas → base (opn/cls → open/close)
  #   shd → shade (1/0)
  #   pnd → pending phase (non/beg/end → none/start-armed/end-armed)
  #   win → window (cls/tlt/opn → closed/tilted/open)
  #   frc → force (non/opn/cls/shd/vnt → none/open/close/shade/vent)
  #   res → resident (1/0)
  #   man → manual (1/0)
  #   ts.opn → ts.open, ts.cls → ts.close, ts.shd → ts.shade
  #   ts.due → fire time of armed pending (used together with pnd)
  #   ts.arm → first-arming anchor of current retry sequence
  #   ts.man → ts.manual
  #
  # NOTE: in_shading_position compares against the dynamically computed
  #       shading_tilt_position. When the sun crosses a tilt-stage threshold the
  #       target briefly differs from the applied tilt until the tilt trigger
  #       re-drives. This is intentionally NOT stabilized via a persisted helper
  #       field — the helper holds logical state, not the last physical tilt.
  # ═══════════════════════════════════════════════════════════════════════════
  # Parses the helper JSON and normalises to v6 compact format.
  # Handles three cases: v5 → v6 migration, v6 pass-through, new/empty default.
  helper_json: >-
    {% set helper_state = states(cover_status_helper) if cover_status_helper != [] else 'unavailable' %}
    {% set helper_raw = helper_state | from_json(default={}) if helper_state not in invalid_states and helper_state | regex_match("((\[[^\}]+)?\{\s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") else {} %}
    {% set ts_now = as_timestamp(now()) | round(0) %}

    {% set is_v5 = helper_raw.v | default(0) == 5 %}
    {% set is_v6_compact = helper_raw.bas is defined and helper_raw.v is defined and helper_raw.v == 6 %}

    {% if is_v5 %}
      {% set v5_current =
        'vfull' if helper_raw.vfull.a | default(0) == 1 else
        'vpart' if helper_raw.vpart.a | default(0) == 1 else
        'shade' if helper_raw.shading.a | default(0) == 1 and helper_raw.shading.p | default(0) == 0 else
        'close' if helper_raw.close.a | default(0) == 1 else
        'open' if helper_raw.open.a | default(0) == 1 else
        'none'
      %}

      {% set v5_shs = helper_raw.shading.p | default(0) | int %}
      {% set v5_she = helper_raw.shading.q | default(0) | int %}
      {{
        {
          'bas': 'cls' if v5_current == 'close' else 'opn',
          'shd': 1 if v5_current == 'shade' else 0,
          'pnd': 'beg' if v5_shs > 0 else ('end' if v5_she > 0 else 'non'),
          'win': 'opn' if v5_current == 'vfull' else ('tlt' if v5_current == 'vpart' else 'cls'),
          'frc': 'non',
          'res': 0,
          'man': helper_raw.manual.a | default(0),
          'ts': {
            'opn': helper_raw.open.t | default(0),
            'cls': helper_raw.close.t | default(0),
            'shd': helper_raw.shading.t | default(0) if v5_current == 'shade' else 0,
            'due': v5_shs if v5_shs > 0 else v5_she,
            'arm': 0,
            'man': helper_raw.manual.t | default(0)
          },
          'v': 6,
          't': ts_now
        }
      }}
    {% elif is_v6_compact %}
      {% set raw_ts = helper_raw.ts | default({}) %}
      {{
        {
          'bas': helper_raw.bas | default('opn'),
          'shd': helper_raw.shd | default(0) | int,
          'pnd': helper_raw.pnd | default('non'),
          'win': helper_raw.win | default('cls'),
          'frc': helper_raw.frc | default('non'),
          'res': helper_raw.res | default(0) | int,
          'man': helper_raw.man | default(0) | int,
          'ts': {
            'opn': raw_ts.opn | default(0) | int,
            'cls': raw_ts.cls | default(0) | int,
            'shd': raw_ts.shd | default(0) | int,
            'due': raw_ts.due | default(0) | int,
            'arm': raw_ts.arm | default(0) | int,
            'man': raw_ts.man | default(0) | int
          },
          'v': 6,
          't': helper_raw.t | default(ts_now) | int
        }
      }}
    {% else %}
      {{
        {
          'bas': 'opn',
          'shd': 0,
          'pnd': 'non',
          'win': 'cls',
          'frc': 'non',
          'res': 0,
          'man': 0,
          'ts': {
            'opn': 0,
            'cls': 0,
            'shd': 0,
            'due': 0,
            'arm': 0,
            'man': 0
          },
          'v': 6,
          't': ts_now
        }
      }}
    {% endif %}

  # Resident configuration input - defined here so effective_state can reference it
  resident_config: !input resident_config

  # ═══════════════════════════════════════════════════════════════════════════
  # STATE MANAGER v6 - Centralized State Access with Priority Cascade
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # Priority Order (highest first):
  # 1. FORCE    → force != "none" → Force-Position
  # 2. LOCKOUT  → window == "open" → Open-Position (prevent lockout)
  # 3. BASE=OPN → base == "open" (scheduled) AND no shading/privacy/close-restriction → Open-Position
  # 4. VENT     → window == "tilted" AND allow_ventilate AND base would close/shade → Ventilate-Position
  # 5. PRIVACY  → resident == 1 AND closing_trigger → Close-Position
  # 6. SHADING  → shade == 1 AND allow_shade → Shading-Position
  # 7. BASE=CLS → base (respects allow_open for "open" state)
  #
  # Rationale: A tilted window expresses ventilation intent. With a scheduled
  # base=opn the cover should fully open (maximum airflow). VENT acts as a "floor"
  # only when the cover would otherwise go below ventilate position (close, shading,
  # privacy-close, base=opn but allow_open=false). BASE=OPN beats VENT only when an
  # opening schedule actually exists (is_opening_scheduled): without one, bas stays
  # at its 'opn' init default permanently, so VENT must still apply (Issue #553).
  #
  # ═══════════════════════════════════════════════════════════════════════════

  # LIVE RESIDENT STATE - Read directly from sensor, not from helper.
  # Use this (and resident_flags which depends on it) wherever the real-time sensor state matters,
  # e.g. in the resident arriving/leaving handler where helper_json.res hasn't been updated yet.
  # Falls back to the last known presence from the helper while the sensor has no usable state
  state_resident: >-
    {{ (helper_json.res | default(0) | int == 1)
       if (resident_sensor != [] and states(resident_sensor) in invalid_states)
       else (resident_sensor != [] and states(resident_sensor) in ['on', 'true']) }}

  # ═══════════════════════════════════════════════════════════════════════════
  # RESIDENT PERMISSION FLAGS - Centralized Resident-based Access Control
  # ═══════════════════════════════════════════════════════════════════════════
  # These flags check resident status (from state_resident, live sensor) once,
  # avoiding redundant sensor reads across the entire code.
  #
  # Relationship to effective_state priority cascade:
  #   closing_trigger → Activates Layer 4 (PRIVACY) in effective_state
  #   opening_trigger → One-shot trigger action (not a hierarchy layer)
  #   allow_ventilate → Conditions Layer 3 (VENT) in effective_state
  #   allow_shade     → Conditions Layer 5 (SHADING) in effective_state
  #   allow_open      → Conditions Layer 6 (BASE="open") in effective_state

  # Resident flags - All resident permission checks in one place
  resident_flags:
    opening_trigger: "{{ 'resident_opening_enabled' in resident_config }}"
    closing_trigger: "{{ 'resident_closing_enabled' in resident_config }}"
    allow_open: "{{ 'resident_allow_opening' in resident_config or not state_resident }}"
    allow_shade: "{{ 'resident_allow_shading' in resident_config or not state_resident }}"
    allow_ventilate: "{{ 'resident_allow_ventilation' in resident_config or not state_resident }}"

  # EFFECTIVE STATE - The actual state the cover should be in based on priority cascade
  # Replaces v5's state_current (which was just an alias with old names vpart/vfull)
  # Use this directly instead of the old state_current variable
  effective_state: >-
    {% set h = helper_json %}
    {% set resident_present = state_resident %}
    {% set allow_vent = 'resident_allow_ventilation' in resident_config or not resident_present %}
    {% set allow_shade = 'resident_allow_shading' in resident_config or not resident_present %}
    {% set allow_open = 'resident_allow_opening' in resident_config or not resident_present %}
    {% set privacy_active = resident_present and 'resident_closing_enabled' in resident_config %}
    {% set s_opn = contact_window_opened != [] and states(contact_window_opened) in ['true', 'on'] %}
    {% set s_tlt = contact_window_tilted != [] and states(contact_window_tilted) in ['true', 'on'] %}
    {% set w = 'opn' if s_opn else 'tlt' if s_tlt else h.win if (contact_window_opened == [] and contact_window_tilted == []) else 'cls' %}
    {% if h.frc != 'non' %}
      {{ h.frc }}
    {% elif w == 'opn' %}
      lock
    {% else %}
      {% if privacy_active %}
        {% set base_target = 'cls' %}
      {% elif h.shd | int == 1 and allow_shade %}
        {% set base_target = 'shd' %}
      {% elif h.bas == 'opn' and not allow_open %}
        {% set base_target = 'cls' %}
      {% else %}
        {% set base_target = h.bas %}
      {% endif %}
      {% set base_open_scheduled = base_target == 'opn' and is_opening_scheduled %}
      {% if w == 'tlt' and allow_vent and not base_open_scheduled %}
        vnt
      {% else %}
        {{ base_target }}
      {% endif %}
    {% endif %}

  # STATE FORCE - Which force function is currently active? (from helper)
  # Values: non|opn|cls|shd|vnt
  helper_state_force: "{{ helper_json.frc | default('non') }}"

  # RESIDENT STATUS - Is someone present? (from helper, synced with sensor)
  helper_state_resident: "{{ helper_json.res | default(0) | int == 1 }}"

  # MANUAL FLAG - Is manual override active? (from helper)
  helper_state_manual: "{{ helper_json.man | default(0) | int == 1 }}"

  # BASE STATE - The time-based ground state (opn/cls)
  helper_state_base: "{{ helper_json.bas | default('opn') }}"

  # WINDOW STATE - Current window sensor state (cls/tlt/opn)
  helper_state_window: "{{ helper_json.win | default('cls') }}"

  # SHADE STATE - Is shading currently active (not pending)?
  helper_state_shade: "{{ helper_json.shd | default(0) | int == 1 }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # TIMESTAMPS - Unified timestamp access
  # ═══════════════════════════════════════════════════════════════════════════

  helper_ts_open: "{{ helper_json.ts.opn | default(0) | int }}"
  helper_ts_close: "{{ helper_json.ts.cls | default(0) | int }}"
  helper_ts_shade: "{{ helper_json.ts.shd | default(0) | int }}"
  helper_ts_pending_arm: "{{ helper_json.ts.arm | default(0) | int }}"
  helper_ts_man: "{{ helper_json.ts.man | default(0) | int }}"
  helper_ts_pending_due: "{{ helper_json.ts.due | default(0) | int }}"

  # WRITE TIMESTAMP - When did the automation last write the helper? (every run does)
  helper_ts_write: "{{ helper_json.t | default(0) | int }}"

  # AUTOMATION RESUMED - Did the automation come back after being switched off?
  # `this` is a snapshot taken when the triggers were attached, so this.last_changed is
  # the moment the automation was switched on (or created on restart/reload). A helper
  # older than that means every event since then is lost and nothing in it can be trusted.
  # Nothing else reports this: no entity became unavailable, and homeassistant: start
  # does not fire when an automation is merely turned on again.
  automation_resumed: >-
    {{ helper_ts_write > 0 and
       helper_ts_write < as_timestamp(this.last_changed | default(0), 0) }}

  # STALE DAY - Was the helper last written on an earlier day?
  # The 23:55 midnight reset clears shd/pnd every night. If the automation was off, that
  # reset never ran, so a shading from days ago would still read as active.
  stale_day: >-
    {{ helper_ts_write > 0 and
       now().strftime('%Y-%m-%d') != helper_ts_write | timestamp_custom('%Y-%m-%d') }}

  # OVERRIDE EXPIRED - Should the manual override already have been reset?
  # The reset triggers latch (template triggers only fire on false->true), so a reset
  # whose moment fell into an outage or a restart never fires again. Re-evaluated here.
  override_expired: >-
    {{ helper_state_manual and not is_reset_disabled and (
         (is_reset_timeout and helper_ts_man > 0 and
          as_timestamp(now()) >= helper_ts_man + 60 * (reset_override_timeout | int(0))) or
         (is_reset_fixed_time and now() >= today_at(reset_override_time) and
          helper_ts_man < as_timestamp(today_at(reset_override_time))) or
         (is_reset_position and in_reset_override_position)
       ) }}

  # SHADED STATUS - Is cover currently shaded (not pending)?
  # True when shade == 1 AND no pending start armed
  helper_state_is_shaded: "{{ helper_json.shd | default(0) | int == 1 and helper_json.pnd | default('non') != 'beg' }}"

  # PENDING PHASE - Which shading pending is armed? (non|beg|end)
  helper_state_pending: "{{ helper_json.pnd | default('non') }}"

  # PENDING START - Is shading start pending?
  helper_state_pending_start: "{{ helper_json.pnd | default('non') == 'beg' }}"

  # PENDING END - Is shading end pending?
  helper_state_pending_end: "{{ helper_json.pnd | default('non') == 'end' }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # COMPUTED FLAGS - Simplified Movement Permissions
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # FORCE STATE ARCHITECTURE (Dual-Source Design):
  # CCA intentionally maintains TWO sources of force state:
  #
  #   1. helper_state_force (from JSON helper) – The PERSISTED force that was last
  #      written to the helper. Used to track which force was active across
  #      automation runs and for state recovery after force ends.
  #
  #   2. is_forced_* (from HA entities) – The
  #      REALTIME sensor state. Reads the actual entity value at execution
  #      time. Used for permission checks (force_allows_*) and "Last Wins"
  #      logic when one force is disabled but another is still active.
  #
  # This dual approach is essential: the helper records WHAT happened, while
  # the realtime sensors determine WHAT SHOULD happen now. Reading force
  # state from the helper at runtime would cause stale comparisons because
  # the helper is only updated when CCA runs, not when the external entity
  # changes between runs.
  # ═══════════════════════════════════════════════════════════════════════════

  # Individual force states (realtime entity checks)
  is_forced_open: "{{ auto_up_force != [] and states(auto_up_force) in ['on', 'true'] }}"
  is_forced_close: "{{ auto_down_force != [] and states(auto_down_force) in ['on', 'true'] }}"
  is_forced_shade: "{{ auto_shading_start_force != [] and states(auto_shading_start_force) in ['on', 'true'] }}"
  is_forced_vent: "{{ auto_ventilate_force != [] and states(auto_ventilate_force) in ['on', 'true'] }}"

  # Is any force active? (realtime)
  is_forced: "{{ is_forced_open or is_forced_close or is_forced_shade or is_forced_vent }}"

  # Is the entity of the force recorded in the helper currently unreadable?
  # A force entity may be a switch or a binary_sensor, so it can drop out like any
  # other integration. While its state is unusable, "not on" must not be read as
  # "turned off" - that would silently cancel an active force.
  force_helper_unreadable: >-
    {{ (helper_state_force == 'opn' and auto_up_force != [] and states(auto_up_force) in invalid_states) or
       (helper_state_force == 'cls' and auto_down_force != [] and states(auto_down_force) in invalid_states) or
       (helper_state_force == 'shd' and auto_shading_start_force != [] and states(auto_shading_start_force) in invalid_states) or
       (helper_state_force == 'vnt' and auto_ventilate_force != [] and states(auto_ventilate_force) in invalid_states) }}

  # Which force is active right now? (realtime, "last activated wins") - non|opn|cls|shd|vnt
  # Falls back to the last known force from the helper while its entity is unreadable
  live_force: >-
    {% set candidates = namespace(best='non', best_ts=-1) %}
    {% if is_forced_open %}
      {% set t = as_timestamp(states[auto_up_force].last_changed) | float(0) %}
      {% if t > candidates.best_ts %}{% set candidates.best = 'opn' %}{% set candidates.best_ts = t %}{% endif %}
    {% endif %}
    {% if is_forced_close %}
      {% set t = as_timestamp(states[auto_down_force].last_changed) | float(0) %}
      {% if t > candidates.best_ts %}{% set candidates.best = 'cls' %}{% set candidates.best_ts = t %}{% endif %}
    {% endif %}
    {% if is_forced_shade %}
      {% set t = as_timestamp(states[auto_shading_start_force].last_changed) | float(0) %}
      {% if t > candidates.best_ts %}{% set candidates.best = 'shd' %}{% set candidates.best_ts = t %}{% endif %}
    {% endif %}
    {% if is_forced_vent %}
      {% set t = as_timestamp(states[auto_ventilate_force].last_changed) | float(0) %}
      {% if t > candidates.best_ts %}{% set candidates.best = 'vnt' %}{% set candidates.best_ts = t %}{% endif %}
    {% endif %}
    {{ helper_state_force if candidates.best == 'non' and force_helper_unreadable else candidates.best }}

  # Does force allow movement in each direction? (realtime)
  # Each action is allowed if no conflicting force is active
  force_allows_open: "{{ not (is_forced_close or is_forced_shade or is_forced_vent) }}"
  force_allows_close: "{{ not (is_forced_open or is_forced_shade or is_forced_vent) }}"
  force_allows_shade: "{{ not (is_forced_open or is_forced_close or is_forced_vent) }}"
  force_allows_ventilate: "{{ not (is_forced_open or is_forced_close or is_forced_shade) }}"

  # Override flags
  ignore_after_manual_config: !input ignore_after_manual_config
  override_flags:
    opening: "{{ 'ignore_opening_after_manual' in ignore_after_manual_config }}"
    closing: "{{ 'ignore_closing_after_manual' in ignore_after_manual_config }}"
    ventilation: "{{ 'ignore_ventilation_after_manual' in ignore_after_manual_config }}"
    shading: "{{ 'ignore_shading_after_manual' in ignore_after_manual_config }}"

  # Manual-override gates: true when an active manual override blocks the action.
  # Handlers gate with "not override_blocks.<action>" instead of re-deriving
  # "helper_state_manual and override_flags.<action>" in every branch.
  override_blocks:
    opening: "{{ helper_state_manual and override_flags.opening }}"
    closing: "{{ helper_state_manual and override_flags.closing }}"
    ventilation: "{{ helper_state_manual and override_flags.ventilation }}"
    shading: "{{ helper_state_manual and override_flags.shading }}"

  # Ventilation configuration
  auto_ventilate_options: !input auto_ventilate_options
  contact_delay_trigger: !input contact_delay_trigger
  contact_delay_status: !input contact_delay_status
  ventilation_flags:
    start_no_delay: "{{ 'ventilation_start_no_delay' in auto_ventilate_options }}"
    delay_enabled: "{{ 'ventilation_delay_enabled' in auto_ventilate_options }}"
    if_lower_enabled: "{{ 'ventilation_if_lower_enabled' in auto_ventilate_options }}"
    after_shading_end: "{{ 'ventilation_after_shading_end' in auto_ventilate_options }}"
    keep_open_on_full_to_tilt: "{{ 'ventilation_keep_open_on_full_to_tilt' in auto_ventilate_options }}"

  # Individual configuration
  prevent_config: !input individual_config
  prevent_flags:
    higher_position_closing: "{{ 'prevent_higher_position_closing' in prevent_config }}"
    lowering_when_closing_if_shaded: "{{ 'prevent_lowering_when_closing_if_shaded' in prevent_config }}"
    shading_end_if_closed: "{{ 'prevent_shading_end_if_closed' in prevent_config }}"
    opening_after_shading_end: "{{ 'prevent_opening_after_shading_end' in prevent_config }}"
    opening_after_ventilation_end: "{{ 'prevent_opening_after_ventilation_end' in prevent_config }}"
    default_cover_actions: "{{ 'prevent_default_cover_actions' in prevent_config }}"
    shading_multiple_times: "{{ 'prevent_shading_multiple_times' in prevent_config }}"
    opening_multiple_times: "{{ 'prevent_opening_multiple_times' in prevent_config }}"
    closing_multiple_times: "{{ 'prevent_closing_multiple_times' in prevent_config }}"

  auto_recover_after_force: !input auto_recover_after_force
  is_force_recovery_enabled: "{{ 'auto_recover_enabled' in auto_recover_after_force }}"

  # Configuration check
  check_config: !input check_config
  check_config_debuglevel: !input check_config_debuglevel
  check_status_helper_length: "{{ state_attr(cover_status_helper, 'max') if cover_status_helper != [] else None }}"

  # Logbook
  enable_logbook: !input enable_logbook

# CCA uses 'queued' mode to prevent race conditions when multiple sensors
# change state simultaneously (e.g., window sensor + lock sensor).
# - If automation is running, new triggers are queued (max 10)
# - Each trigger is processed in order with current sensor values
# - This ensures no trigger is lost due to timing issues
mode: queued
max: 25 # A restart queues one recovery run per recovering source
max_exceeded: warning

################################################################################
# TRIGGERS
################################################################################

triggers:

  ########################################
  # Trigger for opening cover
  ########################################

  - trigger: template
    value_template: >-
      {% set is_today_off = workday_sensor_today != [] and is_state(workday_sensor_today, 'off') %}
      {% set time_compare = time_up_early_non_workday if is_today_off else time_up_early %}
      {{ now() >= today_at(time_compare) }}
    enabled: "{{ is_time_field_enabled }}"
    id: "t_open_1"

  - trigger: template # comparing the times to avoid double triggering if early+late are identical
    value_template: >-
      {% set is_today_off = workday_sensor_today != [] and is_state(workday_sensor_today, 'off') %}
      {% set early = time_up_early_non_workday if is_today_off else time_up_early %}
      {% set late = time_up_late_non_workday if is_today_off else time_up_late %}
      {{ early != late and now() >= today_at(late) }}
    enabled: "{{ is_time_field_enabled }}"
    id: "t_open_2"

  - trigger: template
    value_template: "{{ states(default_brightness_sensor) | float(default=brightness_up) > (brightness_up + brightness_hysteresis) }}"
    for:
      seconds: !input brightness_time_duration
    enabled: "{{ is_brightness_enabled and default_brightness_sensor != [] }}"
    id: "t_open_4"

  # Trigger on sun elevation threshold (supports fixed, dynamic, and hybrid modes)
  - trigger: template
    value_template: >-
      {% set mode = sun_elevation_mode %}
      {% set sensor = sun_elevation_up_sensor %}
      {% set fixed_value = sun_elevation_up | float %}
      {% set current_elevation = state_attr(default_sun_sensor, 'elevation') | float(0) %}
      {% set sensor_valid = sensor != [] and states(sensor) not in invalid_states and is_number(states(sensor)) %}
      {% if mode == 'dynamic' %}
        {% if sensor_valid %}
          {% set threshold = states(sensor) | float %}
        {% else %}
          {% set threshold = fixed_value %}
        {% endif %}
      {% elif mode == 'hybrid' %}
        {% if sensor_valid %}
          {% set threshold = (states(sensor) | float) + fixed_value %}
        {% else %}
          {% set threshold = fixed_value %}
        {% endif %}
      {% else %}
        {% set threshold = fixed_value %}
      {% endif %}
      {{ current_elevation > threshold }}
    for:
      seconds: !input sun_time_duration
    enabled: "{{ is_sun_elevation_enabled and default_sun_sensor != [] }}"
    id: "t_open_5"

  # Resident sensor state change (for updating helper_state_resident and optional actions)
  - trigger: state
    entity_id: !input resident_sensor
    # not_to switches HA to "state-change only" and ignores attribute-only changes
    not_to:
      - "unavailable"
      - "unknown"
    enabled: "{{ resident_sensor not in [none, ''] }}"
    id: "t_resident_update"

  - trigger: state
    entity_id: !input auto_up_force
    from: "off"
    to: "on"
    enabled: "{{ auto_up_force != [] }}"
    id: "t_force_enabled_open"

  - trigger: state
    entity_id: !input auto_up_force
    from: "on"
    to: "off"
    enabled: "{{ auto_up_force != [] }}"
    id: "t_force_disabled_open"

  ########################################
  # Trigger for closing cover
  ########################################

  - trigger: template
    value_template: >-
      {% set is_tomorrow_off = workday_sensor_tomorrow != [] and is_state(workday_sensor_tomorrow, 'off') %}
      {% set is_tomorrow_on = workday_sensor_tomorrow != [] and is_state(workday_sensor_tomorrow, 'on') %}
      {% set is_today_off = workday_sensor_today != [] and is_state(workday_sensor_today, 'off') %}
      {% set time_compare =
        time_down_early_non_workday if is_tomorrow_off else
        time_down_early if is_tomorrow_on else
        time_down_early_non_workday if is_today_off else
        time_down_early %}
      {{ now() >= today_at(time_compare) }}
    enabled: "{{ is_time_field_enabled }}"
    id: "t_close_1"

  - trigger: template # Avoid double triggering with 'early != late' if early and late times are identical
    value_template: >-
      {% set is_tomorrow_off = workday_sensor_tomorrow != [] and is_state(workday_sensor_tomorrow, 'off') %}
      {% set is_tomorrow_on = workday_sensor_tomorrow != [] and is_state(workday_sensor_tomorrow, 'on') %}
      {% set is_today_off = workday_sensor_today != [] and is_state(workday_sensor_today, 'off') %}
      {% set time_compare =
        time_down_late_non_workday if is_tomorrow_off else
        time_down_late if is_tomorrow_on else
        time_down_late_non_workday if is_today_off else
        time_down_late %}
      {{ (time_down_early_non_workday != time_compare and time_down_early != time_compare) and now() >= today_at(time_compare) }}
    enabled: "{{ is_time_field_enabled }}"
    id: "t_close_2"

  - trigger: template
    value_template: "{{ states(default_brightness_sensor) | float(default=brightness_down) < (brightness_down - brightness_hysteresis) }}"
    for:
      seconds: !input brightness_time_duration
    enabled: "{{ is_brightness_enabled and default_brightness_sensor != [] }}"
    id: "t_close_4"

  - trigger: template
    value_template: >-
      {% set mode = sun_elevation_mode %}
      {% set sensor = sun_elevation_down_sensor %}
      {% set fixed_value = sun_elevation_down | float %}
      {% set current_elevation = state_attr(default_sun_sensor, 'elevation') | float(0) %}
      {% set sensor_valid = sensor != [] and states(sensor) not in invalid_states and is_number(states(sensor)) %}
      {% if mode == 'dynamic' %}
        {% if sensor_valid %}
          {% set threshold = states(sensor) | float %}
        {% else %}
          {% set threshold = fixed_value %}
        {% endif %}
      {% elif mode == 'hybrid' %}
        {% if sensor_valid %}
          {% set threshold = (states(sensor) | float) + fixed_value %}
        {% else %}
          {% set threshold = fixed_value %}
        {% endif %}
      {% else %}
        {% set threshold = fixed_value %}
      {% endif %}
      {{ current_elevation < threshold }}
    for:
      seconds: !input sun_time_duration
    enabled: "{{ is_sun_elevation_enabled and default_sun_sensor != [] }}"
    id: "t_close_5"

  - trigger: state
    entity_id: !input auto_down_force
    from: "off"
    to: "on"
    enabled: "{{ auto_down_force != [] }}"
    id: "t_force_enabled_close"

  - trigger: state
    entity_id: !input auto_down_force
    from: "on"
    to: "off"
    enabled: "{{ auto_down_force != [] }}"
    id: "t_force_disabled_close"

  ########################################
  # Calendar-based triggers
  ########################################

# Calendar event starts (state becomes "on")
  - trigger: state
    entity_id: !input calendar_entity
    to: "on"
    enabled: "{{ is_calendar_enabled }}"
    id: "t_calendar_event_start"

  # Calendar event ends (state becomes "off")
  - trigger: state
    entity_id: !input calendar_entity
    to: "off"
    enabled: "{{ is_calendar_enabled }}"
    id: "t_calendar_event_end"

  #################################################
  # Trigger for ventilation - COMBINED
  # Single trigger per sensor to prevent race conditions
  #################################################

  - trigger: state
    entity_id: !input contact_window_tilted
    # not_to switches HA to "state-change only" and ignores attribute-only changes
    not_to:
      - "unavailable"
      - "unknown"
    enabled: "{{ is_ventilation_enabled and contact_window_tilted != [] }}"
    id: "t_contact_tilted_changed"
    for:
      seconds: !input contact_delay_trigger

  - trigger: state
    entity_id: !input contact_window_opened
    not_to:
      - "unavailable"
      - "unknown"
    enabled: "{{ is_ventilation_enabled and contact_window_opened != [] }}"
    id: "t_contact_opened_changed"
    for:
      seconds: !input contact_delay_trigger

  - trigger: state
    entity_id: !input auto_ventilate_force
    from: "off"
    to: "on"
    enabled: "{{ auto_ventilate_force != [] }}"
    id: "t_force_enabled_ventilate"

  - trigger: state
    entity_id: !input auto_ventilate_force
    from: "on"
    to: "off"
    enabled: "{{ auto_ventilate_force != [] }}"
    id: "t_force_disabled_ventilate"

  ########################################
  # Triggers for shading start
  ########################################
  - trigger: template
    value_template: >-
      {{
        state_attr(default_sun_sensor, 'azimuth') | float(default=shading_azimuth_start) > shading_azimuth_start and
        state_attr(default_sun_sensor, 'azimuth') | float(default=shading_azimuth_end) < shading_azimuth_end and
        state_attr(default_sun_sensor, 'elevation') | float(default=shading_elevation_min) > shading_elevation_min and
        state_attr(default_sun_sensor, 'elevation') | float(default=shading_elevation_max) < shading_elevation_max
      }}
    enabled: "{{ is_shading_enabled and default_sun_sensor != [] }}"
    id: "t_shading_start_pending_1"

  - trigger: template
    value_template: "{{ states(shading_brightness_sensor) not in invalid_states and states(shading_brightness_sensor) | float(default=shading_sun_brightness_start) > (shading_sun_brightness_start + shading_sun_brightness_hysteresis) }}"
    enabled: "{{ is_shading_enabled and shading_brightness_sensor != [] }}"
    id: "t_shading_start_pending_2"

  - trigger: template
    value_template: "{{ states(shading_temperatur_sensor1) not in invalid_states and states(shading_temperatur_sensor1) | float(default=shading_min_temperatur1) > (shading_min_temperatur1 + shading_temperature_hysteresis1) }}"
    enabled: "{{ is_shading_enabled and shading_temperatur_sensor1 != [] }}"
    id: "t_shading_start_pending_3"

  - trigger: template
    value_template: "{{ states(shading_temperatur_sensor2) not in invalid_states and states(shading_temperatur_sensor2) | float(default=shading_min_temperatur2) > (shading_min_temperatur2 + shading_temperature_hysteresis2) }}"
    enabled: "{{ is_shading_enabled and shading_temperatur_sensor2 != [] }}"
    id: "t_shading_start_pending_4"

  - trigger: template
    value_template: "{{ states(shading_forecast_sensor) not in invalid_states and states(shading_forecast_sensor) in shading_weather_conditions }}"
    enabled: "{{ is_shading_enabled and shading_forecast_sensor != [] }}"
    id: "t_shading_start_pending_5"

  - trigger: template
    value_template: "{{ states(shading_forecast_temp_sensor) not in invalid_states and states(shading_forecast_temp_sensor) | float(default=shading_forecast_temp) > (shading_forecast_temp + shading_forecast_temp_hysteresis) }}"
    enabled: "{{ is_shading_enabled and shading_forecast_temp_sensor != [] and shading_forecast_temp != [] }}"
    id: "t_shading_start_pending_6"

  - trigger: template # Required to recognize the maximum temperature value of the weather forecast before opening.
    value_template: "{{ now() >= today_at([time_up_early, time_up_early_non_workday] | min) - timedelta(hours = 1) }}"
    enabled: "{{ is_shading_enabled }}"
    id: "t_shading_start_pending_7"

  - trigger: template
    value_template: >-
      {% set helper_state = states(cover_status_helper) %}
      {% set helper = helper_state | from_json if helper_state not in invalid_states and helper_state | regex_match("((\[[^\}]+)?\{\s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") else {} %}
      {% if helper.v == 6 %}
        {% set now_ts = as_timestamp(now()) | int %}
        {% set pending = helper.ts.due | default(0) | int %}
        {{ (helper.pnd | default('non')) == 'beg' and pending > 0 and now_ts >= pending }}
      {% else %}
        {{
          helper | regex_search('shading') and
          helper.shading.p is defined and
          helper.shading.p > 0 and
          now() >= (helper.shading.p | as_datetime | as_local)
        }}
      {% endif %}
    enabled: "{{ is_shading_enabled and cover_status_helper != [] }}"
    id: "t_shading_start_execution"

  - trigger: state
    entity_id: !input auto_shading_start_force
    from: "off"
    to: "on"
    enabled: "{{ auto_shading_start_force != [] }}"
    id: "t_force_enabled_shading"

  - trigger: state
    entity_id: !input auto_shading_start_force
    from: "on"
    to: "off"
    enabled: "{{ auto_shading_start_force != [] }}"
    id: "t_force_disabled_shading"

  - trigger: state
    entity_id: !input force_pause
    from: "on"
    to: "off"
    enabled: "{{ force_pause != [] }}"
    id: "t_force_pause_disabled"

  ########################################
  # Triggers for shading tilt
  ########################################

  - trigger: template
    value_template: >-
      {{
        states(cover_status_helper) not in invalid_states and
        states(cover_status_helper) | regex_search('"shd"\s*:\s*1\s*[,}]') and
        state_attr(default_sun_sensor, 'elevation') < shading_tilt_elevation_1
      }}
    enabled: "{{ is_shading_enabled and is_cover_tilt_enabled and default_sun_sensor != [] and cover_status_helper != [] }}"
    id: "t_shading_tilt_1"

  - trigger: template
    value_template: >-
      {{
        states(cover_status_helper) not in invalid_states and
        states(cover_status_helper) | regex_search('"shd"\s*:\s*1\s*[,}]') and
        state_attr(default_sun_sensor, 'elevation') < shading_tilt_elevation_2 and
        state_attr(default_sun_sensor, 'elevation') >= shading_tilt_elevation_1
      }}
    enabled: "{{ is_shading_enabled and is_cover_tilt_enabled and default_sun_sensor != [] and cover_status_helper != [] }}"
    id: "t_shading_tilt_2"

  - trigger: template
    value_template: >-
      {{
        states(cover_status_helper) not in invalid_states and
        states(cover_status_helper) | regex_search('"shd"\s*:\s*1\s*[,}]') and
        state_attr(default_sun_sensor, 'elevation') < shading_tilt_elevation_3 and
        state_attr(default_sun_sensor, 'elevation') >= shading_tilt_elevation_2
      }}
    enabled: "{{ is_shading_enabled and is_cover_tilt_enabled and default_sun_sensor != [] and cover_status_helper != [] }}"
    id: "t_shading_tilt_3"

  - trigger: template
    value_template: >-
      {{
        states(cover_status_helper) not in invalid_states and
        states(cover_status_helper) | regex_search('"shd"\s*:\s*1\s*[,}]') and
        state_attr(default_sun_sensor, 'elevation') >= shading_tilt_elevation_3
      }}
    enabled: "{{ is_shading_enabled and is_cover_tilt_enabled and default_sun_sensor != [] and cover_status_helper != [] }}"
    id: "t_shading_tilt_4"

  ########################################
  # Trigger for alternate shading position
  ########################################

  - trigger: state
    entity_id: !input shading_position_alt_entity
    not_to:
      - "unavailable"
      - "unknown"
    enabled: "{{ is_shading_enabled and shading_position_alt_entity != [] and cover_status_helper != [] }}"
    id: "t_shading_position_alt"

  ########################################
  # Triggers for shading end
  ########################################

  - trigger: template
    value_template: "{{ states(shading_temperatur_sensor1) not in invalid_states and states(shading_temperatur_sensor1) | float(default=shading_min_temperatur1) < (shading_min_temperatur1 - shading_temperature_hysteresis1) }}"
    enabled: "{{ is_shading_enabled and shading_temperatur_sensor1 != [] }}"
    id: "t_shading_end_pending_1"

  - trigger: template
    value_template: "{{ states(shading_temperatur_sensor2) not in invalid_states and states(shading_temperatur_sensor2) | float(default=shading_min_temperatur2) < (shading_min_temperatur2 - shading_temperature_hysteresis2) }}"
    enabled: "{{ is_shading_enabled and shading_temperatur_sensor2 != [] }}"
    id: "t_shading_end_pending_2"

  - trigger: template
    value_template: "{{ states(shading_brightness_sensor) not in invalid_states and states(shading_brightness_sensor) | float(default=shading_sun_brightness_end) < (shading_sun_brightness_end - shading_sun_brightness_hysteresis) }}"
    enabled: "{{ is_shading_enabled and shading_brightness_sensor != [] }}"
    id: "t_shading_end_pending_3"

  - trigger: template
    value_template: "{{ states(shading_forecast_sensor) not in shading_weather_conditions }}"
    enabled: "{{ is_shading_enabled and shading_weather_conditions != [] and shading_forecast_sensor != [] }}"
    id: "t_shading_end_pending_4"

  - trigger: template
    value_template: >-
      {{
        (state_attr(default_sun_sensor, 'azimuth') | float(default=shading_azimuth_start) < shading_azimuth_start) or
        (state_attr(default_sun_sensor, 'azimuth') | float(default=shading_azimuth_end) > shading_azimuth_end)
      }}
    enabled: "{{ is_shading_enabled and default_sun_sensor != [] }}"
    id: "t_shading_end_pending_5"

  - trigger: template
    value_template: >-
      {{
        (state_attr(default_sun_sensor, 'elevation') | float(default=shading_elevation_max) > shading_elevation_max) or
        (state_attr(default_sun_sensor, 'elevation') | float(default=shading_elevation_min) < shading_elevation_min)
      }}
    enabled: "{{ is_shading_enabled and default_sun_sensor != [] }}"
    id: "t_shading_end_pending_7"

  - trigger: template
    value_template: "{{ states(shading_forecast_temp_sensor) not in invalid_states and states(shading_forecast_temp_sensor) | float(default=shading_forecast_temp) < (shading_forecast_temp - shading_forecast_temp_hysteresis) }}"
    enabled: "{{ is_shading_enabled and shading_forecast_temp_sensor != [] and shading_forecast_temp != [] }}"
    id: "t_shading_end_pending_6"

  - trigger: template
    value_template: >-
      {% set helper_state = states(cover_status_helper) %}
      {% set helper = helper_state | from_json if helper_state not in invalid_states and helper_state | regex_match("((\[[^\}]+)?\{\s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") else {} %}
      {% if helper.v == 6 %}
        {% set now_ts = as_timestamp(now()) | int %}
        {% set pending = helper.ts.due | default(0) | int %}
        {{ (helper.pnd | default('non')) == 'end' and pending > 0 and now_ts >= pending }}
      {% else %}
        {{
          helper | regex_search('shading') and
          helper.shading.q is defined and
          helper.shading.q > 0 and
          now() >= (helper.shading.q | as_datetime | as_local)
        }}
      {% endif %}
    enabled: "{{ is_shading_enabled and cover_status_helper != [] }}"
    id: "t_shading_end_execution"

  - trigger: template
    value_template: "{{ now() >= today_at('23:55:00') }}"
    id: "t_shading_reset"
    enabled: "{{ is_shading_enabled }}"

  ########################################
  # Trigger for manual cover controls
  ########################################

  # Position detection via current_position attribute (standard)
  - trigger: state
    entity_id: !input blind
    attribute: current_position
    enabled: "{{ position_source == 'current_position_attr' }}"
    id: "t_manual_position"
    for:
      seconds: 60

  # Position detection via position attribute
  - trigger: state
    entity_id: !input blind
    attribute: position
    enabled: "{{ position_source == 'position_attr' }}"
    id: "t_manual_position"
    for:
      seconds: 60

  # Position detection via custom sensor
  - trigger: state
    entity_id: !input custom_position_sensor
    enabled: "{{ position_source == 'custom_sensor' and custom_position_sensor != [] }}"
    id: "t_manual_position"
    for:
      seconds: 60

  # Tilt detection
  - trigger: state
    entity_id: !input blind
    attribute: current_tilt_position
    id: "t_manual_tilt"
    for:
      minutes: 1
    enabled: "{{ is_cover_tilt_enabled }}"

  ########################################
  # Trigger for recovery after a restart or an outage
  ########################################

  - trigger: homeassistant
    event: start
    id: "t_recovery"

  - trigger: state
    entity_id: !input blind
    from: &invalid_recovery_states
      - "unavailable"
      - "unknown"
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: &recovery_settle
      seconds: 30

  - trigger: state
    entity_id: !input cover_status_helper
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ cover_status_helper != [] }}"

  - trigger: state
    entity_id: !input custom_position_sensor
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ position_source == 'custom_sensor' and custom_position_sensor != [] }}"

  - trigger: state
    entity_id: !input contact_window_opened
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ is_ventilation_enabled and contact_window_opened != [] }}"

  - trigger: state
    entity_id: !input contact_window_tilted
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ is_ventilation_enabled and contact_window_tilted != [] }}"

  - trigger: state
    entity_id: !input resident_sensor
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ resident_sensor != [] }}"

  # Condition-only sources
  - trigger: state
    entity_id: !input default_brightness_sensor
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ is_shading_enabled and default_brightness_sensor != [] }}"

  - trigger: state
    entity_id: !input default_sun_sensor
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ is_shading_enabled and default_sun_sensor != [] }}"

  - trigger: state
    entity_id: !input shading_forecast_sensor
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ is_shading_enabled and shading_forecast_sensor != [] }}"

  - trigger: state
    entity_id: !input calendar_entity
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ is_calendar_enabled and calendar_entity != [] }}"

  - trigger: state
    entity_id: !input workday_sensor
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ workday_sensor_today != [] }}"

  - trigger: state
    entity_id: !input workday_sensor_tomorrow
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ workday_sensor_tomorrow != [] }}"

  # Force entities. Their own triggers use from: "on"/"off", so a transition out of an
  # unusable state does not fire them - only this brings the force state back in sync.
  - trigger: state
    entity_id: !input auto_up_force
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ auto_up_force != [] }}"

  - trigger: state
    entity_id: !input auto_down_force
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ auto_down_force != [] }}"

  - trigger: state
    entity_id: !input auto_shading_start_force
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ auto_shading_start_force != [] }}"

  - trigger: state
    entity_id: !input auto_ventilate_force
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ auto_ventilate_force != [] }}"

  - trigger: state
    entity_id: !input force_pause
    from: *invalid_recovery_states
    not_to: *invalid_recovery_states
    id: "t_recovery"
    for: *recovery_settle
    enabled: "{{ force_pause != [] }}"

  # The automation itself was switched on again (or reloaded, or recreated on restart).
  # No entity changed, so none of the triggers above fire. `this` is a snapshot taken when
  # the triggers were attached, so at that moment now() is still within the 60 s offset and
  # the template renders false - which is what arms it. A template trigger only fires on a
  # false -> true transition, so without that offset an already-stale helper would never
  # fire it. A minute later it flips to true and the recovery runs. Once the recovery has
  # written the helper, t overtakes the attach time and the trigger arms itself again.
  - trigger: template
    value_template: >-
      {% set attached = as_timestamp(this.last_changed | default(0), 0) %}
      {% set helper_state = states(cover_status_helper) %}
      {% set helper = helper_state | from_json(default={}) if helper_state not in invalid_states and helper_state | regex_match("((\[[^\}]+)?\{s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") else {} %}
      {{ attached > 0 and
         (helper.t | default(0) | int) > 0 and
         as_timestamp(now()) > attached + 60 and
         (helper.t | default(0) | int) < attached }}
    enabled: "{{ cover_status_helper != [] }}"
    id: "t_recovery"

  # Resets
  - trigger: template
    value_template: "{{ now() >= today_at(reset_override_time) }}"
    enabled: "{{ is_reset_fixed_time }}"
    id: "t_reset_fixedtime"
    for:
      minutes: 2

  - trigger: template
    value_template: >-
      {% set helper_state = states(cover_status_helper) %}
      {% set helper = helper_state | from_json(default={}) if helper_state not in invalid_states and helper_state | regex_match("((\[[^\}]+)?\{\s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") else {} %}
      {% if helper.v | default(0) == 6 %}
        {{ helper.man | default(0) | int == 1 and
           helper.ts.man | default(0) | int > 0 and
           now() >= (helper.ts.man + 60 * reset_override_timeout) | as_datetime | as_local }}
      {% else %}
        {{ false }}
      {% endif %}
    enabled: "{{ is_reset_timeout and cover_status_helper != [] }}"
    id: "t_reset_timeout"
    for:
      seconds: 2

  - trigger: template
    value_template: >-
      {% set helper_state = states(cover_status_helper) %}
      {% set helper = helper_state | from_json(default={}) if helper_state not in invalid_states and helper_state | regex_match("((\[[^\}]+)?\{\s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") else {} %}
      {% set pos = state_attr(blind, 'current_position') | float(-100) %}
      {{ helper.man | default(0) | int == 1 and
         (pos - (reset_override_position | float(0))) | abs <= (position_tolerance | float(5)) }}
    enabled: "{{ is_reset_position and cover_status_helper != [] }}"
    id: "t_reset_position"
    for:
      minutes: !input reset_override_position_dwell

################################################################################
# GLOBAL CONDITIONS
################################################################################

conditions:
  - condition: !input auto_global_condition
  - or:
      - "{{ trigger.to_state is not defined }}" # for "trigger: time"-Trigger
      - "{{ trigger.to_state is defined and trigger.to_state.state not in invalid_states }}" # The following values are not valid to trigger
  - condition: template # State-critical entities must be usable, not just the triggering one
    value_template: >-
      {% set ns = namespace(ready=true) %}
      {% for entity in critical_entities %}
        {% if states(entity) in invalid_states %}{% set ns.ready = false %}{% endif %}
      {% endfor %}
      {{ ns.ready }}
  # Only an unavailable helper blocks (its stored value is intact, just not loaded yet).
  # An unknown/empty/corrupt helper must pass, so the init step can rewrite it.
  - condition: template
    value_template: "{{ cover_status_helper == [] or states(cover_status_helper) != 'unavailable' }}"
  - condition: template # Stateless window contact: only blocks while the window was last known open/tilted
    value_template: >-
      {% set helper = states(cover_status_helper) if cover_status_helper != [] else 'unavailable' %}
      {% set last_window_closed = helper in invalid_states or helper | regex_search('"win"\s*:\s*"cls"') %}
      {% set contact_missing = is_ventilation_enabled and (
           (contact_window_opened != [] and states(contact_window_opened) in invalid_states) or
           (contact_window_tilted != [] and states(contact_window_tilted) in invalid_states)) %}
      {{ last_window_closed or not contact_missing or
         trigger.id | default('') in ['t_contact_opened_changed', 't_contact_tilted_changed',
                                      't_manual_position', 't_manual_tilt'] }}
  - condition: template
    value_template: >-
      {% if trigger.id is match('^t_shading_start_pending_[1-6]$') %}
        {% set helper = states(cover_status_helper) if cover_status_helper != [] else 'unavailable' %}
        {% set is_shaded = helper not in invalid_states and helper | regex_search('"shd"\s*:\s*1\s*[,}]') %}
        {% set is_end_pending = helper not in invalid_states and helper | regex_search('"pnd"\s*:\s*"end"') %}
        {{ not is_shaded or is_end_pending }}
      {% elif trigger.id is match('^t_shading_end_pending_[1-7]$') %}
        {{ cover_status_helper != [] and states(cover_status_helper) not in invalid_states and states(cover_status_helper) | regex_search('"shd"\s*:\s*1\s*[,}]') }}
      {% else %}
        true
      {% endif %}

################################################################################
# ACTIONS
################################################################################

actions:

  # YAML Anchors ###############################################################
  - variables:
      cover_move_action: &cover_move_action
        sequence:
          - condition: template
            value_template: "{{ not prevent_flags.default_cover_actions }}"
          - condition: template
            value_template: "{{ not is_paused }}"
          - condition: template
            value_template: "{{ not (target_position | default(101) >= current_position | default(101) - position_tolerance | default(0) and target_position | default(101) <= current_position | default(101) + position_tolerance | default(0)) }}"
          - repeat:
              for_each: "{{ blind_entities | list }}"
              sequence:
                - choose:
                    - alias: "Cover move: full close"
                      conditions: "{{ target_position | default(101) | int == 0 }}"
                      sequence:
                        - action: cover.close_cover
                          target:
                            entity_id: "{{ repeat.item if repeat is defined else '' }}"

                    - alias: "Cover move: full open"
                      conditions: "{{ target_position | default(101) | int == 100 }}"
                      sequence:
                        - action: cover.open_cover
                          target:
                            entity_id: "{{ repeat.item if repeat is defined else '' }}"

                    - alias: "Cover move: partial position (1-99)"
                      conditions: "{{ 0 < target_position | default(101) | int < 100 }}"
                      sequence:
                        - action: cover.set_cover_position
                          data:
                            position: "{{ target_position | default(101) | int }}"
                          target:
                            entity_id: "{{ repeat.item if repeat is defined else '' }}"

                - delay: # Small random delay between covers to avoid RF interference
                    seconds: "{{ range(1, 3) | random }}"

      tilt_move_action: &tilt_move_action
        sequence:
          - condition: template
            value_template: "{{ not prevent_flags.default_cover_actions and is_cover_tilt_enabled_and_possible and not is_paused }}"
          - repeat:
              for_each: "{{ blind_entities | list }}"
              sequence:
                - if: "{{ state_attr(repeat.item if repeat is defined else '', 'current_tilt_position') is defined }}"
                  then:
                    # Optional: Reset tilt to 0 (Reposition Mode)
                    - if: "{{ tilt_first | default(false) }}"
                      then:
                        - action: cover.set_cover_tilt_position
                          data:
                            tilt_position: 0
                          target:
                            entity_id: "{{ repeat.item if repeat is defined else '' }}"
                        - delay:
                            seconds: !input tilt_delay

                    # Wait Strategy: Ensure cover is idle before tilting
                    - choose:
                        - alias: "Tilt wait: until movement stops"
                          conditions: "{{ is_tilt_wait_idle_mode | default(false) }}"
                          sequence:
                            - wait_template: "{{ states(repeat.item if repeat is defined else '') in ['open', 'closed'] }}"
                              timeout: "{{ tilt_wait_timeout | int }}"
                              continue_on_timeout: true
                            # Safety buffer after reaching idle state
                            - if: "{{ wait.completed if wait is defined else '' }}"
                              then:
                                - delay: 1
                      # Mode: Standard fixed delay
                      default:
                        - delay:
                            seconds: !input tilt_delay

                    # Set target tilt position
                    - action: cover.set_cover_tilt_position
                      data:
                        tilt_position: "{{ target_tilt_position | default(101) }}"
                      target:
                        entity_id: "{{ repeat.item if repeat is defined else '' }}"

                    # RF Anti-Interference delay
                    - delay:
                        seconds: "{{ range(1, 3) | random }}"

      # ═══════════════════════════════════════════════════════════════════════════
      # Drive With Actions - the shared drive idiom
      # ═══════════════════════════════════════════════════════════════════════════
      # Usage: Set 'drive_action_set' ("up" | "down" | "ventilate" |
      # "shading_start" | "shading_end") and target_position /
      # target_tilt_position, then call. Runs the matching before-action,
      # moves cover and tilt, then runs the matching after-action.
      # Delays and the helper update stay at the call site.
      # ═══════════════════════════════════════════════════════════════════════════
      drive_with_actions: &drive_with_actions
        sequence:
          - choose:
              - conditions: "{{ drive_action_set | default('') == 'up' }}"
                sequence:
                  - choose: []
                    default: !input auto_up_action_before
              - conditions: "{{ drive_action_set | default('') == 'down' }}"
                sequence:
                  - choose: []
                    default: !input auto_down_action_before
              - conditions: "{{ drive_action_set | default('') == 'ventilate' }}"
                sequence:
                  - choose: []
                    default: !input auto_ventilate_action_before
              - conditions: "{{ drive_action_set | default('') == 'shading_start' }}"
                sequence:
                  - choose: []
                    default: !input auto_shading_start_action_before
              - conditions: "{{ drive_action_set | default('') == 'shading_end' }}"
                sequence:
                  - choose: []
                    default: !input auto_shading_end_action_before
          - *cover_move_action
          - *tilt_move_action
          - choose:
              - conditions: "{{ drive_action_set | default('') == 'up' }}"
                sequence:
                  - choose: []
                    default: !input auto_up_action
              - conditions: "{{ drive_action_set | default('') == 'down' }}"
                sequence:
                  - choose: []
                    default: !input auto_down_action
              - conditions: "{{ drive_action_set | default('') == 'ventilate' }}"
                sequence:
                  - choose: []
                    default: !input auto_ventilate_action
              - conditions: "{{ drive_action_set | default('') == 'shading_start' }}"
                sequence:
                  - choose: []
                    default: !input auto_shading_start_action
              - conditions: "{{ drive_action_set | default('') == 'shading_end' }}"
                sequence:
                  - choose: []
                    default: !input auto_shading_end_action

      # ═══════════════════════════════════════════════════════════════════════════
      # Helper Update Function
      # ═══════════════════════════════════════════════════════════════════════════
      # Usage: Set 'update_values' variable before calling with fields to update
      # Example: update_values: { bas: 'cls', ts: { opn: ts_now } }
      # Uses v6 compact schema names directly (no internal name conversion)
      #
      # Fields: bas, shd (1/0), pnd (non/beg/end), win, frc, res (1/0), man (1/0)
      # Timestamps: ts.opn, ts.cls, ts.shd, ts.due, ts.arm, ts.man
      #
      # Template logic:
      #   1. Apply field updates (compact names directly)
      #   2. Build timestamp object (preserve existing, merge updates, 'now' → ts_now)
      #   3. Guard: ts.shd only updates when shd actually changes
      #   4. Build final v6 compact JSON structure
      # ═══════════════════════════════════════════════════════════════════════════
      helper_update: &helper_update
        choose: []
        default:
          - action: input_text.set_value
            data:
              entity_id: !input cover_status_helper
              value: |-
                  {% set current = helper_json %}
                  {% set updates = update_values | default({}) %}
                  {% set ts_now = as_timestamp(now()) | round(0) %}

                  {% set new_bas = updates.bas | default(current.bas | default('opn')) %}
                  {% set new_shd = updates.shd | default(current.shd | default(0)) | int %}
                  {% set new_pnd = updates.pnd | default(current.pnd | default('non')) %}
                  {% set new_win = updates.win | default(current.win | default('cls')) %}
                  {% set new_frc = updates.frc | default(current.frc | default('non')) %}
                  {% set new_res = updates.res | default(current.res | default(0)) | int %}
                  {% set new_man = updates.man | default(current.man | default(0)) | int %}
                  {% set current_ts = current.ts | default({}) %}

                  {% set merged_ts = namespace(data={}) %}
                  {% for key in ['opn', 'cls', 'shd', 'due', 'arm', 'man'] %}
                    {% set merged_ts.data = dict(merged_ts.data, **{key: current_ts[key] | default(0) | int}) %}
                  {% endfor %}
                  {% if 'ts' in updates %}
                    {% for key, value in updates.ts.items() %}
                      {% set merged_ts.data = dict(merged_ts.data, **{key: (ts_now if value == 'now' else value) | int}) %}
                    {% endfor %}
                  {% endif %}
                  {% if new_shd == (current.shd | default(0) | int) and 'ts' in updates and 'shd' in updates.ts %}
                    {% set merged_ts.data = dict(merged_ts.data, **{'shd': current_ts.shd | default(0) | int}) %}
                  {% endif %}

                  {% set dict_new = {
                    'bas': new_bas,
                    'shd': new_shd | int,
                    'pnd': new_pnd,
                    'win': new_win,
                    'frc': new_frc,
                    'res': new_res | int,
                    'man': new_man | int,
                    'ts': {
                      'opn': merged_ts.data.opn | default(0) | int,
                      'cls': merged_ts.data.cls | default(0) | int,
                      'shd': merged_ts.data.shd | default(0) | int,
                      'due': merged_ts.data.due | default(0) | int,
                      'arm': merged_ts.data.arm | default(0) | int,
                      'man': merged_ts.data.man | default(0) | int
                    },
                    'v': 6,
                    't': ts_now | int
                  } %}
                  {{ dict_new | to_json }}
          - if: "{{ enable_logbook }}"
            then:
              - action: logbook.log
                data:
                  name: "{{ this.attributes.friendly_name }}"
                  entity_id: "{{ this.entity_id }}"
                  message: |-
                    Trigger: {{ trigger.id | default('manual') }} | 
                    Effective: {{ effective_state }} | 
                    Position: {{ current_position }}% {% if is_cover_tilt_enabled %} / Tilt: {{ current_tilt_position }}%{% endif %} | 
                    Helper: bas={{ helper_json.bas | default('opn') }} shd={{ helper_json.shd | default(0) }} pnd={{ helper_json.pnd | default('non') }} win={{ helper_json.win | default('cls') }} frc={{ helper_json.frc | default('non') }} res={{ helper_json.res | default(0) }} man={{ helper_json.man | default(0) }} | 
                    States: 
                    opn={{ states(contact_window_opened) if contact_window_opened != [] else '-' }} 
                    tlt={{ states(contact_window_tilted) if contact_window_tilted != [] else '-' }}
                    res={{ state_resident }} 
                    sun_elev={{ current_sun_elevation | float(default=0) }}°({{ sun_elevation_up_current | float(default=0) | round(1) }}°/{{ sun_elevation_down_current | float(default=0) | round(1) }})° 
                    azim={{ current_sun_azimuth | float(default=0) | round(1) }}°
                    bri={{ states(default_brightness_sensor) if default_brightness_sensor != [] else '-' }} 
                    t1={{ states(shading_temperatur_sensor1) if shading_temperatur_sensor1 != [] else '-' }} 
                    t2={{ states(shading_temperatur_sensor2) if shading_temperatur_sensor2 != [] else '-' }}
                    update={{ update_values | default({}) | to_json }}
                    {% if log_extra is defined %} extra={{ log_extra }}{% endif %}

      # ═══════════════════════════════════════════════════════════════════════════
      # Apply Transition - the single leaf-branch epilogue
      # ═══════════════════════════════════════════════════════════════════════════
      # Every leaf branch computes exactly two things and then calls this anchor:
      #
      #   update_values  the state transition (reducer output) persisted by
      #                  *helper_update - omitted keys are preserved
      #   drive_plan     the actuation plan (reconciler output):
      #                    run:         drive at all? (default false)
      #                    move:        'full' (position + tilt) | 'tilt' (tilt only)
      #                    action_set:  before/after action selector for the drive
      #                    target:      target_position
      #                    target_tilt: target_tilt_position
      #                    tilt_first:  reposition tilt to 0 before tilting
      #                    delay_s:     pre-drive delay in seconds (0 = none)
      #
      # Ordering is fixed: optional delay -> optional drive -> helper persist.
      # The helper write is unconditional, so every path through a leaf branch
      # is terminal by construction (Invariant 2 / Bug Pattern AK).
      # All drive_plan references are default-guarded because this anchor body
      # is pre-rendered on every run (Invariant 14).
      # ═══════════════════════════════════════════════════════════════════════════
      apply_transition: &apply_transition
        sequence:
          - variables:
              target_position: "{{ (drive_plan | default({})).target | default(101) | int }}"
              target_tilt_position: "{{ (drive_plan | default({})).target_tilt | default(101) | int }}"
              tilt_first: "{{ (drive_plan | default({})).tilt_first | default(false) }}"
              drive_action_set: "{{ (drive_plan | default({})).action_set | default('') }}"
          - if: "{{ (drive_plan | default({})).run | default(false) }}"
            then:
              - if: "{{ (drive_plan | default({})).delay_s | default(0) | int > 0 }}"
                then:
                  - delay:
                      seconds: "{{ (drive_plan | default({})).delay_s | default(0) | int }}"
              - choose:
                  - conditions: "{{ (drive_plan | default({})).move | default('full') == 'tilt' }}"
                    sequence:
                      - *tilt_move_action
                default:
                  - *drive_with_actions
          - *helper_update

  # ════════════════════════════════════════════════════════════════════════════
  # Initialise empty helper with JSON default values
  # ════════════════════════════════════════════════════════════════════════════
  - if:
      - "{{ cover_status_helper != [] }}"
      - or:
          - "{{ states(cover_status_helper) in invalid_states }}"
          - '{{ not states(cover_status_helper) | regex_match("((\[[^\}]+)?\{\s*[^\}\{]{3,}?:.*\}([^\{]+\])?)") }}'
    then:
      - action: input_text.set_value
        data:
          entity_id: !input cover_status_helper
          value: >-
            {% set ts_now = as_timestamp(now()) | round(0) %}
            {% set dict_new = {
              'bas': 'opn',
              'shd': 0,
              'pnd': 'non',
              'win': 'cls',
              'frc': 'non',
              'res': 0,
              'man': 0,
              'ts': {
                'opn': 0,
                'cls': 0,
                'shd': 0,
                'due': 0,
                'arm': 0,
                'man': 0
              },
              'v': 6,
              't': ts_now | int
            } %}
            {{ dict_new | to_json }}

  # ════════════════════════════════════════════════════════════════════════════
  # Persist migration (v5 → v6) and stale-schema cleanup
  # ════════════════════════════════════════════════════════════════════════════
  # Migration is computed in helper_json variable. Persist back to the helper when:
  #   - the stored version is not 6 (v5 → v6 conversion), OR
  #   - the stored ts.* contains keys that the current schema no longer recognizes
  #     (defensive cleanup; preserves all live state, resets pending to idle).
  # We check the raw helper state, not helper_json (which always has v:6 after migration).
  - if:
      - "{{ cover_status_helper != [] }}"
      - condition: template
        value_template: >-
          {% set helper_state = states(cover_status_helper) %}
          {% set helper_raw = helper_state | from_json(default={}) if helper_state not in invalid_states else {} %}
          {% set raw_ts = helper_raw.ts | default({}) %}
          {% set known_ts_keys = ['opn', 'cls', 'shd', 'due', 'arm', 'man'] %}
          {% set has_unknown_ts = raw_ts.keys() | reject('in', known_ts_keys) | list | count > 0 %}
          {{ helper_raw.v | default(0) != 6 or has_unknown_ts }}
    then:
      - variables:
          update_values: {}
      - *helper_update

  # ════════════════════════════════════════════════════════════════════════════
  # Load weather forecast data from service (only when needed)
  # ════════════════════════════════════════════════════════════════════════════
  - if:
      - "{{ is_shading_enabled }}"
      - "{{ forecast_source.use_weather and not forecast_source.prevent_service }}"
      - "{{ states(shading_forecast_sensor) not in invalid_states }}"
      - "{{ trigger.id is defined }}"
      - "{{ trigger.id | regex_match('^(t_shading_start|t_open|t_calendar_event_start|t_recovery)') }}" # All shading-start triggers, every opening trigger (so the opening handler can evaluate shading_start_warranted while a pending is armed, #514 follow-up) and the recovery
    then:
      - action: weather.get_forecasts
        target:
          entity_id: !input shading_forecast_sensor
        data:
          type: "{{ shading_forecast_type }}"
        response_variable: weather_forecast
        continue_on_error: true

      # Warn when the service returned no usable forecast data: the weather entity
      # is available and the service was called, but the returned forecast list is
      # empty/missing. Without this, forecast conditions silently evaluate to "not met"
      # (forecast_temp_raw / forecast_weather_condition_raw stay None) and shading never
      # starts. Most commonly a temporary provider-side hiccup (e.g. Met.no rate-limiting).
      - if:
          - "{{ shading_start_condition_enabled.forecast_temp or shading_start_condition_enabled.forecast_weather or shading_end_condition_enabled.forecast_temp or shading_end_condition_enabled.forecast_weather }}"
          - >-
            {{
              weather_forecast is not defined or
              shading_forecast_sensor not in weather_forecast or
              (weather_forecast[shading_forecast_sensor].forecast | default([]) | count == 0)
            }}
        then:
          - action: system_log.write
            data:
              level: warning
              logger: "blueprints.hvorragend.cca"
              message: >-
                Cover Control Automation ({{ friendly_name }}): weather.get_forecasts for
                {{ shading_forecast_sensor }} (type '{{ shading_forecast_type }}') returned an empty
                forecast - forecast-based shading conditions cannot be evaluated and will be treated as
                not met. The weather entity is available but provides no forecast data (often a temporary
                provider-side issue, e.g. Met.no rate-limiting). Verify by running weather.get_forecasts
                for this entity in Developer Tools - Actions. If this persists, reload the weather
                integration or use a different weather entity / a direct forecast temperature sensor.

  # ════════════════════════════════════════════════════════════════════════════
  # Load calendar events for today (00:00 to 23:59)
  # ════════════════════════════════════════════════════════════════════════════
  - if:
      # Only load when calendar is enabled and entity is valid
      - "{{ is_calendar_enabled }}"
      - "{{ calendar_entity != [] }}"
      - "{{ states(calendar_entity) not in invalid_states }}"
      - "{{ trigger.id is defined }}"
      # Performance: Only load on relevant triggers
      - or:
          - "{{ trigger.id | regex_match('^t_open') }}"
          - "{{ trigger.id | regex_match('^t_close') }}"
          - "{{ trigger.id | regex_match('^t_shading_start') }}"
          - "{{ trigger.id | regex_match('^t_shading_end') }}"
          - "{{ trigger.id | regex_match('^t_calendar_event') }}"
    then:
      - action: calendar.get_events
        target:
          entity_id: !input calendar_entity
        data:
          # Get all events for today (00:00:00 to 23:59:59)
          start_date_time: "{{ today_at('00:00:00').isoformat() }}"
          end_date_time: "{{ (today_at('23:59:59') + timedelta(seconds=1)).isoformat() }}"
        response_variable: calendar_events
        continue_on_error: true  # Don't fail if calendar is temporarily unavailable

  # ════════════════════════════════════════════════════════════════════════════
  # Recalculate ALL forecast-dependent variables (even if forecast wasn't loaded)
  # This ensures variables are always defined and prevents crashes
  # ════════════════════════════════════════════════════════════════════════════
  - variables:
      # ╔════════════════════════════════════════════════════════════════════╗
      # ║ EVENT NORMALIZATION - live sensor state, computed once per run      ║
      # ╚════════════════════════════════════════════════════════════════════╝
      # Single source of truth for the live window sensors. Branch conditions
      # reference these flags instead of re-deriving the raw sensor idiom.
      # The contact handler re-reads the sensors after its settle delay into
      # its own local variables (contact_opened_now / contact_tilted_now).
      window_opened_now: "{{ contact_window_opened != [] and states(contact_window_opened) in ['true', 'on'] }}"
      window_tilted_now: "{{ contact_window_tilted != [] and states(contact_window_tilted) in ['true', 'on'] }}"
      window_any_now: "{{ window_opened_now or window_tilted_now }}"
      # Explicitly closed/unconfigured - NOT the negation of window_opened_now:
      # an unavailable sensor is neither "open" nor "explicitly closed".
      window_opened_clear: "{{ contact_window_opened == [] or states(contact_window_opened) in ['false', 'off'] }}"

      # Lockout evaluation per context: a fully open window always locks out,
      # a tilted window only when the matching lockout option is enabled.
      lockout_now:
        closing: "{{ window_opened_now or (lockout_tilted_when_closing and window_tilted_now) }}"
        shading_start: "{{ window_opened_now or (lockout_tilted_when_shading_starts and window_tilted_now) }}"
        shading_end: "{{ window_opened_now or (lockout_tilted_when_shading_ends and window_tilted_now) }}"

      # Once-per-day shading guard (calendar-date based, Bug Pattern V):
      # true when shading may still start today.
      shading_once_guard_ok: "{{ not prevent_flags.shading_multiple_times or now().strftime('%Y-%m-%d') != helper_ts_shade | timestamp_custom('%Y-%m-%d') }}"

      # Standard pre-drive delay (fixed + random component). Drawn once per run;
      # only one leaf branch executes, so this is equivalent to drawing at the
      # delay step.
      drive_delay_standard: "{{ range(drive_delay_fix | int(0), drive_delay_fix | int(0) + drive_delay_random | int(0) + 1) | random }}"

      # ╔════════════════════════════════════════════════════════════════════╗
      # ║ RECONCILER PROJECTION - target parameters per effective state       ║
      # ╚════════════════════════════════════════════════════════════════════╝
      # Maps each effective_state value to its drive parameters. Branches that
      # "drive to state X" build their drive_plan from state_targets[X] instead
      # of repeating position/tilt/action-set triples.
      state_targets:
        lock:
          target: "{{ open_position | int }}"
          target_tilt: "{{ open_tilt_position | int }}"
          action_set: "ventilate"
        opn:
          target: "{{ open_position | int }}"
          target_tilt: "{{ open_tilt_position | int }}"
          action_set: "up"
        vnt:
          target: "{{ ventilate_position | int }}"
          target_tilt: "{{ ventilate_tilt_position | int }}"
          action_set: "ventilate"
        shd:
          target: "{{ effective_shading_position | int }}"
          target_tilt: "{{ shading_tilt_position | int }}"
          action_set: "shading_start"
        cls:
          target: "{{ close_position | int }}"
          target_tilt: "{{ close_tilt_position | int }}"
          action_set: "down"

      # Standard drive gate per target state: force permits the move AND the
      # cover is not already resting there. Branches whose will_drive is
      # exactly this form reference state_gates[X] instead of restating it.
      # Branches with a different gate (e.g. no position check in the force
      # recovery, or extra trigger conditions) keep their own expression.
      state_gates:
        lock: "{{ force_allows_ventilate and (effective_state != 'lock' or not in_open_position) }}"
        opn: "{{ force_allows_open and (effective_state != 'opn' or not in_open_position) }}"
        vnt: "{{ force_allows_ventilate and (effective_state != 'vnt' or not in_ventilate_position) }}"
        shd: "{{ force_allows_shade and (effective_state != 'shd' or not in_shading_position) }}"
        cls: "{{ force_allows_close and (effective_state != 'cls' or not in_close_position) }}"

      # Forecast data normalisation.
      # Temperature from sensor (priority) or weather entity
      forecast_temp_raw: >-
        {% set sensor = shading_forecast_temp_sensor %}
        {% set weather = shading_forecast_sensor %}
        {% if sensor != [] and states(sensor) not in invalid_states %}
          {{ states(sensor) | float(default=None) }}
        {% elif weather == [] or states(weather) in invalid_states %}
          {{ None }}
        {% elif 'weather_attributes' in shading_forecast_type %}
          {{ state_attr(weather, 'temperature') | float(default=None) }}
        {% elif weather_forecast is defined and weather in weather_forecast %}
          {{ weather_forecast[weather].forecast[0].temperature | default(None) | float(default=None) }}
        {% else %}
          {{ None }}
        {% endif %}

      # Weather condition (only from weather entity)
      forecast_weather_condition_raw: >-
        {% set weather = shading_forecast_sensor %}
        {% if weather == [] or states(weather) in invalid_states %}
          {{ None }}
        {% elif 'weather_attributes' in shading_forecast_type %}
          {{ states(weather) }}
        {% elif weather_forecast is defined and weather in weather_forecast %}
          {{ weather_forecast[weather].forecast[0].condition | default(None) }}
        {% else %}
          {{ None }}
        {% endif %}

      diag_forecast_weather_attribute_mode: >-
        {% if forecast_source.prevent_service %}
          {{
            {
              'attribute_value': forecast_weather_condition_raw,
              'in_configured_list': (forecast_weather_condition_raw in shading_weather_conditions)
                                    if forecast_weather_condition_raw is not none else none,
              'configured_list': shading_weather_conditions
            }
          }}
        {% endif %}

      # SHADING START - Individual Condition Evaluations
      # All START conditions evaluated and stored in one dictionary
      shading_start_condition_states:
        azimuth_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.azimuth or
            default_sun_sensor == [] or
            (
              current_sun_azimuth | float(default=0) > shading_azimuth_start and
              current_sun_azimuth | float(default=0) < shading_azimuth_end
            )
          }}
        elevation_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.elevation or
            default_sun_sensor == [] or
            (
              current_sun_elevation | float(default=0) > shading_elevation_min and
              current_sun_elevation | float(default=0) < shading_elevation_max
            )
          }}
        brightness_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.brightness or
            shading_brightness_sensor == [] or
            (
              states(shading_brightness_sensor) in invalid_states and
              trigger is defined and trigger.id == 't_shading_start_pending_2'
            ) or
            (
              states(shading_brightness_sensor) not in invalid_states and
              states(shading_brightness_sensor) | float(default=shading_sun_brightness_start) > (shading_sun_brightness_start + shading_sun_brightness_hysteresis)
            )
          }}
        temp1_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.temp1 or
            shading_temperatur_sensor1 == [] or
            (
              states(shading_temperatur_sensor1) in invalid_states and
              trigger is defined and trigger.id == 't_shading_start_pending_3'
            ) or
            (
              states(shading_temperatur_sensor1) not in invalid_states and
              states(shading_temperatur_sensor1) | float(default=shading_min_temperatur1) > (shading_min_temperatur1 + shading_temperature_hysteresis1)
            )
          }}
        temp2_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.temp2 or
            shading_temperatur_sensor2 == [] or
            (
              states(shading_temperatur_sensor2) in invalid_states and
              trigger is defined and trigger.id == 't_shading_start_pending_4'
            ) or
            (
              states(shading_temperatur_sensor2) not in invalid_states and
              states(shading_temperatur_sensor2) | float(default=shading_min_temperatur2) > (shading_min_temperatur2 + shading_temperature_hysteresis2)
            )
          }}
        forecast_temp_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.forecast_temp or
            shading_forecast_temp == [] or
            (
              forecast_temp_raw is not none and
              forecast_temp_raw > (shading_forecast_temp + shading_forecast_temp_hysteresis)
            ) or
            (
              'shading_compare_forecast_with_sensor2' in shading_config and
              shading_temperatur_sensor2 != [] and
              shading_forecast_temp != [] and
              (states(shading_temperatur_sensor2) | float(default=0) > (shading_forecast_temp + shading_forecast_temp_hysteresis))
            )
          }}
        independent_temp_valid: >-
          {{
            not is_shading_enabled or
            shading_independent_temp == [] or
            (
              forecast_temp_raw is not none and
              forecast_temp_raw > (shading_independent_temp + shading_forecast_temp_hysteresis)
            ) or
            (
              'shading_compare_forecast_with_sensor2' in shading_config and
              shading_temperatur_sensor2 != [] and
              (states(shading_temperatur_sensor2) | float(default=0) > (shading_independent_temp + shading_forecast_temp_hysteresis))
            )
          }}
        forecast_weather_valid: >-
          {{
            not is_shading_enabled or
            not shading_start_condition_enabled.forecast_weather or
            shading_weather_conditions == [] or
            forecast_source.use_sensor or
            (
              forecast_weather_condition_raw is not none and
              forecast_weather_condition_raw not in invalid_states and
              forecast_weather_condition_raw in shading_weather_conditions
            )
          }}

      # SHADING START - Combined AND/OR Logic
      # START AND: All required conditions must be true
      shading_start_and_result: >-
        {{
          (
            ('cond_azimuth' not in shading_conditions_start_and or
            default_sun_sensor == [] or
            shading_start_condition_states.azimuth_valid)
            and
            ('cond_elevation' not in shading_conditions_start_and or
            default_sun_sensor == [] or
            shading_start_condition_states.elevation_valid)
            and
            ('cond_brightness' not in shading_conditions_start_and or
            shading_brightness_sensor == [] or
            shading_start_condition_states.brightness_valid)
            and
            ('cond_temp1' not in shading_conditions_start_and or
            shading_temperatur_sensor1 == [] or
            shading_start_condition_states.temp1_valid)
            and
            ('cond_temp2' not in shading_conditions_start_and or
            shading_temperatur_sensor2 == [] or
            shading_start_condition_states.temp2_valid)
            and
            ('cond_forecast_temp' not in shading_conditions_start_and or
            shading_forecast_temp == [] or
            shading_start_condition_states.forecast_temp_valid)
            and
            ('cond_forecast_weather' not in shading_conditions_start_and or
            shading_weather_conditions == [] or
            shading_start_condition_states.forecast_weather_valid)
          )
        }}

      # START OR: At least one optional condition must be true (or none required)
      shading_start_or_result: >-
        {{
          (shading_conditions_start_or | count == 0) or
          (
            ('cond_azimuth' in shading_conditions_start_or and
            default_sun_sensor != [] and
            shading_start_condition_states.azimuth_valid)
            or
            ('cond_elevation' in shading_conditions_start_or and
            default_sun_sensor != [] and
            shading_start_condition_states.elevation_valid)
            or
            ('cond_brightness' in shading_conditions_start_or and
            shading_brightness_sensor != [] and
            shading_start_condition_states.brightness_valid)
            or
            ('cond_temp1' in shading_conditions_start_or and
            shading_temperatur_sensor1 != [] and
            shading_start_condition_states.temp1_valid)
            or
            ('cond_temp2' in shading_conditions_start_or and
            shading_temperatur_sensor2 != [] and
            shading_start_condition_states.temp2_valid)
            or
            ('cond_forecast_temp' in shading_conditions_start_or and
            shading_forecast_temp != [] and
            shading_start_condition_states.forecast_temp_valid)
            or
            ('cond_forecast_weather' in shading_conditions_start_or and
            shading_weather_conditions != [] and
            shading_start_condition_states.forecast_weather_valid)
          )
        }}

      # Final START condition: All AND conditions + at least one OR condition
      shading_start_conditions_met: >-
        {{
          is_shading_enabled and
          shading_start_and_result and
          shading_start_or_result
        }}

      # Shading start still warranted (mirrors the execution gate): the standard
      # AND/OR conditions OR the independent temperature path. Used by the opening
      # handler to decide whether a shading-start pending should still defer the
      # opening, or whether the stale pending must be cleared and the cover opened.
      shading_start_warranted: >-
        {{
          shading_start_conditions_met or
          ('shading_temp_comparison_independent' in shading_config and
           shading_start_condition_states.independent_temp_valid)
        }}

      # SHADING END - Individual Condition Evaluations
      # All END conditions evaluated with inverse logic and stored in one dictionary
      shading_end_condition_states:
        azimuth_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.azimuth and
            default_sun_sensor != [] and
            (
              current_sun_azimuth | float(default=999) <= shading_azimuth_start or
              current_sun_azimuth | float(default=0) >= shading_azimuth_end
            )
          }}
        elevation_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.elevation and
            default_sun_sensor != [] and
            (
              current_sun_elevation | float(default=999) <= shading_elevation_min or
              current_sun_elevation | float(default=0) >= shading_elevation_max
            )
          }}
        brightness_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.brightness and
            shading_brightness_sensor != [] and
            states(shading_brightness_sensor) not in invalid_states and
            states(shading_brightness_sensor) | float(default=999999) < (shading_sun_brightness_end - shading_sun_brightness_hysteresis)
          }}
        temp1_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.temp1 and
            shading_temperatur_sensor1 != [] and
            states(shading_temperatur_sensor1) not in invalid_states and
            states(shading_temperatur_sensor1) | float(default=999) < (shading_min_temperatur1 - shading_temperature_hysteresis1)
          }}
        temp2_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.temp2 and
            shading_temperatur_sensor2 != [] and
            states(shading_temperatur_sensor2) not in invalid_states and
            states(shading_temperatur_sensor2) | float(default=999) < (shading_min_temperatur2 - shading_temperature_hysteresis2)
          }}
        forecast_temp_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.forecast_temp and
            shading_forecast_temp != [] and
            forecast_temp_raw is not none and
            forecast_temp_raw < (shading_forecast_temp - shading_forecast_temp_hysteresis)
          }}
        forecast_weather_invalid: >-
          {{
            is_shading_enabled and
            shading_end_condition_enabled.forecast_weather and
            shading_weather_conditions != [] and
            shading_forecast_sensor != [] and
            forecast_weather_condition_raw is not none and
            forecast_weather_condition_raw not in invalid_states and
            forecast_weather_condition_raw not in shading_weather_conditions
          }}

      # SHADING END - Combined AND/OR Logic
      # END AND: All specified conditions must become invalid
      shading_end_and_result: >-
        {{
          shading_conditions_end_and | count > 0 and
          (
            ('cond_azimuth' not in shading_conditions_end_and or
            default_sun_sensor == [] or
            shading_end_condition_states.azimuth_invalid)
            and
            ('cond_elevation' not in shading_conditions_end_and or
            default_sun_sensor == [] or
            shading_end_condition_states.elevation_invalid)
            and
            ('cond_brightness' not in shading_conditions_end_and or
            shading_brightness_sensor == [] or
            shading_end_condition_states.brightness_invalid)
            and
            ('cond_temp1' not in shading_conditions_end_and or
            shading_temperatur_sensor1 == [] or
            shading_end_condition_states.temp1_invalid)
            and
            ('cond_temp2' not in shading_conditions_end_and or
            shading_temperatur_sensor2 == [] or
            shading_end_condition_states.temp2_invalid)
            and
            ('cond_forecast_temp' not in shading_conditions_end_and or
            shading_forecast_temp == [] or
            shading_end_condition_states.forecast_temp_invalid)
            and
            ('cond_forecast_weather' not in shading_conditions_end_and or
            shading_weather_conditions == [] or
            shading_end_condition_states.forecast_weather_invalid)
          )
        }}

      # END OR: At least one specified condition must become invalid
      shading_end_or_result: >-
        {{
          shading_conditions_end_or | count > 0 and
          (
            ('cond_azimuth' in shading_conditions_end_or and
            shading_end_condition_states.azimuth_invalid)
            or
            ('cond_elevation' in shading_conditions_end_or and
            shading_end_condition_states.elevation_invalid)
            or
            ('cond_brightness' in shading_conditions_end_or and
            shading_end_condition_states.brightness_invalid)
            or
            ('cond_temp1' in shading_conditions_end_or and
            shading_end_condition_states.temp1_invalid)
            or
            ('cond_temp2' in shading_conditions_end_or and
            shading_end_condition_states.temp2_invalid)
            or
            ('cond_forecast_temp' in shading_conditions_end_or and
            shading_end_condition_states.forecast_temp_invalid)
            or
            ('cond_forecast_weather' in shading_conditions_end_or and
            shading_end_condition_states.forecast_weather_invalid)
          )
        }}

      # Final END condition: AND result OR OR result
      shading_end_conditions_met: >-
        {{
          is_shading_enabled and
          (
            shading_end_and_result or
            shading_end_or_result
          )
        }}

      # ╔════════════════════════════════════════════════════════════════════╗
      # ║ CALENDAR EVENT PARSING                                             ║
      # ║ Parse today's calendar events to extract time windows              ║
      # ╚════════════════════════════════════════════════════════════════════╝

      # Parse "Open Cover" event from today's calendar events
      # Returns dictionary with: found (bool), start (datetime), end (datetime)
      calendar_open_event: >-
        {% set result = namespace(found=false, start=none, end=none) %}
        {% if is_calendar_enabled and calendar_events is defined and calendar_entity in calendar_events %}
          {% set events = calendar_events[calendar_entity].events | default([]) %}
          {% for event in events %}
            {% set summary = (event.summary | default('')) | lower | trim %}
            {% if calendar_open_title_lc != '' and calendar_open_title_lc == summary %}
              {% set result.found = true %}
              {% set result.start = event.start %}
              {% set result.end = event.end %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ {
          'found': result.found,
          'start': result.start,
          'end': result.end
        } }}

      # Parse "Close Cover" event from today's calendar events
      calendar_close_event: >-
        {% set result = namespace(found=false, start=none, end=none) %}
        {% if is_calendar_enabled and calendar_events is defined and calendar_entity in calendar_events %}
          {% set events = calendar_events[calendar_entity].events | default([]) %}
          {% for event in events %}
            {% set summary = (event.summary | default('')) | lower | trim %}
            {% if calendar_close_title_lc != '' and calendar_close_title_lc == summary %}
              {% set result.found = true %}
              {% set result.start = event.start %}
              {% set result.end = event.end %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ {
          'found': result.found,
          'start': result.start,
          'end': result.end
        } }}

      # ╔════════════════════════════════════════════════════════════════════╗
      # ║ CALENDAR TIMESTAMPS                                                ║
      # ║ Convert event times to timestamps for numeric comparisons          ║
      # ╚════════════════════════════════════════════════════════════════════╝

      # Current time as timestamp (for calendar time comparisons)
      now_ts: "{{ as_timestamp(now()) }}"

      # Open event start time (timestamp) - equivalent to time_up_early
      calendar_open_start: >-
        {% if calendar_open_event.found and calendar_open_event.start is not none %}
          {{ as_timestamp(calendar_open_event.start) }}
        {% else %}
          {{ none }}
        {% endif %}

      # Open event end time (timestamp) - equivalent to time_up_late
      calendar_open_end: >-
        {% if calendar_open_event.found and calendar_open_event.end is not none %}
          {{ as_timestamp(calendar_open_event.end) }}
        {% else %}
          {{ none }}
        {% endif %}

      # Close event start time (timestamp) - equivalent to time_down_early
      calendar_close_start: >-
        {% if calendar_close_event.found and calendar_close_event.start is not none %}
          {{ as_timestamp(calendar_close_event.start) }}
        {% else %}
          {{ none }}
        {% endif %}

      # Close event end time (timestamp) - equivalent to time_down_late
      calendar_close_end: >-
        {% if calendar_close_event.found and calendar_close_event.end is not none %}
          {{ as_timestamp(calendar_close_event.end) }}
        {% else %}
          {{ none }}
        {% endif %}

      # ╔════════════════════════════════════════════════════════════════════╗
      # ║ TIME PHASE DETECTION (UNIFIED FOR TIME AND CALENDAR)               ║
      # ║ These variables work for BOTH time input and calendar mode         ║
      # ╚════════════════════════════════════════════════════════════════════╝

      # Opening Phase = Time window between early and late opening
      # Used for: Environmental condition checks during opening window
      is_opening_phase: >-
        {{
          (
            is_time_field_enabled and
            now() >= today_at(time_up_early_today) and
            now() < today_at(time_up_late_today)
          ) or
          (
            is_calendar_enabled and
            calendar_open_start is not none and
            calendar_open_end is not none and
            now_ts >= calendar_open_start and
            now_ts < calendar_open_end
          )
        }}

      # Daytime Phase = Cover should be open (after opening until closing starts)
      # Used for: Resident logic, general "day" detection, shading availability
      is_daytime_phase: >-
        {{
          is_time_control_disabled or
          (
            is_time_field_enabled and
            now() >= today_at(time_up_early_today) and
            now() < today_at(time_down_early_today)) or
          (
            is_calendar_enabled and
            calendar_open_start is not none and
            calendar_close_start is not none and
            now_ts >= calendar_open_start and
            now_ts < calendar_close_start)
        }}

      # Closing Phase = Time window between early and late closing
      # Used for: Environmental condition checks during closing window
      is_closing_phase: >-
        {{
          (
            is_time_field_enabled and
            now() >= today_at(time_down_early_today) and
            now() < today_at(time_down_late_today)
          ) or
          (
            is_calendar_enabled and
            calendar_close_start is not none and
            calendar_close_end is not none and
            now_ts >= calendar_close_start and
            now_ts < calendar_close_end
          )
        }}

      # Evening Phase = Cover should be closed (from closing time onwards)
      # Used for: Prevent unwanted opening after close time
      is_evening_phase: >-
        {{
          not is_time_control_disabled and
          (
            (
              is_time_field_enabled and
              now() >= today_at(time_down_early_today)
            ) or
            (
              is_calendar_enabled and
              calendar_close_start is not none and
              now_ts >= calendar_close_start
            )
          )
        }}

      # Late opening time reached (forced opening trigger)
      is_time_up_late: >-
        {{
          (
            is_time_field_enabled and
            now() >= today_at(time_up_late_today) and
            now() < today_at(time_down_early_today)
          ) or
          (
            is_calendar_enabled and
            calendar_open_end is not none and
            calendar_close_start is not none and
            now_ts >= calendar_open_end and
            now_ts < calendar_close_start
          )
        }}

      # Late closing time reached (forced closing trigger)
      is_time_down_late: >-
        {{
          (
            is_time_field_enabled and
            now() >= today_at(time_down_late_today)
          ) or
          (
            is_calendar_enabled and
            calendar_close_end is not none and
            now_ts >= calendar_close_end
          )
        }}

      # Extended daytime window: Allows shading even during closing phase
      # Used in: All shading logic to ensure shading only during daytime
      is_shading_allowed_window: >-
        {{
          is_time_control_disabled or
          (
            is_time_field_enabled and
            now() >= today_at(time_up_early_today) and
            now() <= today_at(time_down_late_today) + timedelta(seconds = 5)
          ) or
          (
            is_calendar_enabled and
            calendar_open_start is not none and
            calendar_close_end is not none and
            now_ts >= calendar_open_start and
            now_ts <= calendar_close_end
          )
        }}

      # ========== ENVIRONMENTAL CONDITIONS ==========

      # Environmental conditions: configurable AND/OR logic between brightness and sun elevation
      environment_allows_opening: >-
        {%- set brightness_ok = (
          default_brightness_sensor == [] or
          states(default_brightness_sensor) | float(default=brightness_up) > (brightness_up + brightness_hysteresis)
        ) -%}
        {%- set sun_ok = (
          default_sun_sensor == [] or
          current_sun_elevation | float(default=sun_elevation_up_current) > sun_elevation_up_current
        ) -%}
        {%- if is_brightness_enabled and is_sun_elevation_enabled -%}
          {{ (brightness_ok and sun_ok) if use_and_operator else (brightness_ok or sun_ok) }}
        {%- elif is_brightness_enabled -%}
          {{ brightness_ok }}
        {%- elif is_sun_elevation_enabled -%}
          {{ sun_ok }}
        {%- else -%}
          true
        {%- endif -%}

      environment_allows_closing: >-
        {%- set brightness_close = (
          default_brightness_sensor == [] or
          states(default_brightness_sensor) | float(default=brightness_down) < (brightness_down - brightness_hysteresis)
        ) -%}
        {%- set sun_close = (
          default_sun_sensor == [] or
          current_sun_elevation | float(default=sun_elevation_down_current) < sun_elevation_down_current
        ) -%}
        {%- if is_brightness_enabled and is_sun_elevation_enabled -%}
          {{ (brightness_close and sun_close) if use_and_operator else (brightness_close or sun_close) }}
        {%- elif is_brightness_enabled -%}
          {{ brightness_close }}
        {%- elif is_sun_elevation_enabled -%}
          {{ sun_close }}
        {%- else -%}
          true
        {%- endif -%}

      # ========== COMBINED CONDITIONS ==========

      # Should cover be open right now? (for resident logic)
      should_be_open_now: >-
        {{
          is_daytime_phase and
          not is_evening_phase and
          (
            (not is_brightness_enabled and not is_sun_elevation_enabled) or
            environment_allows_opening
          )
        }}

      # Should cover be closed right now? (not use atm)
      should_be_closed_now: >-
        {{
          is_evening_phase and
          (
            (not is_brightness_enabled and not is_sun_elevation_enabled) or
            environment_allows_closing
          )
        }}

  # ═══════════════════════════════════════════════════════════════════════════
  # MANDATORY HELPER VALIDATION
  # ═══════════════════════════════════════════════════════════════════════════
  # Cover Control Automation requires a properly configured Cover Status Helper.
  # This validation ensures all prerequisites are met before automation execution.
  - if:
      - "{{ cover_status_helper == [] }}"
    then:
      - action: system_log.write
        data:
          message: >-
            Cover Control Automation ({{ friendly_name }}): CONFIGURATION ERROR - Cover Status Helper is required but not configured.
            Please configure a Cover Status Helper (input_text entity) in the automation settings.
          level: error
      - action: logbook.log
        data:
          name: "Cover Control Automation"
          message: >-
            ❌ {{ friendly_name }}: Automation stopped - Cover Status Helper not configured.
            A valid input_text helper is mandatory. Please configure it in the automation settings.
          entity_id: "{{ blind_entities[0] if blind_entities else none }}"
      - stop: "Missing Cover Status Helper configuration"

  - if:
      - "{{ check_status_helper_length is not none and check_status_helper_length | int < 210 }}"
    then:
      - action: system_log.write
        data:
          message: >-
            Cover Control Automation ({{ friendly_name }}): CRITICAL CONFIGURATION ERROR - Cover Status Helper max length is {{ check_status_helper_length }} characters but at least 210 are required (recommended: 254).
            Helper: {{ cover_status_helper }}
            The automation cannot persist state with the current max length. Increase the 'Maximum length' setting of the input_text helper.
          level: error
      - action: logbook.log
        data:
          name: "Cover Control Automation"
          message: >-
            ❌ {{ friendly_name }}: Cover Status Helper max length too small ({{ check_status_helper_length }}/210). Increase to at least 254.
          entity_id: "{{ cover_status_helper }}"
      - stop: "Cover Status Helper max length too small"

  # ════════════════════════════════════════════════════════════════════════════
  # Calendar trigger relevance check
  # Based on the parsed calendar events (calendar.get_events), because the
  # calendar entity's 'message' attribute only exposes a single event and
  # hides concurrent events with a different title (#568)
  # ════════════════════════════════════════════════════════════════════════════
  - alias: "Calendar trigger relevance check"
    if:
      - "{{ trigger.id is defined and trigger.id | regex_match('^t_calendar_event') }}"
      - condition: template
        value_template: >-
          {% set flip_to = as_timestamp(trigger.to_state.last_changed) %}
          {% set flip_from = as_timestamp(trigger.from_state.last_changed) if trigger.from_state is not none else 0 %}
          {% set boundaries = [calendar_open_start, calendar_open_end, calendar_close_start, calendar_close_end] %}
          {% set ns = namespace(relevant=false) %}
          {% for b in boundaries %}
            {% if b is not none and (b | float(0)) > flip_from and (b | float(0)) <= flip_to + 60 %}
              {% set ns.relevant = true %}
            {% endif %}
          {% endfor %}
          {{ not ns.relevant }}
    then:
      - stop: "Calendar trigger ignored: No configured open/close event starts or ends at this calendar state change"

  - choose:
      ############################################################
      # BRANCH (12): RECOVERY AFTER RESTART / OUTAGE / RESUME
      #   Trigger: Home Assistant start, a source that became usable again, or the
      #            automation itself being switched on again - and then ANY trigger
      #   Source: Any state
      #   Target: The state the cascade demands right now
      #   Note: Re-evaluates all inputs from scratch - schedule, window, resident,
      #         force and shading - because the events of the outage are lost
      #   Note: Placed FIRST on purpose. On a resumed automation it claims every
      #         trigger, so nothing can act on a helper that cannot be trusted.
      #         Kept as number 12 because the docs refer to it by that name.
      ############################################################

      - alias: "Recovery after restart or outage - restore target state"
        conditions:
          - "{{ trigger.id is defined }}"
          # A resumed automation converts ANY trigger into a recovery: the cover only ever
          # moves through a trigger, so recalculating first makes moving on a stale helper
          # structurally impossible. This is why the branch is first in the choose.
          - "{{ trigger.id == 't_recovery' or automation_resumed }}"
        sequence:
          - variables:
              # The 23:55 reset did not run while the automation was off, so an old shading
              # would still read as active. Emulate what that reset would have done.
              recovered_shade: "{{ helper_state_shade and not stale_day }}"
              # Base state re-derived from the schedule
              recovered_base: >-
                {% if is_time_control_disabled %}{{ helper_state_base }}
                {% elif is_down_enabled and is_evening_phase %}cls
                {% elif is_up_enabled and is_daytime_phase %}opn
                {% else %}{{ helper_state_base }}{% endif %}
              recovered_window: >-
                {% set s_opn = contact_window_opened != [] and states(contact_window_opened) in ['true', 'on'] %}
                {% set s_tlt = contact_window_tilted != [] and states(contact_window_tilted) in ['true', 'on'] %}
                {{ 'opn' if s_opn else 'tlt' if s_tlt else helper_state_window if (contact_window_opened == [] and contact_window_tilted == []) else 'cls' }}
          - variables:
              # Priority cascade - mirrors effective_state, but on the re-derived base state and live_force
              recovered_state: >-
                {% if live_force != 'non' %}
                  {{ live_force }}
                {% elif recovered_window == 'opn' %}
                  lock
                {% else %}
                  {% if state_resident and resident_flags.closing_trigger %}
                    {% set base_target = 'cls' %}
                  {% elif recovered_shade and resident_flags.allow_shade %}
                    {% set base_target = 'shd' %}
                  {% elif recovered_base == 'opn' and not resident_flags.allow_open %}
                    {% set base_target = 'cls' %}
                  {% else %}
                    {% set base_target = recovered_base %}
                  {% endif %}
                  {% if recovered_window == 'tlt' and resident_flags.allow_ventilate and not (base_target == 'opn' and is_opening_scheduled) %}
                    vnt
                  {% else %}
                    {{ base_target }}
                  {% endif %}
                {% endif %}
              # A pending whose due time has passed can no longer execute - its trigger will not
              # re-fire. A pending from an earlier day is dead for the same reason.
              pending_is_stale: >-
                {{ helper_state_pending != 'non' and
                   (stale_day or helper_ts_pending_due <= as_timestamp(now()) | round(0)) }}
          - variables:
              # Shading start/end re-evaluated from the current conditions
              recovered_pending: >-
                {% if not is_shading_enabled or (helper_state_pending != 'non' and not pending_is_stale) %}
                  non
                {% elif not recovered_shade and shading_start_warranted and shading_once_guard_ok %}
                  beg
                {% elif recovered_shade and shading_end_conditions_met %}
                  end
                {% else %}
                  non
                {% endif %}
          - variables:
              # Mirrors the arming branches, incl. the deferral to the shading window start
              recovered_due: >-
                {% if recovered_pending == 'beg' %}
                  {% set wait_due = (as_timestamp(now()) + shading_waitingtime_start | int) | int %}
                  {% if is_time_control_disabled or is_shading_allowed_window %}
                    {{ wait_due }}
                  {% elif is_time_field_enabled %}
                    {{ [wait_due, as_timestamp(today_at(time_up_early_today)) | int + 1] | max }}
                  {% elif is_calendar_enabled and calendar_open_start is not none %}
                    {{ [wait_due, calendar_open_start | int + 1] | max }}
                  {% else %}
                    {{ wait_due }}
                  {% endif %}
                {% elif recovered_pending == 'end' %}
                  {{ (as_timestamp(now()) + shading_waitingtime_end | int) | int }}
                {% elif pending_is_stale %}
                  0
                {% else %}
                  {{ helper_ts_pending_due }}
                {% endif %}
              recovered_arm: >-
                {% if recovered_pending == 'beg' %}
                  {% set ts = as_timestamp(now()) | int %}
                  {% if is_time_control_disabled or is_shading_allowed_window %}
                    {{ ts }}
                  {% elif is_time_field_enabled %}
                    {{ [ts, as_timestamp(today_at(time_up_early_today)) | int] | max }}
                  {% elif is_calendar_enabled and calendar_open_start is not none %}
                    {{ [ts, calendar_open_start | int] | max }}
                  {% else %}
                    {{ ts }}
                  {% endif %}
                {% elif recovered_pending == 'end' %}
                  {{ as_timestamp(now()) | int }}
                {% elif pending_is_stale %}
                  0
                {% else %}
                  {{ helper_ts_pending_arm }}
                {% endif %}
              lockout_blocks_shading: >-
                {{ is_ventilation_enabled and
                   (recovered_window == 'opn' or
                    (lockout_tilted_when_shading_starts and recovered_window == 'tlt')) }}
          - variables:
              new_pending: "{{ recovered_pending if recovered_pending != 'non' else ('non' if pending_is_stale else helper_state_pending) }}"
              # Let the shading execution do the movement instead of opening first
              defer_to_shading: "{{ recovered_pending == 'beg' and recovered_state == 'opn' and not lockout_blocks_shading }}"
              # Drive parameters from the shared reconciler projection, so the shading
              # target honours the alternate shading position like every other drive
              target_position: "{{ state_targets[recovered_state].target | int }}"
              target_tilt_position: "{{ state_targets[recovered_state].target_tilt | int }}"
          - variables:
              # A manual override still blocks the DRIVE (only lockout overrules it, Invariant 6),
              # but it must not block the helper hygiene above - otherwise a stale shading or a
              # dead pending would survive the recovery whenever man == 1.
              recovery_allowed: >-
                {{ not defer_to_shading and
                   (not helper_state_manual or override_expired or recovered_state == 'lock') and
                   (force_allows_ventilate if recovered_state in ['lock', 'vnt']
                    else force_allows_open if recovered_state == 'opn'
                    else force_allows_shade if recovered_state == 'shd'
                    else force_allows_close) }}
              recovery_in_position: >-
                {{ (target_position | int) >= (current_position | int) - (position_tolerance | int(0)) and
                   (target_position | int) <= (current_position | int) + (position_tolerance | int(0)) }}
              log_extra: >-
                Recovery{{ ' (automation resumed)' if automation_resumed else '' }}{{ ' (new day)' if stale_day else '' }}:
                base {{ helper_state_base }}->{{ recovered_base }},
                frc {{ helper_state_force }}->{{ live_force }},
                shd {{ 1 if helper_state_shade else 0 }}->{{ 1 if recovered_shade else 0 }},
                pnd {{ helper_state_pending }}->{{ new_pending }}{{ ' (stale cleared)' if pending_is_stale else '' }},
                state {{ recovered_state }}, target {{ target_position }}{{ ', expired manual override cleared' if override_expired else '' }}{{ ', opening deferred to shading' if defer_to_shading else '' }}
          - variables:
              drive_plan:
                run: "{{ recovery_allowed }}"
                target: "{{ target_position | int }}"
                target_tilt: "{{ target_tilt_position | int }}"
                # A caught-up opening/closing is a real one, so it runs the user's drive
                # actions - but only when the cover actually changes position. Unlike
                # state_gates, recovery_allowed carries no position check (it must stay
                # true so a tilt-only correction still happens), so without this gate the
                # before/after actions would re-fire on every one of the ~19 recovery
                # sources even though cover_move_action no-ops. Same predicate as man.
                action_set: "{{ state_targets[recovered_state].action_set if not recovery_in_position else '' }}"
              update_values:
                # Re-apply the cascade after the outage
                bas: "{{ recovered_base }}"
                win: "{{ recovered_window }}"
                res: "{{ 1 if state_resident else 0 }}"
                frc: "{{ live_force }}"
                shd: "{{ 1 if recovered_shade else 0 }}"
                man: "{{ 0 if override_expired or (recovery_allowed and not recovery_in_position) else helper_json.man | default(0) | int }}"
                pnd: "{{ new_pending }}"
                ts:
                  # No ts.shd here even when shd is cleared 1->0: stamping it with today would
                  # make the once-per-day guard block today's shading. The midnight reset may
                  # stamp it because it runs at 23:55 on the same day - this branch may not.
                  opn: "{{ 'now' if recovered_base == 'opn' and helper_state_base != 'opn' else (0 if stale_day else helper_ts_open) }}"
                  cls: "{{ 'now' if recovered_base == 'cls' and helper_state_base != 'cls' else (0 if stale_day else helper_ts_close) }}"
                  due: "{{ recovered_due | int }}"
                  arm: "{{ recovered_arm | int }}"
          - *apply_transition
          - alias: "Run the user's override reset action for an override the outage swallowed"
            if: "{{ override_expired }}"
            then:
              - choose: []
                default: !input auto_override_reset_action
          - stop: "Recovery executed (state: {{ recovered_state }}, pending: {{ new_pending }})"


      ############################################################
      # BRANCH (0): OPEN
      #   Trigger: Opening time/calendar events
      #   Source: Any state (Close, Ventilation, Shading)
      #   Target: Open (primary) or Shading (if shading conditions met)
      #   Note: Always updates base state, movement only if conditions allow
      ############################################################

      - alias: "Check for opening"
        conditions:
          - "{{ is_up_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id | regex_match('^(t_open|t_calendar_event)') }}"
          - condition: !input auto_up_condition
          - "{{ not override_blocks.opening }}"
          - or: # Only once a day?
              - "{{ not prevent_flags.opening_multiple_times }}"
              - "{{ prevent_flags.opening_multiple_times and ((now().strftime('%Y-%m-%d') != helper_ts_open | timestamp_custom('%Y-%m-%d')) or helper_ts_man <= helper_ts_open) }}"
          - or: # Opening scenarios - works for BOTH time and calendar mode
              - "{{ is_time_control_disabled }}"
              - and: # Ultimate opening ONLY for specific time triggers (no environment checks)
                  - "{{ is_time_up_late }}"
              - and: # All other triggers: WITH environment checks
                  - "{{ is_opening_phase or is_daytime_phase }}"
                  - "{{ not is_evening_phase }}"
                  - "{{ environment_allows_opening }}"
        sequence:
          - choose:
              ###################################
              # Already in open position - only update base
              ###################################
              - alias: "Already in open position - only update base state"
                conditions:
                  - "{{ effective_state == 'opn' and in_open_position }}"
                  - "{{ not helper_state_is_shaded }}"
                  - "{{ not helper_state_pending_start }}"
                  - "{{ not helper_state_shade }}"
                sequence:
                  - if: "{{ helper_state_base != 'opn' or now().day != helper_ts_open | timestamp_custom('%-d', true) | int }}"
                    then:
                      # Real base-state transition or new day: refresh ts.opn
                      - variables:
                          update_values:
                            bas: "opn"
                            ts:
                              opn: "now"
                    else:
                      # Already open, same day: preserve ts.opn (Issue #495)
                      - variables:
                          update_values:
                            bas: "opn"
                  - *apply_transition
                  - stop: "Open time: Already in position, base state updated"

              ###################################
              # Cover should be shaded
              ###################################
              - alias: "Shading detected. Move to shading position"
                conditions:
                  - or:
                      - "{{ helper_state_is_shaded }}"
                      - "{{ helper_state_shade }}" # Check for target(!) marker
                  - "{{ not in_shading_position }}" # Even if this is hardly possible, there may be situations that require it. Purely as a precautionary measure in case the target state and actual state do not match.
                sequence:
                  - variables:
                      will_drive: "{{ force_allows_shade and effective_state == 'shd' }}"
                      drive_plan:
                        run: "{{ will_drive }}"
                        action_set: "shading_start"
                        target: "{{ effective_shading_position | int }}"
                        target_tilt: "{{ shading_tilt_position | int }}"
                        delay_s: "{{ drive_delay_standard }}"
                      update_values:
                        # Activate shading, base state is open (time-based)
                        bas: "opn"
                        shd: 1
                        man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                        pnd: 'non'
                        ts:
                          shd: "now"
                          due: 0
                          arm: 0
                  - *apply_transition
                  - stop: "Opening skipped: Shading detected"

              ###################################
              # Shading start pending - defer to execution trigger
              ###################################
              - alias: "Opening skipped: Shading start pending"
                conditions:
                  - "{{ helper_state_pending_start }}"
                  - "{{ shading_start_warranted }}" # Only defer while shading is still warranted; otherwise fall through to normal opening
                  # Lockout window: the shading execution only stores the intent and stops without
                  # any movement, so a deferred opening would never happen - fall through to normal
                  # opening instead (window open -> open position)
                  - "{{ not (is_ventilation_enabled and lockout_now.shading_start) }}"
                sequence:
                  - variables:
                      update_values:
                        bas: "opn"
                        ts:
                          opn: "now"
                  - *apply_transition
                  - stop: "Opening skipped: Shading start pending"

            ###################################
            # Shading warranted at opening time but no pending is active - arm pending and defer
            # (e.g. pending was cleared by a manual open+close before opening time, Issue #555)
            ###################################
              - alias: "Opening: Shading warranted, arm pending"
                conditions:
                  - "{{ is_shading_enabled }}"
                  - "{{ shading_start_warranted }}"
                  - "{{ is_shading_allowed_window }}"
                  # Lockout window: the shading execution only stores the intent and stops without
                  # any movement, so arming would leave the cover unopened - fall through to normal
                  # opening instead (window open -> open position)
                  - "{{ not (is_ventilation_enabled and lockout_now.shading_start) }}"
                  - "{{ not helper_state_is_shaded }}"
                  - "{{ not helper_state_shade }}"
                  - "{{ not helper_state_pending_start }}"
                  - "{{ not helper_state_pending_end }}"
                  - "{{ shading_once_guard_ok }}"
                sequence:
                  - variables:
                      shading_start_due: "{{ (as_timestamp(now()) + shading_waitingtime_start | int) | int }}"
                      log_extra: "opening: shading warranted, arming pending; wait={{ shading_waitingtime_start | int }}s; max_duration={{ shading_start_max_duration | int }}s"
                      update_values:
                        bas: "opn"
                        shd: 0
                        pnd: 'beg'
                        ts:
                          opn: "now"
                          due: "{{ shading_start_due | int }}"
                          arm: "now"
                  - *apply_transition
                  - stop: "Opening: Shading pending armed"

            ###################################
            # Normal opening of the cover
            ###################################
              - alias: "Normal opening of the cover"
                conditions:
                  - "{{ not in_shading_position or not helper_state_shade }}" # Defer to Shading End only while shading is active (shd == 1) - with shd == 0 the shading-end triggers are blocked and the cover would never open (Issue #565)
                sequence:
                  - variables:
                      will_drive: "{{ resident_flags.allow_open and (force_allows_open or trigger.id is match('^t_force_')) }}"
                      drive_plan:
                        run: "{{ will_drive }}"
                        action_set: "up"
                        target: "{{ open_position | int }}"
                        target_tilt: "{{ open_tilt_position | int }}"
                        delay_s: "{{ drive_delay_standard }}"
                      update_values:
                        # Set base state to open, clear shading
                        bas: "opn"
                        shd: 0
                        man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                        pnd: 'non'
                        ts:
                          opn: "now"
                          due: 0
                          arm: 0
                  - *apply_transition
                  - stop: "Opening executed"

            ###################################
            # In shading position - only update base state
            ###################################
            default:
              - variables:
                  update_values:
                    bas: "opn"
                    ts:
                      opn: "now"
              - *apply_transition
              - stop: "Open time: In shading position, base state updated (movement via Shading End)"

      ############################################################
      # BRANCH (1): CLOSE
      #   Trigger: Closing time/calendar events
      #   Source: Any state (Open, Shading, Ventilation)
      #   Target: Close (primary) or Ventilation (if window tilted/open)
      #   Note: Always updates base state, movement only if conditions allow
      ############################################################

      - alias: "Check for closing cover"
        conditions:
          - "{{ is_down_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id | regex_match('^(t_close|t_calendar_event)') }}"
          - condition: !input auto_down_condition
          - "{{ not override_blocks.closing }}"
          - or: # Only once a day?
              - "{{ not prevent_flags.closing_multiple_times }}"
              - "{{ prevent_flags.closing_multiple_times and ((helper_ts_close < today_at(time_down_early_today) | as_timestamp) or helper_ts_man <= helper_ts_close) }}"
          - or: # Closing scenarios - works for BOTH time and calendar mode
              - "{{ is_time_control_disabled }}"
              - and: # Ultimate closing ONLY for specific time triggers (no environment checks)
                  - "{{ is_time_down_late }}"
              - and: # All other triggers: WITH environment checks
                  - "{{ is_closing_phase or is_evening_phase }}"
                  - "{{ environment_allows_closing }}"
        sequence:
          - choose:
              #################################
              # Lockout protection when closing
              #################################
              - alias: "Lockout protection when closing"
                conditions:
                  - "{{ is_ventilation_enabled }}"
                  - "{{ lockout_now.closing }}"
                sequence:
                  - variables:
                      update_values:
                        bas: "cls"
                        shd: 0
                        win: "opn"
                        pnd: 'non'
                        ts:
                          cls: "now"
                          due: 0
                          arm: 0
                  - *apply_transition
                  - stop: "Closing skipped: Lockout enabled"

              ############################################################################
              # Window tilted. No lockout. Move to ventilation position instead of closing
              ############################################################################
              - alias: "Window tilted. No lockout. Move to ventilation position instead of closing"
                conditions:
                  - "{{ is_ventilation_enabled }}"
                  - "{{ resident_flags.allow_ventilate }}"
                  - condition: !input auto_ventilate_condition
                  - "{{ window_tilted_now }}"
                  - "{{ not lockout_tilted_when_closing }}"
                  - "{{ window_opened_clear }}"
                sequence:
                  - variables:
                      will_drive: "{{ state_gates.vnt }}"
                      drive_plan:
                        run: "{{ will_drive }}"
                        action_set: "ventilate"
                        target: "{{ ventilate_position | int }}"
                        target_tilt: "{{ ventilate_tilt_position | int }}"
                        delay_s: "{{ 0 if ventilation_flags.start_no_delay else drive_delay_standard }}"
                      update_values:
                        bas: "cls"
                        shd: 0
                        win: "tlt"
                        man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                        pnd: 'non'
                        ts:
                          cls: "now"
                          due: 0
                          arm: 0
                  - *apply_transition
                  - stop: "Closing skipped: Window tilted (Ventilation activated)"

              ###################################
              # Already in close position - only update base
              ###################################
              - alias: "Already in close position - only update base state"
                conditions:
                  - "{{ effective_state == 'cls' and in_close_position }}"
                  - or:
                      # Primary: base not yet reflecting current schedule
                      # (e.g. Force Close is active while opening time has passed)
                      - "{{ helper_state_base != 'cls' }}"
                      # Secondary: ts.cls is from a previous day
                      # (needed for prevent_multiple_times to work correctly)
                      - "{{ now().day != helper_ts_close | timestamp_custom('%-d', true) | int }}"
                sequence:
                  - variables:
                      update_values:
                        bas: "cls"
                        ts:
                          cls: "now"
                  - *apply_transition
                  - stop: "Close time: Already in position, base state updated"

              ###################################
              # Cover is shaded and lowering blocked
              ###################################
              - alias: "Only status change if cover is shaded and lowering blocked"
                conditions:
                  - or:
                      - and: # Stop if cover is shaded and close position is lower than shading position
                          - "{{ prevent_flags.lowering_when_closing_if_shaded }}"
                          - "{{ helper_state_is_shaded }}"
                          - "{{ not position_comparisons.shading_above_close }}"
                      - and: # Stop if cover is shaded and close position is lower than shading position
                          - "{{ prevent_flags.lowering_when_closing_if_shaded }}"
                          - "{{ in_shading_position }}" # Always, no further checks for 'is_status_helper_enabled'
                          - "{{ not position_comparisons.shading_above_close }}"
                      - and:  # Stop if close-position is higher than the current position
                          - "{{ prevent_flags.higher_position_closing }}"
                          - "{{ position_comparisons.current_below_close or current_position == close_position }}"
                sequence:
                  - variables:
                      update_values:
                        # Set base state to close, clear shading
                        bas: "cls"
                        shd: 0
                        pnd: 'non'
                        ts:
                          cls: "now"
                          due: 0
                          arm: 0
                  - *apply_transition
                  - stop: "Closing skipped: Cover is shaded and lowering blocked by settings"

            ###################################
            # Normal closing of the cover
            ###################################
            default:
              - variables:
                  will_drive: "{{ force_allows_close }}"
                  drive_plan:
                    run: "{{ will_drive }}"
                    action_set: "down"
                    target: "{{ close_position | int }}"
                    target_tilt: "{{ close_tilt_position | int }}"
                    delay_s: "{{ drive_delay_standard }}"
                  update_values:
                    # Set base state to close, clear shading
                    bas: "cls"
                    shd: 0
                    man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                    pnd: 'non'
                    ts:
                      cls: "now"
                      due: 0
                      arm: 0
              - *apply_transition
              - stop: "Closing executed"

      ############################################################
      # BRANCH (2): SHADING START
      #   Trigger: Shading conditions met (sun/temp/brightness)
      #   Source: Open (or Close if storing future shading state)
      #   Target: Shading (primary) or Lockout (if window open/tilted)
      #   Note: Uses pending mechanism with configurable delay
      ############################################################

      - alias: "Check for shading start"
        conditions:
          - "{{ is_shading_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id | regex_match('^(t_shading_start|t_open_1)') }}"
          - or: # Check the helper status or the target status
              - "{{ not helper_state_is_shaded }}"
              - "{{ not window_any_now }}"
              - "{{ helper_state_pending_end }}" # Allow entry to cancel an end-pending even while the window is open/tilted
          - or: # Try to avoid starting the shading several times TODO / FIXME?
              - "{{ not is_cover_tilt_enabled_and_possible and not in_shading_position }}"
              - "{{ is_cover_tilt_enabled_and_possible }}"
              - "{{ helper_state_pending_end }}" # Allow entry to cancel a stale end-pending
          - or: # Only once a day?
              - "{{ shading_once_guard_ok }}"
              - "{{ trigger.id | regex_match('^(t_shading_start_execution)') }}" # Execution must not be stopped if there is a shading pending in the helper beforehand.
              - "{{ helper_state_pending_end }}" # Allow entry to cancel an end-pending even after shading already ran today

        sequence:
          - if:
              - or:
                  - and: # Independent temperature-based shading
                      - "{{ 'shading_temp_comparison_independent' in shading_config }}"
                      - "{{ shading_start_condition_states.independent_temp_valid }}"
                  - "{{ shading_start_conditions_met }}" # Use flexible AND/OR logic
              - or:
                  - "{{ trigger.id | regex_match('^(t_shading_start_pending)') }}"
                  - "{{ is_shading_allowed_window }}"
            then:
              - choose:
                  #####################################################################
                  # Shading re-detected while end-pending is active: cancel the pending
                  # end so the cover stays shaded until end conditions hold for the
                  # full waiting time without interruption.
                  #####################################################################
                  - alias: "Shading re-detected. Cancel pending shading end"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_start_pending)') }}"
                      - "{{ helper_state_pending_end }}"
                      - "{{ not shading_end_conditions_met }}" # Only cancel when the end conditions are no longer met
                    sequence:
                      - variables:
                          log_extra: "shading end pending canceled (start-pending event, end conditions no longer met); elapsed={{ (as_timestamp(now()) - helper_ts_pending_arm) | int }}s"
                          update_values:
                            pnd: 'non'
                            ts:
                              due: 0
                              arm: 0
                      - *apply_transition
                      - stop: "Shading End Pending: Canceled (shading re-detected)"

                  #####################################################################
                  # Shading start detected. Save next execution time and pending status
                  #####################################################################
                  - alias: "Shading detected. Save next execution time and pending status"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_start_pending)') }}"
                      - "{{ not helper_state_pending_start }}" # Not if a pending is already active
                      - "{{ not helper_state_pending_end }}" # Mutual-exclusivity guard against misconfigured conditions
                      - "{{ not helper_state_shade }}" # Not if shading is already active or stored (t_shading_start_pending_7 bypasses the global shd-gate)
                    sequence:
                      - variables:
                          shading_start_due: >-
                            {% set wait_due = (as_timestamp(now()) + shading_waitingtime_start | int) | int %}
                            {% if is_time_control_disabled or is_shading_allowed_window %}
                              {{ wait_due }}
                            {% elif is_time_field_enabled %}
                              {{ [wait_due, as_timestamp(today_at(time_up_early_today)) | int + 1] | max }}
                            {% elif is_calendar_enabled and calendar_open_start is not none %}
                              {{ [wait_due, calendar_open_start | int + 1] | max }}
                            {% else %}
                              {{ wait_due }}
                            {% endif %}
                          shading_start_arm: >-
                            {% set ts = as_timestamp(now()) | int %}
                            {% if is_time_control_disabled or is_shading_allowed_window %}
                              {{ ts }}
                            {% elif is_time_field_enabled %}
                              {{ [ts, as_timestamp(today_at(time_up_early_today)) | int] | max }}
                            {% elif is_calendar_enabled and calendar_open_start is not none %}
                              {{ [ts, calendar_open_start | int] | max }}
                            {% else %}
                              {{ ts }}
                            {% endif %}
                          log_extra: "shading start pending armed; wait={{ shading_waitingtime_start | int }}s; due_in={{ (shading_start_due | int - as_timestamp(now()) | int) }}s; max_duration={{ shading_start_max_duration | int }}s; budget_from={{ shading_start_arm | int }}"
                          update_values:
                            # Set shade pending timestamp
                            shd: 0
                            pnd: 'beg'
                            ts:
                              shd: "now"
                              due: "{{ shading_start_due | int }}"
                              arm: "{{ shading_start_arm | int }}" # Anchor max-duration budget to window start when arming before the window
                      - *apply_transition
                      - stop: "Shading Start Pending: Waiting"

                  ###################################################
                  # Execution: pending elapsed - drive or retry/abort
                  ###################################################
                  - alias: "Shading start execution"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_start_execution)') }}"
                      - "{{ helper_state_pending_start }}" # Only when it comes back from pending status
                    sequence:
                      - if:
                          - condition: !input auto_shading_start_condition
                          - "{{ not override_blocks.shading }}"
                        then:
                          - choose:
                              ##################################################
                              # Consider lockout protection when shading starts
                              ##################################################
                              - alias: "Consider lockout protection when shading starts"
                                conditions:
                                  - "{{ is_ventilation_enabled }}"
                                  - "{{ lockout_now.shading_start }}"
                                sequence:
                                  - variables:
                                      update_values:
                                        # Shading blocked by lockout, record window state, store shading intent
                                        shd: 1
                                        win: "opn"
                                        pnd: 'non'
                                        ts:
                                          shd: "now"
                                          due: 0
                                          arm: 0 # Clear retry anchor (sequence ended)
                                  - *apply_transition
                                  - stop: "Shading Start skipped: Lockout enabled"

                              ##################################################
                              # Shading start while the window is tilted:
                              # ventilation is a floor (VENT > SHADING), so cap
                              # the cover at the ventilation position instead of
                              # shading below it. Mirrors effective_state == 'vnt'.
                              ##################################################
                              - alias: "Shading start - hold ventilation floor (window tilted)"
                                conditions:
                                  - "{{ is_ventilation_enabled }}"
                                  - "{{ window_tilted_now }}"
                                  - "{{ not window_opened_now }}"
                                  - "{{ force_allows_ventilate }}"
                                  - "{{ resident_flags.allow_ventilate }}"
                                  - "{{ resident_flags.allow_shade }}"
                                  - "{{ is_shading_allowed_window }}"
                                  - "{{ position_comparisons.shading_below_ventilate }}"
                                sequence:
                                  - variables:
                                      will_drive: "{{ not in_ventilate_position }}"
                                      drive_plan:
                                        run: "{{ will_drive }}"
                                        action_set: "ventilate"
                                        target: "{{ ventilate_position | int }}"
                                        target_tilt: "{{ ventilate_tilt_position | int }}"
                                        delay_s: "{{ drive_delay_standard }}"
                                      update_values:
                                        # Shading active but window tilted: hold the ventilation floor
                                        shd: 1
                                        win: "tlt"
                                        man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                                        pnd: 'non'
                                        ts:
                                          shd: "now"
                                          due: 0
                                          arm: 0 # Clear retry anchor (sequence ended)
                                  - *apply_transition
                                  - stop: "Shading Start: ventilation floor held (window tilted)"

                              ###################################
                              # Start Shading
                              ###################################
                              - alias: "Start Shading"
                                conditions:
                                  - or: # Position check
                                      - and:
                                          - "{{ not is_cover_tilt_enabled_and_possible }}"
                                          - "{{ position_comparisons.current_above_shading }}"
                                      - and:
                                          - "{{ is_cover_tilt_enabled_and_possible }}"
                                          - "{{ position_comparisons.current_above_shading or current_position == effective_shading_position }}"
                                      # Cover below the shading position (e.g. closed overnight) while the base state wants it open: raise to the shading cap
                                      - and:
                                          - "{{ position_comparisons.current_below_shading }}"
                                          - "{{ effective_state == 'opn' }}"
                                  - "{{ is_shading_allowed_window }}" # Shading during daytime window
                                  - "{{ resident_flags.allow_shade }}"
                                sequence:
                                  - variables:
                                      will_drive: "{{ force_allows_shade }}"
                                      drive_plan:
                                        run: "{{ will_drive }}"
                                        action_set: "shading_start"
                                        target: "{{ effective_shading_position | int }}"
                                        target_tilt: "{{ shading_tilt_position | int }}"
                                        delay_s: "{{ drive_delay_standard }}"
                                      update_values:
                                        # Activate shading
                                        shd: 1
                                        man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                                        pnd: 'non'
                                        ts:
                                          shd: "now"
                                          due: 0
                                          arm: 0 # Clear retry anchor (sequence ended)
                                  - *apply_transition
                                  - stop: "Shading Start executed"

                              ####################################
                              # Save shading state for the future
                              ####################################
                              - alias: "Save shading state for the future"
                                conditions:
                                  - or:
                                      - "{{ effective_state == 'cls' }}" # Cover closed: intent stored until cover opens
                                      - "{{ not resident_flags.allow_shade }}" # Resident blocking: intent stored until resident leaves
                                sequence:
                                  - variables:
                                      update_values:
                                        # Store shading intent for future
                                        shd: 1
                                        pnd: 'non'
                                        ts:
                                          shd: "now"
                                          due: 0
                                          arm: 0 # Clear retry anchor (sequence ended)
                                  - *apply_transition
                                  - stop: "Shading Start skipped: State saved"

                            ######################################################
                            # No drive warranted (e.g. cover already resting at
                            # the shading position, or held at the ventilation
                            # floor): record the shading state and end the pending
                            # sequence so it cannot get stuck.
                            ######################################################
                            default:
                              - variables:
                                  log_extra: "no drive warranted (position outside drive criteria); shading state recorded"
                                  update_values:
                                    shd: 1
                                    pnd: 'non'
                                    ts:
                                      shd: "now"
                                      due: 0
                                      arm: 0 # Clear retry anchor (sequence ended)
                              - *apply_transition
                              - stop: "Shading Start: state recorded (no drive required)"

                        else: # Blocked by additional condition or manual override - retry or abort
                          - variables:
                              shading_start_retry_reason: "blocked by={{ 'manual_override' if override_blocks.shading else 'auto_shading_start_condition' }}"
                          # Shared retry routine: also referenced by the outer
                          # "conditions not met" path via *shading_start_retry.
                          - &shading_start_retry
                            choose:
                              - alias: "Shading start retry - waiting for time window"
                                conditions:
                                  - "{{ not is_shading_allowed_window }}"
                                sequence:
                                  - variables:
                                      log_extra: "{{ shading_start_retry_reason | default('') }}; waiting for time window; next_retry_in={{ shading_waitingtime_start | int }}s"
                                      update_values:
                                        shd: 0
                                        pnd: 'beg'
                                        ts:
                                          due: "{{ (as_timestamp(now()) + shading_waitingtime_start | int) | int }}"
                                          arm: "now"
                                  - *apply_transition
                                  - stop: "Shading Start Pending: Waiting for time window"

                              - alias: "Shading start retry - continue waiting"
                                conditions:
                                  - "{{ shading_start_max_duration > 0 }}"
                                  - "{{ is_shading_allowed_window }}" # Continue only within time window
                                  - "{{ (as_timestamp(now()) - helper_ts_pending_arm) <= shading_start_max_duration }}"
                                sequence:
                                  - variables:
                                      log_extra: "{{ shading_start_retry_reason | default('') }}; elapsed={{ (as_timestamp(now()) - helper_ts_pending_arm) | int }}s/{{ shading_start_max_duration | int }}s; next_retry_in={{ shading_waitingtime_start | int }}s"
                                      update_values:
                                        # Continue waiting with new pending time
                                        shd: 0
                                        pnd: 'beg'
                                        ts:
                                          shd: "now"
                                          due: "{{ (as_timestamp(now()) + shading_waitingtime_start | int) | int }}"
                                  - *apply_transition
                                  - stop: "Shading Start Pending: Continue waiting"

                            # Abort: timeout OR outside time window OR max duration disabled
                            default:
                              - variables:
                                  log_extra: "abort: {{ shading_start_retry_reason | default('') }}; elapsed={{ (as_timestamp(now()) - helper_ts_pending_arm) | int }}s; max_duration={{ shading_start_max_duration | int }}s; in_window={{ is_shading_allowed_window }}"
                                  update_values:
                                    # Abort shading start, clear pending
                                    shd: 0
                                    pnd: 'non'
                                    ts:
                                      shd: "now"
                                      due: 0
                                      arm: 0 # Clear retry anchor (sequence ended)
                              - *apply_transition
                              - stop: "Shading Start aborted: Timeout or invalid"

            else: # Shading conditions were no longer met or not met again.
              - if:
                  - "{{ trigger.id | regex_match('^(t_shading_start_execution)') }}"
                  - "{{ helper_state_pending_start }}"
                then:
                  - variables:
                      shading_start_retry_reason: "shading_start_conditions_met=false"
                  - *shading_start_retry
                else:
                  - stop: "Shading start skipped: Pending trigger fired but combined start conditions evaluated false."

      ############################################################
      # BRANCH (3): SHADING Tilt
      ############################################################

      - alias: "Check for shading tilt"
        conditions:
          - "{{ is_shading_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id | regex_match('^(t_shading_tilt)') }}"
          - and:
              - "{{ helper_state_is_shaded }}"
              - "{{ not helper_state_pending_start }}"
          - "{{ is_cover_tilt_enabled_and_possible }}"
          - condition: !input auto_shading_tilt_condition
          - "{{ force_allows_shade }}"
          - "{{ resident_flags.allow_shade }}" # Do not tilt into shading while a resident is present and shading is not allowed
          - "{{ not window_any_now }}"
          - "{{ not override_blocks.shading }}"
        sequence:
          - variables:
              will_drive: "{{ force_allows_shade }}"
              drive_plan:
                run: "{{ will_drive }}"
                move: "tilt"
                target_tilt: "{{ shading_tilt_position | int }}"
                tilt_first: "{{ is_cover_tilt_reposition_enabled | bool }}" # tilt the cover to close position before
              update_values:
                man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
          - *apply_transition
          - stop: "Shading Tilt executed"

      ############################################################
      # BRANCH (3b): SHADING POSITION ADJUSTMENT
      #   Trigger: Alternate-shading-position gating entity toggled
      #   Source: Shading (already active)
      #   Target: Re-drive to the effective shading position (normal or alternate)
      #   Note: Re-applies the shading tilt after the position move (a position
      #         drive physically disturbs the slat angle on tilt covers);
      #         NOT a shading start (shd stays 1, ts.shd untouched), so
      #         "shade once per day" is unaffected
      ############################################################

      - alias: "Check for alternate shading position"
        conditions:
          - "{{ is_shading_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id | regex_match('^t_shading_position_alt') }}"
          - and:
              - "{{ helper_state_is_shaded }}"
              - "{{ not helper_state_pending_start }}"
          - "{{ force_allows_shade }}"
          - "{{ resident_flags.allow_shade }}" # Do not move into shading while a resident is present and shading is not allowed
          - "{{ not window_any_now }}"
          - "{{ not override_blocks.shading }}"
        sequence:
          - variables:
              will_drive: "{{ force_allows_shade and not in_shading_position }}"
              drive_plan:
                run: "{{ will_drive }}"
                target: "{{ effective_shading_position | int }}"
                target_tilt: "{{ shading_tilt_position | int }}"
              update_values:
                man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
          - *apply_transition
          - stop: "Alternate shading position executed"

      ############################################################
      # BRANCH (4): SHADING END
      #   Trigger: Shading end conditions met (sun position/temp/brightness)
      #   Source: Shading
      #   Target: Open (primary), Ventilation (if window states), or Tilt-only
      #   Note: Uses pending mechanism with optional immediate sun-based end
      ############################################################

      - alias: "Check for shading end"
        conditions:
          - "{{ is_shading_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id | regex_match('^(t_shading_end)') }}"
          - condition: !input auto_shading_end_condition
          - "{{ is_shading_allowed_window }}"
          - "{{ not override_blocks.shading }}"
          - "{{ effective_state != 'cls' }}"
          - or:
              - "{{ helper_state_is_shaded }}"
              - "{{ in_shading_position }}" # Be careful if the tolerance value is too high!
          - or: # Optional: Continue if cover is not already closed
              - "{{ not prevent_flags.shading_end_if_closed }}"
              - "{{ prevent_flags.shading_end_if_closed and not in_close_position and not position_comparisons.current_below_close }}"
          - "{{ resident_flags.allow_shade }}"
        sequence:
          - if:
              - "{{ shading_end_conditions_met }}" # Use flexible AND/OR logic for END
            then:
              - choose:
                  #####################################################################
                  # Shading end detected. Save next execution time and pending status
                  #####################################################################
                  - alias: "Shading end detected. Save next execution time and pending status"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_pending)') }}"
                      - "{{ not helper_state_pending_end }}"
                      - "{{ not helper_state_pending_start }}" # Mutual-exclusivity guard against misconfigured conditions
                    sequence:
                      - variables:
                          local_waitingtime_end: >
                            {% set local_waitingtime_end = shading_waitingtime_end | int %}
                            {% if (is_shading_end_immediate_by_sun_position | default(false)) | bool and trigger.id in ['t_shading_end_pending_5', 't_shading_end_pending_7'] %}
                            {% set local_waitingtime_end = 20 %}
                            {% endif %}
                            {{ local_waitingtime_end }}
                          log_extra: "shading end pending armed; wait={{ local_waitingtime_end | int }}s; immediate_by_sun={{ (is_shading_end_immediate_by_sun_position | default(false)) | bool }}"
                          update_values:
                            # Set shading end pending timestamp
                            shd: 1
                            pnd: 'end'
                            ts:
                              shd: "now"
                              due: "{{ (as_timestamp(now()) + local_waitingtime_end | int) | int }}"
                              arm: "now" # Anchor for max-duration retry window
                      - *apply_transition
                      - stop: "Shading End Pending: Waiting"

                  ######################################
                  # Lockout protection when shading ends
                  ######################################
                  - alias: "Lockout protection when shading ends"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                      - "{{ helper_state_pending_end }}"
                      - "{{ is_ventilation_enabled }}"
                      - "{{ position_comparisons.current_below_ventilate }}"
                      - "{{ lockout_now.shading_end }}"
                    sequence:
                      - variables:
                          update_values:
                            # Shading end blocked by lockout, window is open
                            shd: 0
                            win: "opn"
                            pnd: 'non'
                            ts:
                              shd: "now"
                              due: 0
                              arm: 0 # Clear retry anchor (sequence ended)
                      - *apply_transition
                      - stop: "Shading End skipped: Lockout enabled"

                  ################################
                  # Ventilation after shading ends
                  ################################
                  - alias: "Ventilation after shading ends"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                      - "{{ helper_state_pending_end }}"
                      - "{{ is_ventilation_enabled }}"
                      - "{{ ventilation_flags.after_shading_end }}"
                      - "{{ resident_flags.allow_ventilate }}"
                      - condition: !input auto_ventilate_condition
                      - "{{ window_tilted_now }}"
                      - "{{ window_opened_clear }}"
                      - or:
                          - "{{ position_comparisons.current_below_ventilate }}"
                          - "{{ ventilation_flags.if_lower_enabled and (position_comparisons.current_above_ventilate or current_position == ventilate_position) }}"
                    sequence:
                      - variables:
                          will_drive: "{{ force_allows_ventilate }}"
                          drive_plan:
                            run: "{{ will_drive }}"
                            action_set: "ventilate"
                            target: "{{ ventilate_position | int }}"
                            target_tilt: "{{ ventilate_tilt_position | int }}"
                            delay_s: "{{ range(0, 2) | random if (is_shading_end_immediate_by_sun_position | default(false)) | bool else drive_delay_standard }}"
                          update_values:
                            # Shading ends, window is tilted
                            shd: 0
                            win: "tlt"
                            man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                            pnd: 'non'
                            ts:
                              shd: "now"
                              due: 0
                              arm: 0 # Clear retry anchor (sequence ended)
                      - *apply_transition
                      - stop: "Shading End: Ventilation activated"

                  ######################################
                  # Only tilt open after shading ends
                  ######################################
                  - alias: "Only tilt open after shading ends"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                      - "{{ helper_state_pending_end }}"
                      - "{{ is_cover_tilt_enabled_and_possible }}"
                      - "{{ prevent_flags.opening_after_shading_end}}"
                    sequence:
                      - variables:
                          will_drive: "{{ not is_forced }}"
                          drive_plan:
                            run: "{{ will_drive }}"
                            move: "tilt"
                            target_tilt: "{{ open_tilt_position | int }}" # Moving the cover to open tilt position
                          update_values:
                            # Clear shading, tilt only
                            shd: 0
                            man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                            pnd: 'non'
                            ts:
                              shd: "now"
                              due: 0
                              arm: 0 # Clear retry anchor (sequence ended)
                      - *apply_transition
                      - stop: "Shading End: Tilt executed"

                  ########################################################
                  # Move cover after shading end - conditions still valid
                  ########################################################
                  - alias: "Move cover after shading end - conditions still valid"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                      - "{{ helper_state_pending_end }}"
                      - "{{ shading_end_conditions_met }}"
                    sequence:
                      - if:
                          - "{{ not prevent_flags.opening_after_shading_end}}"
                        then:
                          - if: "{{ force_allows_open }}"
                            then:
                              - variables:
                                  drive_plan:
                                    run: true
                                    action_set: "shading_end"
                                    target: "{{ open_position | int }}"
                                    target_tilt: "{{ open_tilt_position | int }}"
                                    delay_s: "{{ range(0, 2) | random if (is_shading_end_immediate_by_sun_position | default(false)) | bool else drive_delay_standard }}"
                                  update_values:
                                    # Shading ends, return to open base state
                                    bas: "opn"
                                    shd: 0
                                    man: 0
                                    pnd: 'non'
                                    ts:
                                      opn: "now"
                                      shd: "now"
                                      due: 0
                                      arm: 0 # Clear retry anchor (sequence ended)
                              - *apply_transition
                            else:
                              - variables:
                                  update_values:
                                    # Just clear shading state when forced
                                    shd: 0
                                    pnd: 'non'
                                    ts:
                                      shd: "now"
                                      due: 0
                                      arm: 0 # Clear retry anchor (sequence ended)
                              - *apply_transition
                        else:
                          # Opening after shading end is prevented by config:
                          # keep the cover where it is, but still end the
                          # pending sequence so it cannot get stuck.
                          - variables:
                              log_extra: "opening_after_shading_end prevented; shading cleared without drive"
                              update_values:
                                shd: 0
                                pnd: 'non'
                                ts:
                                  shd: "now"
                                  due: 0
                                  arm: 0 # Clear retry anchor (sequence ended)
                          - *apply_transition
                      - stop: "Shading End (Opening after shading) executed"

                  #####################################################################
                  # Shading end conditions not met - check if we should continue
                  #####################################################################
                  - alias: "Shading end conditions not met - check if we should continue"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                      - "{{ helper_state_pending_end }}"
                      - "{{ shading_end_max_duration > 0 }}"
                      - "{{ is_shading_allowed_window }}"
                      - "{{ (as_timestamp(now()) - helper_ts_pending_arm) <= shading_end_max_duration }}"
                    sequence:
                      - variables:
                          log_extra: "shading_end_conditions_met=false (after exec); elapsed={{ (as_timestamp(now()) - helper_ts_pending_arm) | int }}s/{{ shading_end_max_duration | int }}s; next_retry_in={{ shading_waitingtime_end | int }}s"
                          update_values:
                            # Continue waiting with new end pending time
                            shd: 1
                            pnd: 'end'
                            ts:
                              shd: "now"
                              due: "{{ (as_timestamp(now()) + shading_waitingtime_end | int) | int }}"
                      - *apply_transition
                      - stop: "Shading End Pending: Continue waiting"

                  ######################################################################
                  # Shading end / Stop retry (timeout OR outside time window OR disabled)
                  ######################################################################
                  - alias: "Shading end / Stop retry"
                    conditions:
                      - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                      - "{{ helper_state_pending_end }}"
                    sequence:
                      - variables:
                          log_extra: "abort: shading_end_conditions_met=false; elapsed={{ (as_timestamp(now()) - helper_ts_pending_arm) | int }}s; max_duration={{ shading_end_max_duration | int }}s; in_window={{ is_shading_allowed_window }}"
                          update_values:
                            # Abort shading end retry, keep shading active
                            shd: 1
                            pnd: 'non'
                            ts:
                              shd: "now"
                              due: 0
                              arm: 0 # Clear retry anchor (sequence ended)
                      - *apply_transition
                      - stop: "Shading End aborted: Timeout or invalid"
            # Issue #395: Execution trigger fires but end conditions are no longer met
            # (e.g. brightness recovered after a brief cloud). Without clearing the
            # pending state, the template trigger stays true forever (now() >= due
            # always holds for a past timestamp), so it never re-fires and new pending
            # triggers are blocked by helper_state_pending_end — cover gets stuck on
            # the shading position.
            else:
              - if:
                  - "{{ trigger.id | regex_match('^(t_shading_end_execution)') }}"
                  - "{{ helper_state_pending_end }}"
                then:
                  - variables:
                      log_extra: "stale pending cleared (end conditions recovered); elapsed={{ (as_timestamp(now()) - helper_ts_pending_arm) | int }}s"
                      update_values:
                        shd: 1
                        pnd: 'non'
                        ts:
                          due: 0
                          arm: 0 # Clear retry anchor (sequence ended)
                  - *apply_transition
                  - stop: "Shading End: cleared stale pending (conditions no longer met)"

      ############################################################
      # BRANCH (5): CONTACT SENSOR HANDLING
      #   Handles all contact sensor state changes:
      #   - Window opened → Full ventilation (lockout protection)
      #   - Window tilted → Partial ventilation
      #   - Window closed → Return to previous state (open/close/shading)
      ############################################################

      - alias: "Contact sensor state changed"
        conditions:
          - "{{ is_ventilation_enabled }}"
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id in ['t_contact_tilted_changed', 't_contact_opened_changed'] }}"
          - "{{ trigger.from_state.state not in invalid_states }}"
          - "{{ trigger.to_state.state not in invalid_states }}"
        sequence:
          # Wait for all sensor changes to settle
          - delay:
              seconds: !input contact_delay_status

          # Re-evaluate BOTH sensors with current values after delay
          - variables:
              contact_opened_now: "{{ contact_window_opened != [] and states(contact_window_opened) in ['true', 'on'] }}"
              contact_tilted_now: "{{ contact_window_tilted != [] and states(contact_window_tilted) in ['true', 'on'] }}"
              # Live resident check — like contact sensors above, must be read after delay
              # to detect race conditions when both window and resident change quickly
              resident_now: >-
                {{ (helper_json.res | default(0) | int == 1)
                   if (resident_sensor != [] and states(resident_sensor) in invalid_states)
                   else (resident_sensor != [] and states(resident_sensor) in ['on', 'true']) }}
              # Present resident suppresses the open base state only when privacy-closing
              # is enabled or opening is not permitted (mirrors effective_state's privacy
              # and allow_open gates). Mere presence does NOT close the cover.
              resident_blocks_open: "{{ resident_now and (resident_flags.closing_trigger or 'resident_allow_opening' not in resident_config) }}"
              # CCA held the cover in a ventilation state before this event
              # (helper says tilted/open, or the cover rests at the ventilation
              # position). Used by the "Window closed" return branch.
              was_ventilating: "{{ helper_state_window in ['tlt', 'opn'] or in_ventilate_position }}"
              # Background target after the window closed. First match wins,
              # mirroring the priority of the former dedicated return branches:
              # shading -> open -> close. 'non' when no target applies (e.g.
              # shading stored but blocked by a present resident while the
              # open base state is not resident-blocked) - the return branch
              # is then skipped entirely and the helper stays untouched.
              return_target: >-
                {% if (helper_state_is_shaded or helper_state_shade) and (not resident_now or 'resident_allow_shading' in resident_config) %}shd
                {% elif helper_state_base == 'opn' and not resident_blocks_open and not helper_state_is_shaded and not helper_state_shade %}opn
                {% elif helper_state_base == 'cls' or resident_blocks_open %}cls
                {% else %}non{% endif %}

          - choose:
              ###################################
              # VENTILATION START: Window fully opened
              # Opens cover completely for lockout protection
              ###################################
              - alias: "Window opened - Full ventilation (lockout)"
                conditions:
                  - "{{ contact_opened_now }}"
                  - "{{ not in_open_position }}"
                  - "{{ force_allows_ventilate }}" # TODO
                  - condition: !input auto_ventilate_condition
                sequence:
                  - variables:
                      will_drive: "{{ force_allows_open }}"
                      drive_plan:
                        run: "{{ will_drive }}"
                        action_set: "up"
                        target: "{{ open_position | int }}"
                        target_tilt: "{{ open_tilt_position | int }}"
                        delay_s: "{{ 0 if ventilation_flags.start_no_delay else drive_delay_standard }}"
                      update_values:
                        # Window is fully open (lockout)
                        win: "opn"
                        man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                  - *apply_transition
                  - stop: "Ventilation Start (Full) executed"

              ###################################
              # VENTILATION START: Window fully opened
              # Cover already at open position — just update win in helper
              ###################################
              - alias: "Window opened - Cover already at open position, update win"
                conditions:
                  - "{{ contact_opened_now }}"
                  - "{{ in_open_position }}"
                  - "{{ helper_state_window != 'opn' }}"
                sequence:
                  - variables:
                      update_values:
                        win: "opn"
                  - *apply_transition
                  - stop: "Ventilation (full): cover already at open position, win updated"

              ###################################
              # VENTILATION START: Window tilted
              # Moves cover to ventilation position
              ###################################
              - alias: "Window tilted - Partial ventilation"
                conditions:
                  - "{{ contact_tilted_now }}"
                  - "{{ not contact_opened_now }}"
                  - "{{ force_allows_ventilate }}" # TODO
                  - "{{ 'resident_allow_ventilation' in resident_config or not resident_now }}"
                  - condition: !input auto_ventilate_condition
                  # Top-level opt-out: full → tilt with keep-open flag set
                  - "{{ not (ventilation_flags.keep_open_on_full_to_tilt and helper_state_window == 'opn' and position_comparisons.current_above_ventilate) }}"
                  - "{{ effective_state != 'opn' }}"
                  # Position check: Only move if cover is below ventilation position (or option enabled)
                  - or:
                      # Standard: Cover is below ventilate position
                      - "{{ position_comparisons.current_below_ventilate }}"
                      # Tilt-enabled covers at or near ventilate position
                      - and:
                          - "{{ is_cover_tilt_enabled_and_possible }}"
                          - "{{ position_comparisons.current_below_ventilate or current_position == ventilate_position }}"
                          - "{{ current_tilt_position <= ventilate_tilt_position }}"
                      # User option: Allow from higher positions
                      - "{{ ventilation_flags.if_lower_enabled and (position_comparisons.current_above_ventilate or current_position == ventilate_position) }}"
                      # Transition from full to partial ventilation (handle: open → tilted)
                      - and:
                          - "{{ helper_state_window == 'opn' }}"
                          - "{{ position_comparisons.current_above_ventilate }}"
                      # Cover is above ventilate position but system is in privacy-close mode (resident present):
                      # drive down to ventilate position instead of continuing to close fully
                      - and:
                          - "{{ position_comparisons.current_above_ventilate }}"
                          - "{{ effective_state == 'cls' }}"

                sequence:
                  - variables:
                      drive_plan:
                        run: "{{ force_allows_ventilate }}"
                        action_set: "ventilate"
                        target: "{{ ventilate_position | int }}"
                        target_tilt: "{{ ventilate_tilt_position | int }}"
                        delay_s: "{{ 0 if ventilation_flags.start_no_delay else drive_delay_standard }}"
                      update_values:
                        # Window is tilted
                        win: "tlt"
                        man: 0
                  - *apply_transition
                  - stop: "Ventilation Start (Partial) executed"

              ###################################
              # VENTILATION START: Window tilted
              # No drive needed — sync helper window state only.
              # Covers two cases:
              #   a) Cover already at ventilate position
              #   b) Cover above ventilate position with keep_open_on_full_to_tilt opt-out
              ###################################
              - alias: "Window tilted - No drive, sync helper window state"
                conditions:
                  - "{{ contact_tilted_now }}"
                  - "{{ not contact_opened_now }}"
                  - "{{ helper_state_window != 'tlt' }}"
                  - or:
                      - "{{ in_ventilate_position }}"
                      - and:
                          - "{{ ventilation_flags.keep_open_on_full_to_tilt }}"
                          - "{{ helper_state_window == 'opn' }}"
                          - "{{ position_comparisons.current_above_ventilate }}"
                      - "{{ effective_state == 'opn' }}"
                sequence:
                  - variables:
                      update_values:
                        win: "tlt"
                  - *apply_transition
                  - stop: "Ventilation (partial): no drive, helper window state synced"

              ###################################
              # VENTILATION END: Window closed - return to the background state
              # One target-chain leaf for the former shading/open/close return
              # branches: return_target (post-delay variables) resolves the
              # priority chain shading -> open -> close / 'non'. All three
              # shared the same gates and user condition; only target, drive
              # gate and update extras differ - resolved via the maps below.
              # The chosen target is visible in the trace (return_target) and
              # in the logbook line (log_extra).
              ###################################
              - alias: "Window closed - Return to background state"
                conditions:
                  - "{{ not contact_opened_now and not contact_tilted_now }}"
                  - "{{ return_target != 'non' }}"
                  - "{{ was_ventilating }}"
                  - "{{ not override_blocks.ventilation }}"
                  - condition: !input auto_ventilate_end_condition
                sequence:
                  - variables:
                      will_drive: >-
                        {{ {'shd': force_allows_shade,
                            'opn': not prevent_flags.opening_after_ventilation_end and force_allows_open,
                            'cls': force_allows_close}[return_target] }}
                      drive_plan: "{{ dict(state_targets[return_target], run=will_drive, delay_s=drive_delay_standard if ventilation_flags.delay_enabled else 0) }}"
                      log_extra: "window closed; return_target={{ return_target }}"
                      update_values: >-
                        {% set base = {'win': 'cls', 'man': 0 if will_drive else helper_json.man | default(0) | int} %}
                        {{ dict(base, shd=1) if return_target == 'shd' else base }}
                  - *apply_transition
                  - stop: "Ventilation End: Return to background state executed"

      ############################################################
      # BRANCH (6): UPDATE RESIDENT STATUS IN HELPER
      #   This block updates helper_state_resident in the helper whenever
      #   the resident_sensor changes. This ensures helper_state_resident
      #   stays synchronized with the actual sensor state.
      ############################################################

      - alias: "Resident sensor status change handler"
        conditions:
          - "{{ trigger.id == 't_resident_update' }}"
        sequence:
          - variables:
              new_resident_status: "{{ 1 if trigger.to_state.state in ['on', 'true'] else 0 }}"
              resident_leaving: "{{ trigger.from_state.state in ['on', 'true'] and trigger.to_state.state in ['off', 'false'] }}"
              resident_arriving: "{{ trigger.from_state.state in ['off', 'false'] and trigger.to_state.state in ['on', 'true'] }}"

          - choose:
              - alias: "Resident leaving (ON→OFF)"
                conditions:
                  - "{{ resident_leaving }}"
                sequence:
                  # Two leaves: the ventilation-tilted target needs the
                  # user-supplied auto_ventilate_condition (only evaluable as a
                  # YAML condition), everything else is one target chain. The
                  # tilted branch requires "not window_opened_now", so it can
                  # never steal a lockout event from the chain.
                  - choose:
                      - alias: "Resident leaving: target VENTILATION (window tilted)"
                        conditions:
                          - "{{ window_tilted_now }}"
                          - "{{ not window_opened_now }}"
                          - "{{ effective_state == 'vnt' }}"
                          - "{{ resident_flags.allow_ventilate }}"
                          - "{{ is_ventilation_enabled }}"
                          - condition: !input auto_ventilate_condition
                        sequence:
                          - variables:
                              will_drive: "{{ state_gates.vnt }}"
                              drive_plan: "{{ dict(state_targets.vnt, run=will_drive, delay_s=drive_delay_standard) }}"
                              update_values:
                                # Resident leaving, window tilted
                                man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                                res: "{{ new_resident_status | int }}"
                          - *apply_transition
                    default:
                      # Reconcile to the background target. First match wins,
                      # mirroring the former dedicated branches in order:
                      # lockout (window open) -> shaded -> open -> close;
                      # 'non' updates only the resident status.
                      - variables:
                          leave_target: >-
                            {% if window_opened_now and resident_flags.allow_ventilate and is_ventilation_enabled %}lock
                            {% elif helper_state_shade and resident_flags.allow_shade and is_shading_enabled %}shd
                            {% elif helper_state_base == 'opn' and resident_flags.opening_trigger and is_up_enabled %}opn
                            {% elif helper_state_base == 'cls' and is_down_enabled %}cls
                            {% else %}non{% endif %}
                          will_drive: "{{ leave_target != 'non' and state_gates[leave_target] }}"
                          drive_plan: "{{ dict(state_targets[leave_target], run=will_drive, delay_s=drive_delay_standard) if leave_target != 'non' else {'run': false} }}"
                          log_extra: "resident leaving; target={{ leave_target }}"
                          update_values: >-
                            {% set base = {'man': 0 if will_drive else helper_json.man | default(0) | int, 'res': new_resident_status | int} %}
                            {% if leave_target == 'opn' %}{{ dict(base, bas='opn', ts={'opn': 'now'}) }}
                            {% elif leave_target == 'cls' %}{{ dict(base, bas='cls', ts={'cls': 'now'}) }}
                            {% else %}{{ base }}{% endif %}
                      - *apply_transition

              - alias: "Resident arriving (OFF→ON)"
                conditions:
                  - "{{ resident_arriving }}"
                sequence:
                  # Two leaves, same split as the leaving handler: the
                  # ventilation-hold target needs auto_ventilate_condition,
                  # the rest is a chain (lockout suppresses privacy-closing,
                  # so a fully open window always yields 'non' = res-only).
                  - choose:
                      - alias: "Resident arriving: window tilted → hold ventilation position"
                        conditions:
                          - "{{ window_tilted_now }}"
                          - "{{ not window_opened_now }}"
                          - "{{ effective_state == 'vnt' }}"
                          - "{{ 'resident_allow_ventilation' in resident_config }}"
                          - "{{ is_ventilation_enabled }}"
                          - condition: !input auto_ventilate_condition
                        sequence:
                          - variables:
                              will_drive: "{{ state_gates.vnt }}"
                              drive_plan: "{{ dict(state_targets.vnt, run=will_drive, delay_s=drive_delay_standard) }}"
                              update_values:
                                # Resident arriving, window tilted — hold ventilate position
                                man: "{{ 0 if will_drive else helper_json.man | default(0) | int }}"
                                res: "{{ new_resident_status | int }}"
                          - *apply_transition
                    default:
                      # Privacy close when configured — unless the open window
                      # forces lockout ('non' = only update resident status).
                      # Base and shade stay unchanged: resident is an overlay.
                      - variables:
                          arrive_target: >-
                            {% if not window_opened_now and is_down_enabled and resident_flags.closing_trigger %}cls
                            {% else %}non{% endif %}
                          will_drive: "{{ arrive_target == 'cls' and state_gates.cls }}"
                          drive_plan: "{{ dict(state_targets.cls, run=will_drive, delay_s=drive_delay_standard) if arrive_target == 'cls' else {'run': false} }}"
                          log_extra: "resident arriving; target={{ arrive_target }}"
                          update_values: >-
                            {% set base = {'man': 0 if will_drive else helper_json.man | default(0) | int, 'res': new_resident_status | int} %}
                            {{ dict(base, ts={'cls': 'now'}) if arrive_target == 'cls' else base }}
                      - *apply_transition
            default:
              # No action required, but still update resident status
              - variables:
                  update_values:
                    res: "{{ new_resident_status | int }}"
              - *apply_transition

      ############################################################
      # BRANCH (7): FORCE FUNCTIONS
      ############################################################

      - alias: "Force function triggered"
        conditions:
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id is match('t_force_enabled_.*') }}"
        sequence:
          # One parametrized sequence for all four force kinds; the trace's
          # trigger.id identifies which force was enabled.
          - variables:
              force_kind: >-
                {{ {'t_force_enabled_open': 'opn',
                    't_force_enabled_close': 'cls',
                    't_force_enabled_ventilate': 'vnt',
                    't_force_enabled_shading': 'shd'}.get(trigger.id, 'non') }}
          - if: "{{ force_kind != 'non' }}"
            then:
              - variables:
                  force_allows_target: >-
                    {{ (force_kind == 'opn' and force_allows_open)
                       or (force_kind == 'cls' and force_allows_close)
                       or (force_kind == 'vnt' and force_allows_ventilate)
                       or (force_kind == 'shd' and force_allows_shade) }}
                  drive_plan:
                    run: "{{ force_allows_target }}"
                    action_set: "{{ state_targets[force_kind].action_set }}"
                    target: "{{ state_targets[force_kind].target | int }}"
                    target_tilt: "{{ state_targets[force_kind].target_tilt | int }}"
                  update_values:
                    # Force activated (Last Wins)
                    frc: "{{ force_kind }}"
                    man: 0
                    pnd: 'non'
                    ts:
                      due: 0
                      arm: 0
              - *apply_transition
          - stop: "Force enabled executed"

      ############################################################
      # BRANCH (8a): RESUME FROM FORCE PAUSE
      # When force_pause turns off, immediately drive the cover to the
      # correct position derived from the up-to-date helper.
      # The helper is already current (it was updated throughout the pause),
      # so effective_state gives the correct target directly.
      ############################################################

      - alias: "Drive to target position after force pause disabled"
        conditions:
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id == 't_force_pause_disabled' }}"
        sequence:
          # Pure reconciler step: effective_state already answers "where should
          # the cover be" (an active force is mapped to opn/cls/shd/vnt by
          # effective_state itself), and state_targets projects that state onto
          # its drive parameters. The resumed state is visible in the trace via
          # the resume_state variable and in the logbook line.
          - variables:
              resume_state: "{{ effective_state if effective_state in ['lock', 'vnt', 'shd', 'cls'] else 'opn' }}"
              log_extra: "force pause disabled; resuming to {{ resume_state }}"
              drive_plan:
                run: true
                action_set: "{{ state_targets[resume_state].action_set }}"
                target: "{{ state_targets[resume_state].target | int }}"
                target_tilt: "{{ state_targets[resume_state].target_tilt | int }}"
              update_values:
                man: 0
          - *apply_transition

      ############################################################
      # BRANCH (8): RETURN TO BACKGROUND STATE AFTER FORCE DISABLE
      # "Last Wins" Logic: If another force is still active, switch to it.
      # Uses entity last_changed timestamps to identify the most recently
      # activated force (instead of a fixed priority chain).
      ############################################################

      - alias: "Return to background position after force disable"
        conditions:
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id.startswith('t_force_disabled') }}"
        sequence:
          # Determine which force was just disabled and which (if any) is the most recently activated
          - variables:
              disabled_force: >-
                {% if trigger.id == 't_force_disabled_open' %}opn
                {% elif trigger.id == 't_force_disabled_close' %}cls
                {% elif trigger.id == 't_force_disabled_shading' %}shd
                {% elif trigger.id == 't_force_disabled_ventilate' %}vnt
                {% else %}non{% endif %}
              next_active_force: "{{ live_force }}"
          # First check: Is another force still active? ("Last Wins" logic)
          - choose:
              - alias: "Force disabled: not the active frc — keep current state"
                conditions:
                  - "{{ disabled_force != helper_state_force and helper_state_force != 'non' }}"
                sequence:
                  - stop: "Disabled force ({{ disabled_force }}) was not the active force (frc={{ helper_state_force }}), keeping current state"

              - alias: "Force disabled: Last Wins → switch to most recent force"
                conditions:
                  - "{{ next_active_force != 'non' }}"
                sequence:
                  - variables:
                      force_allows_target: >-
                        {{ (next_active_force == 'opn' and force_allows_open)
                           or (next_active_force == 'cls' and force_allows_close)
                           or (next_active_force == 'vnt' and force_allows_ventilate)
                           or (next_active_force == 'shd' and force_allows_shade) }}
                      drive_plan:
                        run: "{{ force_allows_target }}"
                        action_set: "{{ state_targets[next_active_force].action_set }}"
                        target: "{{ state_targets[next_active_force].target | int }}"
                        target_tilt: "{{ state_targets[next_active_force].target_tilt | int }}"
                      update_values:
                        # Switch to the most recently activated force
                        frc: "{{ next_active_force }}"
                        man: 0
                        pnd: 'non'
                        ts:
                          due: 0
                          arm: 0
                  - *apply_transition
                  - stop: "Switched to the most recently activated force"

            # No other force active - proceed with recovery (if enabled)
            default:
              - choose:
                  - alias: "Force disabled: recovery enabled — pick target"
                    conditions:
                      - "{{ is_force_recovery_enabled }}"
                    sequence:
                      # Target chain (first match wins, mirrors the former
                      # dedicated recovery branches in order): close -> shading
                      # -> lockout -> open -> ventilation / 'non'. Ventilation
                      # keeps its own leaf because it is gated by the
                      # user-supplied auto_ventilate_condition; it is the
                      # lowest-priority target, so splitting it off does not
                      # change the ordering.
                      # Window contacts only count while the ventilation automation
                      # is enabled - a (possibly stuck) contact must neither block
                      # the cls/shd/opn targets nor produce a vnt/lock target (#566)
                      - variables:
                          recovery_target: >-
                            {% if helper_state_base == 'cls' and not (is_ventilation_enabled and window_any_now) %}cls
                            {% elif helper_state_shade and not (is_ventilation_enabled and window_any_now) and resident_flags.allow_shade %}shd
                            {% elif window_opened_now and resident_flags.allow_ventilate and is_ventilation_enabled %}lock
                            {% elif helper_state_base == 'opn' and not (is_ventilation_enabled and window_opened_now) and not helper_state_shade and resident_flags.allow_open %}opn
                            {% elif window_tilted_now and not window_opened_now and resident_flags.allow_ventilate and is_ventilation_enabled %}vnt
                            {% else %}non{% endif %}
                      - choose:
                          - alias: "Force disabled recovery: drive to background target"
                            conditions:
                              - "{{ recovery_target not in ['vnt', 'non'] }}"
                            sequence:
                              - variables:
                                  will_drive: >-
                                    {{ {'cls': force_allows_close,
                                        'shd': force_allows_shade,
                                        'lock': force_allows_ventilate,
                                        'opn': force_allows_open}[recovery_target] }}
                                  drive_plan: "{{ dict(state_targets[recovery_target], run=will_drive) }}"
                                  log_extra: "force disabled; recovery_target={{ recovery_target }}"
                                  update_values: >-
                                    {% set base = {'frc': 'non', 'man': 0, 'pnd': 'non', 'ts': {'due': 0, 'arm': 0}} %}
                                    {% if recovery_target == 'shd' %}{{ dict(base, ts={'shd': 'now', 'due': 0, 'arm': 0}) }}
                                    {% elif recovery_target == 'lock' %}{{ dict(base, win='opn') }}
                                    {% elif recovery_target == 'opn' %}{{ dict(base, ts={'opn': 'now', 'due': 0, 'arm': 0}) }}
                                    {% else %}{{ base }}{% endif %}
                              - *apply_transition
                              - stop: "Force recovery: return to background target executed"

                          - alias: "Force disabled recovery: return to VENTILATION (window tilted)"
                            conditions:
                              - "{{ recovery_target == 'vnt' }}"
                              - condition: !input auto_ventilate_condition
                            sequence:
                              - variables:
                                  will_drive: "{{ force_allows_ventilate }}"
                                  drive_plan: "{{ dict(state_targets.vnt, run=will_drive) }}"
                                  update_values:
                                    # Force ended, return to ventilation (tilted)
                                    frc: "non"
                                    man: 0
                                    pnd: 'non'
                                    ts:
                                      due: 0
                                      arm: 0
                              - *apply_transition
                              - stop: "Return to Ventilation executed"
                        default:
                          # No matching recovery condition (e.g., resident restrictions)
                          # Still clear the force flag to avoid it getting stuck
                          - variables:
                              update_values:
                                frc: "non"
                          - *apply_transition
                          - stop: "Force cleared, no recovery position matched"
                default:
                  # Recovery not enabled, just clear the force flag
                  - variables:
                      update_values:
                        frc: "non"
                  - *apply_transition
                  - stop: "Force disabled, no recovery"

      ############################################################
      # BRANCH (9): MANUAL
      ############################################################

      - alias: "Checking for manual position changes"
        conditions:
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id in ['t_manual_position', 't_manual_tilt'] }}"
          - "{{ not (trigger.id == 't_manual_position' and in_reset_override_position and helper_state_manual) }}"
          - "{{ this.attributes.current | int(99) == 0 }}"
          - "{{ as_timestamp(now()) > helper_json.t + drive_time | default(90) + 60 }}"
          - "{{ trigger.from_state is not none and trigger.to_state is not none }}"
          - "{{ trigger.from_state.state not in invalid_states }}"
          - "{{ trigger.to_state.state not in invalid_states }}"
          - or:
              # Position change via custom sensor (state-based)
              - and:
                  - "{{ trigger.id == 't_manual_position' }}"
                  - "{{ position_source == 'custom_sensor' }}"
                  - "{{ is_number(trigger.from_state.state) }}"
                  - "{{ is_number(trigger.to_state.state) }}"
                  - "{{ ((trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0))) | abs > position_tolerance }}"

              # Position change via current_position attribute
              - and:
                  - "{{ trigger.id == 't_manual_position' }}"
                  - "{{ position_source == 'current_position_attr' }}"
                  - "{{ trigger.attribute == 'current_position' }}"
                  - "{{ trigger.from_state.attributes.current_position not in invalid_states }}"
                  - "{{ trigger.to_state.attributes.current_position not in invalid_states }}"
                  - "{{ is_number(trigger.from_state.attributes.current_position) }}"
                  - "{{ is_number(trigger.to_state.attributes.current_position) }}"
                  - "{{ ((trigger.to_state.attributes.current_position | float(0)) - (trigger.from_state.attributes.current_position | float(0))) | abs > position_tolerance }}"

              # Position change via position attribute
              - and:
                  - "{{ trigger.id == 't_manual_position' }}"
                  - "{{ position_source == 'position_attr' }}"
                  - "{{ trigger.attribute == 'position' }}"
                  - "{{ trigger.from_state.attributes.position not in invalid_states }}"
                  - "{{ trigger.to_state.attributes.position not in invalid_states }}"
                  - "{{ is_number(trigger.from_state.attributes.position) }}"
                  - "{{ is_number(trigger.to_state.attributes.position) }}"
                  - "{{ ((trigger.to_state.attributes.position | float(0)) - (trigger.from_state.attributes.position | float(0))) | abs > position_tolerance }}"

              # Tilt change detection
              - and:
                  - "{{ trigger.id == 't_manual_tilt' }}"
                  - "{{ trigger.from_state.attributes.current_tilt_position not in invalid_states }}"
                  - "{{ trigger.to_state.attributes.current_tilt_position not in invalid_states }}"
                  - "{{ is_number(trigger.from_state.attributes.current_tilt_position | default(none)) }}"
                  - "{{ is_number(trigger.to_state.attributes.current_tilt_position | default(none)) }}"
                  - "{{ ((trigger.to_state.attributes.current_tilt_position | float(0)) - (trigger.from_state.attributes.current_tilt_position | float(0))) | abs > tilt_position_tolerance }}"

        sequence:
          # Classification only - the branches just set update_values.
          # The shared tail below persists the helper, runs the manual action
          # and stops. The choose branch alias in the trace identifies which
          # position was detected.
          - choose:
              - alias: "Manual: tilted"
                conditions:
                  - "{{ trigger.id == 't_manual_tilt' }}"
                sequence:
                  - variables:
                      update_values:
                        # Manual tilt detected
                        man: 1
                        ts:
                          man: "now"

              - alias: "Manual: opened"
                conditions:
                  - "{{ is_up_enabled }}"
                  - or:
                      - "{{ in_open_position }}"
                      - "{{ position_comparisons.current_above_open or current_position == open_position }}"
                      - "{{ (is_awning and current_position == 0) or (not is_awning and current_position == 100) }}"
                sequence:
                  - variables:
                      update_values:
                        # Manual open detected
                        bas: "opn"
                        shd: 0
                        man: 1
                        pnd: 'non'
                        ts:
                          opn: "now"
                          man: "now"
                          shd: "now"
                          due: 0
                          arm: 0

              - alias: "Manual: ventilated"
                conditions:
                  - "{{ is_ventilation_enabled }}"
                  - "{{ in_ventilate_position }}"
                  - "{{ not in_open_position }}" # If ventilate_position and open_position are too close together, the ventilation-status should not be assigned.
                sequence:
                  - variables:
                      update_values:
                        # Manual ventilation detected (position only, window state unchanged)
                        man: 1
                        pnd: 'non'
                        ts:
                          man: "now"
                          due: 0
                          arm: 0

              - alias: "Manual: shaded"
                conditions:
                  - "{{ is_shading_enabled }}"
                  - "{{ in_shading_position }}"
                sequence:
                  - variables:
                      update_values:
                        # Manual shading detected
                        shd: 1
                        man: 1
                        pnd: 'non'
                        ts:
                          shd: "now"
                          man: "now"
                          due: 0
                          arm: 0

              - alias: "Manual: closed"
                conditions:
                  - "{{ is_down_enabled }}"
                  - "{{ not in_shading_position }}"
                  - or:
                      - "{{ in_close_position }}"
                      - "{{ position_comparisons.current_below_close or current_position == close_position }}"
                      - "{{ (is_awning and current_position == 100) or (not is_awning and current_position == 0) }}"
                sequence:
                  - variables:
                      update_values:
                        # Manual close detected
                        bas: "cls"
                        shd: 0
                        man: 1
                        pnd: 'non'
                        ts:
                          cls: "now"
                          man: "now"
                          shd: "now"
                          due: 0
                          arm: 0

            # Manual: position cannot be assigned (unknown) - catch-all so a
            # real manual change is never silently dropped.
            default:
              - variables:
                  update_values:
                    # Unknown manual position - cancel shading state and pending
                    shd: 0
                    man: 1
                    pnd: 'non'
                    ts:
                      shd: "now"
                      man: "now"
                      due: 0
                      arm: 0

          - *apply_transition
          - choose: []
            default: !input auto_manual_action
          - stop: "Manual change detected"

      ############################################################
      # BRANCH (10): RESET MANUAL DETECTION
      ############################################################

      - alias: "Reset manual detection"
        conditions:
          - "{{ trigger.id is defined }}"
          - "{{ not is_reset_disabled }}"
          - "{{ trigger.id in ['t_reset_fixedtime', 't_reset_timeout', 't_reset_position'] }}"
        sequence:
          - choose:
              - alias: "Position reset: restore OPEN base state"
                conditions:
                  - "{{ trigger.id == 't_reset_position' and in_open_position }}"
                sequence:
                  - variables:
                      update_values:
                        # Reset manual override and sync base state to held position
                        bas: 'opn'
                        shd: 0
                        man: 0
                        pnd: 'non'
                        ts:
                          opn: 'now'
                          shd: 'now'
                          due: 0
                          arm: 0
              - alias: "Position reset: restore CLOSE base state"
                conditions:
                  - "{{ trigger.id == 't_reset_position' and in_close_position }}"
                sequence:
                  - variables:
                      update_values:
                        # Reset manual override and sync base state to held position
                        bas: 'cls'
                        shd: 0
                        man: 0
                        pnd: 'non'
                        ts:
                          cls: 'now'
                          shd: 'now'
                          due: 0
                          arm: 0
            default:
              - variables:
                  update_values:
                    # Reset manual override
                    man: 0
          - *apply_transition
          - choose: []
            default: !input auto_override_reset_action
          - stop: "Reset Manual Override executed"

      ############################################################
      # BRANCH (11): RESET SHADING STATUS AT MIDNIGHT
      ############################################################

      - alias: "Reset shading status that is no longer required - but still saved"
        conditions:
          - "{{ trigger.id is defined }}"
          - "{{ trigger.id == 't_shading_reset' }}"
          - or:
              - "{{ helper_state_is_shaded }}"
              - "{{ helper_state_pending_start }}"  # Also clear pending status
              - "{{ helper_state_pending_end }}"    # Also clear end‑pending status
        sequence:
          - delay:
              seconds: "{{ (range(0, 60) | random | int) }}"
          - variables:
              update_values:
                # Midnight reset - clear shading status
                shd: 0
                man: 0
                pnd: 'non'
                ts:
                  shd: "now"
                  due: 0
                  arm: 0
          - *apply_transition
          - stop: "Midnight Reset executed"


    ############################################################
    # DEFAULT BRANCH - CONFIG CHECK
    ############################################################

    default:
      - if:
        - "{{ check_config }}"
        then:
          - repeat:
              for_each:
                # ========== RUNTIME CONFIGURATION CHECKS ==========
                # Only runtime checks remain here. Static configuration checks have been moved
                # to the online validator: https://hvorragend.github.io/ha-blueprints/validator/

                # ========== ENTITY ATTRIBUTE & STATE CHECKS ==========

                - condition: "{{ check_status_helper_length is not none and check_status_helper_length | int < 210 }}"
                  message: "CRITICAL: Cover Status Helper max length is {{ check_status_helper_length }}. Required: at least 210 characters (recommended: 254). Increase the 'Maximum length' of the input_text helper. Current length causes data truncation and the automation cannot persist state"
                - condition: "{{ state_attr(blind, 'current_position') is none }}"
                  message: "Cover entity is missing the required 'current_position' attribute"
                - condition: "{{ state_attr(default_sun_sensor, 'elevation') is none }}"
                  message: "Sun sensor is missing the required 'elevation' attribute"
                - condition: "{{ state_attr(default_sun_sensor, 'azimuth') is none }}"
                  message: "Sun sensor is missing the required 'azimuth' attribute"
                - condition: "{{ resident_sensor != [] and states(resident_sensor) not in ['false', 'off', 'true', 'on'] }}"
                  message: "resident_sensor has invalid state. Must be: on, off, true, or false"
                - condition: "{{ is_brightness_enabled and (default_brightness_sensor == [] or not is_number(states(default_brightness_sensor))) }}"
                  message: "Brightness sensor not configured or has non-numeric state"

                # ========== SUN ELEVATION MODE CHECKS ==========
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'dynamic' and
                      sun_elevation_up_sensor == []
                    }}
                  message: "Sun Elevation Mode is 'dynamic' but Sun Elevation Up Sensor is not configured. Configure sensor or change mode to 'fixed'"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'dynamic' and
                      sun_elevation_down_sensor == []
                    }}
                  message: "Sun Elevation Mode is 'dynamic' but Sun Elevation Down Sensor is not configured. Configure sensor or change mode to 'fixed'"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'dynamic' and
                      sun_elevation_up_sensor != [] and
                      not is_number(states(sun_elevation_up_sensor))
                    }}
                  message: "Sun Elevation Up Sensor has non-numeric state. Sensor must provide numeric values in dynamic mode"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'dynamic' and
                      sun_elevation_down_sensor != [] and
                      not is_number(states(sun_elevation_down_sensor))
                    }}
                  message: "Sun Elevation Down Sensor has non-numeric state. Sensor must provide numeric values in dynamic mode"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'hybrid' and
                      sun_elevation_up_sensor == []
                    }}
                  message: "Sun Elevation Mode is 'hybrid' but Sun Elevation Up Sensor is not configured. Configure sensor or change mode to 'fixed'"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'hybrid' and
                      sun_elevation_down_sensor == []
                    }}
                  message: "Sun Elevation Mode is 'hybrid' but Sun Elevation Down Sensor is not configured. Configure sensor or change mode to 'fixed'"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'hybrid' and
                      sun_elevation_up_sensor != [] and
                      not is_number(states(sun_elevation_up_sensor))
                    }}
                  message: "Sun Elevation Up Sensor has non-numeric state. Sensor must provide numeric values in hybrid mode"
                - condition: >-
                    {{
                      is_sun_elevation_enabled and
                      sun_elevation_mode == 'hybrid' and
                      sun_elevation_down_sensor != [] and
                      not is_number(states(sun_elevation_down_sensor))
                    }}
                  message: "Sun Elevation Down Sensor has non-numeric state. Sensor must provide numeric values in hybrid mode"

                # ========== TILT FEATURE CHECKS ==========
                - condition: "{{ is_cover_tilt_enabled and state_attr(blind, 'current_tilt_position') is none }}"
                  message: "Tilt position control enabled but cover does not support 'current_tilt_position' attribute. Disable tilt features or check cover integration"

                # ========== WORKDAY SENSOR CHECKS ==========
                - condition: >-
                    {{
                      workday_sensor_today not in [[], none] and
                      states(workday_sensor_today) not in ['on', 'off', 'unknown', 'unavailable']
                    }}
                  message: "Workday sensor today has invalid state. Expected: on or off"
                - condition: >-
                    {{
                      workday_sensor_tomorrow not in [[], none] and
                      states(workday_sensor_tomorrow) not in ['on', 'off', 'unknown', 'unavailable']
                    }}
                  message: "Workday sensor tomorrow has invalid state. Expected: on or off"

                # ========== FORCE ENTITY CHECKS ==========
                - condition: >-
                    {{
                      auto_up_force not in [[], none] and
                      states(auto_up_force) not in ['on', 'off', 'true', 'false', 'unknown', 'unavailable']
                    }}
                  message: "Force Open entity has invalid state. Must be binary: on/off"
                - condition: >-
                    {{
                      auto_down_force not in [[], none] and
                      states(auto_down_force) not in ['on', 'off', 'true', 'false', 'unknown', 'unavailable']
                    }}
                  message: "Force Close entity has invalid state. Must be binary: on/off"
                - condition: >-
                    {{
                      auto_ventilate_force not in [[], none] and
                      states(auto_ventilate_force) not in ['on', 'off', 'true', 'false', 'unknown', 'unavailable']
                    }}
                  message: "Force Ventilate entity has invalid state. Must be binary: on/off"
                - condition: >-
                    {{
                      auto_shading_start_force not in [[], none] and
                      states(auto_shading_start_force) not in ['on', 'off', 'true', 'false', 'unknown', 'unavailable']
                    }}
                  message: "Force Shading entity has invalid state. Must be binary: on/off"
                - condition: >-
                    {{
                      [
                        auto_up_force not in [[], none] and states(auto_up_force) in ['on', 'true'],
                        auto_down_force not in [[], none] and states(auto_down_force) in ['on', 'true'],
                        auto_ventilate_force not in [[], none] and states(auto_ventilate_force) in ['on', 'true'],
                        auto_shading_start_force not in [[], none] and states(auto_shading_start_force) in ['on', 'true']
                      ].count(true) > 1
                    }}
                  message: "CRITICAL: Multiple force entities are active. Only one force entity can be active at a time. Deactivate conflicting force entities"

                # ========== SUN SENSOR CHECKS ==========
                - condition: >-
                    {{
                      default_sun_sensor not in [[], none] and
                      states(default_sun_sensor) in ['unknown', 'unavailable']
                    }}
                  message: "Sun sensor is unavailable. Check sun integration is enabled"

                # ========== FORECAST CONFIGURATION CHECKS ==========
                - condition: "{{ forecast_source.use_weather and states(shading_forecast_sensor) in ['unknown', 'unavailable'] }}"
                  message: "Weather entity is unavailable. Check weather integration"
                - condition: "{{ forecast_source.use_sensor and states(shading_forecast_temp_sensor) in ['unknown', 'unavailable'] }}"
                  message: "Forecast temperature sensor is unavailable"
                - condition: "{{ forecast_source.use_sensor and not is_number(states(shading_forecast_temp_sensor)) }}"
                  message: "Forecast temperature sensor is non-numeric"

                # ========== DYNAMIC SUN ELEVATION SENSOR CHECKS ==========

                - condition: >-
                    {{
                      sun_elevation_up_sensor != [] and
                      states(sun_elevation_up_sensor) in ['unknown', 'unavailable']
                    }}
                  message: "Dynamic sun elevation up sensor is unavailable. Check sensor configuration"

                - condition: >-
                    {{
                      sun_elevation_up_sensor != [] and
                      states(sun_elevation_up_sensor) not in invalid_states and
                      not is_number(states(sun_elevation_up_sensor))
                    }}
                  message: "Dynamic sun elevation up sensor has non-numeric state"

                - condition: >-
                    {{
                      sun_elevation_up_sensor != [] and
                      is_number(states(sun_elevation_up_sensor)) and
                      (states(sun_elevation_up_sensor) | float < -90 or states(sun_elevation_up_sensor) | float > 90)
                    }}
                  message: "Dynamic sun elevation up sensor value is outside valid range (-90° to 90°)"

                - condition: >-
                    {{
                      sun_elevation_down_sensor != [] and
                      states(sun_elevation_down_sensor) in ['unknown', 'unavailable']
                    }}
                  message: "Dynamic sun elevation down sensor is unavailable. Check sensor configuration"

                - condition: >-
                    {{
                      sun_elevation_down_sensor != [] and
                      states(sun_elevation_down_sensor) not in invalid_states and
                      not is_number(states(sun_elevation_down_sensor))
                    }}
                  message: "Dynamic sun elevation down sensor has non-numeric state"

                - condition: >-
                    {{
                      sun_elevation_down_sensor != [] and
                      is_number(states(sun_elevation_down_sensor)) and
                      (states(sun_elevation_down_sensor) | float < -90 or states(sun_elevation_down_sensor) | float > 90)
                    }}
                  message: "Dynamic sun elevation down sensor value is outside valid range (-90° to 90°)"

                - condition: >-
                    {{
                      sun_elevation_up_sensor != [] and
                      sun_elevation_down_sensor != [] and
                      is_number(states(sun_elevation_up_sensor)) and
                      is_number(states(sun_elevation_down_sensor)) and
                      (states(sun_elevation_up_sensor) | float) <= (states(sun_elevation_down_sensor) | float)
                    }}
                  message: "Dynamic sun elevation up sensor should be higher than down sensor"

                - condition: >-
                    {{
                      sun_elevation_up_sensor != [] and
                      sun_elevation_down_sensor == [] and
                      sun_elevation_up <= sun_elevation_down
                    }}
                  message: "WARNING: Using dynamic sensor for UP but fixed value for DOWN. Thresholds may be inconsistent"

                - condition: >-
                    {{
                      sun_elevation_up_sensor == [] and
                      sun_elevation_down_sensor != [] and
                      sun_elevation_up <= sun_elevation_down
                    }}
                  message: "WARNING: Using dynamic sensor for DOWN but fixed value for UP. Thresholds may be inconsistent"

                # ========== CALENDAR CONFIGURATION CHECKS ==========

                - condition: >-
                    {{
                      is_calendar_enabled and
                      calendar_entity != [] and
                      states(calendar_entity) in ['unknown', 'unavailable']
                    }}
                  message: "Calendar entity is unavailable. Check calendar integration"

                - condition: >-
                    {{
                      is_calendar_enabled and
                      calendar_entity != [] and
                      state_attr(calendar_entity, 'message') is none
                    }}
                  message: "Calendar entity does not have 'message' attribute. Ensure it's a valid calendar entity"

                # Check for position source consistency
                - condition: >-
                    {{
                      position_source == 'position_attr' and
                      state_attr(blind, 'position') is none
                    }}
                  message: "Position source set to 'position' attribute but cover doesn't have this attribute"

                - condition: >-
                    {{
                      position_source == 'current_position_attr' and
                      state_attr(blind, 'current_position') is none
                    }}
                  message: "Position source set to 'current_position' attribute but cover doesn't have this attribute (try 'position' or custom sensor)"

                - condition: >-
                    {{
                      position_source == 'custom_sensor' and
                      (custom_position_sensor == [] or states(custom_position_sensor) in invalid_states)
                    }}
                  message: "Custom position sensor selected but not configured or unavailable"

                - condition: >-
                    {{
                      position_source == 'custom_sensor' and
                      custom_position_sensor != [] and
                      not is_number(states(custom_position_sensor))
                    }}
                  message: "Custom position sensor has non-numeric value"

              sequence:
                - if:
                    - "{{ repeat.item.condition }}"
                  then:
                    - action: system_log.write
                      data:
                        level: "{{ check_config_debuglevel }}"
                        message: "CCA Config issue: {{ repeat.item.message }} - {{ this.entity_id }}"
                        logger: "blueprints.hvorragend.cca"

      - if: "{{ enable_logbook }}"
        then:
          - action: logbook.log
            data:
              name: "{{ this.attributes.friendly_name }}"
              entity_id: "{{ this.entity_id }}"
              message: |-
                Branch: No operational branch matched | 
                Trigger: {{ trigger.id | default('manual') }} | 
                Effective: {{ effective_state }} | 
                Position: {{ current_position }}% {% if is_cover_tilt_enabled %} / Tilt: {{ current_tilt_position }}%{% endif %} | 
                Helper: bas={{ helper_json.bas | default('opn') }} shd={{ helper_json.shd | default(0) }} pnd={{ helper_json.pnd | default('non') }} win={{ helper_json.win | default('cls') }} frc={{ helper_json.frc | default('non') }} res={{ helper_json.res | default(0) }} man={{ helper_json.man | default(0) }} | 
                States: 
                opn={{ states(contact_window_opened) if contact_window_opened != [] else '-' }} 
                tlt={{ states(contact_window_tilted) if contact_window_tilted != [] else '-' }}
                res={{ state_resident }} 
                sun_elev={{ current_sun_elevation | float(default=0) }}°({{ sun_elevation_up_current | float(default=0) | round(1) }}°/{{ sun_elevation_down_current | float(default=0) | round(1) }})° 
                azim={{ current_sun_azimuth | float(default=0) | round(1) }}°
                bri={{ states(default_brightness_sensor) if default_brightness_sensor != [] else '-' }} 
                t1={{ states(shading_temperatur_sensor1) if shading_temperatur_sensor1 != [] else '-' }} 
                t2={{ states(shading_temperatur_sensor2) if shading_temperatur_sensor2 != [] else '-' }}
                update={{ update_values | default({}) | to_json }} 
                {% if log_extra is defined %} extra={{ log_extra }}{% endif %}
      - stop: "No operational branch matched (Opening, Closing, Shading, etc. conditions not met for current trigger)"

trace:
  stored_traces: !input trace_count